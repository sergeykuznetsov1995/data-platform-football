# =============================================================================
# OpenMetadata description: iceberg.bronze.capology_contract_extensions
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.capology_contract_extensions
  description: |
    Контракты игроков с capology.com (через scrapers/capology, dag_ingest_capology,
    еженедельно). Grain — один row на (игрок, клуб, сезон): даты подписания/окончания,
    срок и зарплаты (gross/net, недельные/годовые, бонусы, итоги) + полная стоимость
    контракта (contract_total_*) сразу в трёх валютах GBP/EUR/USD; единицы — целые
    единицы валюты. Охват: только ENG-Premier League (много сезонов с 2018/19).
    Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: player_slug
    description: Capology URL-слаг игрока (e.g. 'harry-kane').
  - name: player_name
    description: Имя игрока.
    tags:
      - PII.Low
  - name: club_slug
    description: Capology URL-слаг клуба.
  - name: club_name
    description: Название клуба.
  - name: signed
    description: Дата подписания контракта (varchar, ISO 'YYYY-MM-DD').
  - name: expiration
    description: Дата окончания контракта (varchar, ISO 'YYYY-MM-DD').
  - name: years
    description: Срок контракта в годах (bigint).
  - name: weekly_gross_gbp
    description: Недельная зарплата до налога, GBP (bigint); = annual_gross / 52.
  - name: weekly_gross_eur
    description: Недельная зарплата до налога, EUR (bigint).
