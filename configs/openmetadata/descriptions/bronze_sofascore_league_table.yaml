# =============================================================================
# OpenMetadata description: iceberg.bronze.sofascore_league_table
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofascore_league_table
  description: |
    Сырая турнирная таблица лиги из SofaScore (soccerdata
    Sofascore.read_league_table через dag_ingest_sofascore). Grain — один row
    на команду в (league, season): snapshot позиции на момент ingest'а.
    Кормит Gold fct_standings (#428, ex-dim_standings). Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон в формате 'YYZZ' (e.g. '2526'); partition key.
  - name: team
    description: Название команды.
  - name: mp
    description: Сыграно матчей (matches played).
  - name: w
    description: Победы.
  - name: d
    description: Ничьи.
  - name: l
    description: Поражения.
  - name: gf
    description: Забито голов (goals for).
  - name: ga
    description: Пропущено голов (goals against).
  - name: gd
    description: Разница мячей (goal difference).
  - name: pts
    description: Очки.
  - name: _source
    description: Источник данных ('sofascore'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
