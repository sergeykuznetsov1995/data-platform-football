# =============================================================================
# OpenMetadata description: iceberg.bronze.clubelo_team_history
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.clubelo_team_history
  description: |
    Полная история ELO-рейтинга каждого клуба с момента появления на clubelo.com
    (метод soccerdata read_team_history по каждой команде, через scrapers/clubelo,
    dag_ingest_clubelo_full, еженедельно). Grain — один row на (клуб, период
    рейтинга): клуб получает новую строку каждый раз, когда его ELO меняется.
    Партиционирование ['team'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: from
    description: Начало периода действия этого рейтинга (timestamp).
  - name: rank
    description: Место клуба по ELO на тот период (1 = сильнейший); double, ~44% NULL (rank есть не для каждого периода).
  - name: team
    description: Название клуба в написании ClubElo (e.g. 'Man City'); partition key.
  - name: country
    description: ISO-код страны клуба (e.g. 'ENG','GER').
  - name: level
    description: Дивизион (1 = высший); bigint.
  - name: elo
    description: Рейтинг ELO клуба за этот период (double; база ≈1500).
  - name: to
    description: Конец периода действия этого рейтинга (timestamp).
  - name: _source
    description: Источник данных ('clubelo'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
