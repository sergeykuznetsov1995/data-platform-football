table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofascore_event_player_stats
  description: |
    Сырая статистика игроков за матч из SofaScore (endpoint
    /event/{id}/player/{pid}/statistics через dag_ingest_sofascore, задача
    _run_event_player_stats). Grain — один row на (match_id, player_id):
    ~80 Opta-метрик за матч плюс контекст состава (is_home/captain/substitute/
    position_specific обогащены из /lineups, #301/#337). Скрапер skip-existing
    (#69). Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: match_id
    description: SofaScore event/match id (varchar).
  - name: player_id
    description: SofaScore player_id (varchar).
  - name: team_id
    description: SofaScore id команды игрока (bigint).
  - name: team_name
    description: Название команды игрока.
  - name: is_home
    description: Играет ли игрок за домашнюю команду (varchar 'True'/'False'; обогащено из /lineups).
  - name: position
    description: Позиция игрока в матче (буквенный код).
  - name: position_specific
    description: Уточнённая позиция игрока (из /lineups).
