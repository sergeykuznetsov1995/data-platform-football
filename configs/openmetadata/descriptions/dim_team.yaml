table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_team
  description: |
    Dimension table for teams. Grain: one row per (team_id, league, season).
    Canonical team identity comes from entity_xref (legacy) / silver.xref_team
    (E1 cutover pending) — alias resolution against configs/medallion/team_aliases.yaml.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: Canonical team ID (lowercase slug, e.g. 'manchester_united').
  - name: team_name
    description: Display name (e.g. 'Manchester United').
  - name: league
    description: League slug.
  - name: season
    description: Season slug.
relationships: []
