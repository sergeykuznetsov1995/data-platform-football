# =============================================================================
# OpenMetadata description: iceberg.gold.dim_team
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_team
  description: |
    Канонический справочник команд. Одна строка на (team_id, league, season),
    что позволяет отражать перемещения команды между лигами (промоушн/релегейшн).
    Используется как FK target из fct_match (home/away), fct_team_match,
    feat_team_form и feat_team_h2h.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: Канонический ID команды (нормализованное имя из silver.xref_team).
  - name: team_name
    description: Полное имя команды как в источнике (например 'Manchester United').
  - name: league
    description: Лига сезона.
  - name: season
    description: Сезон; команда может присутствовать в нескольких сезонах.
