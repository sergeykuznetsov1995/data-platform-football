# =============================================================================
# OpenMetadata description: iceberg.silver.fbref_player_season_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fbref_player_season_profile
  description: |
    Широкий профиль игрока за сезон — один row на (player_id, league, season).
    Денормализованная склейка 4 Bronze-таблиц по (player_id, league, season):
    fbref_player_stats (стандарт), fbref_player_shooting (удары),
    fbref_player_playingtime (игровое время / +-), fbref_player_misc (фолы,
    отборы, навесы). Каждый источник дедуплицируется через ROW_NUMBER ...
    ORDER BY _ingested_at DESC до JOIN. Все числовые — TRY_CAST.
    Идентификаторы сырые FBref (canonical-резолюция — в Gold).
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
