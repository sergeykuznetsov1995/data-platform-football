# =============================================================================
# OpenMetadata description: iceberg.bronze.fbref_shot_events
# -----------------------------------------------------------------------------
# ВНИМАНИЕ: на момент написания (issue #326) таблица iceberg.bronze.fbref_shot_events
# ОТСУТСТВУЕТ в каталоге — FBref ограничил доступ к shot-данным (Feb-2026),
# DAG не создаёт таблицу. Описание заведено заранее: apply_descriptions.py
# при отсутствии table-entity печатает WARN и пропускает файл (idempotent),
# а при восстановлении источника описание применится автоматически без правок.
# Колонки соответствуют intended-схеме из dags/sql/silver/fbref_shot_events.sql.
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fbref_shot_events
  description: |
    Детальные удары матча с xG из FBref (Shots table). Гранулярность: один row
    на удар в пределах match_id. ПРИМЕЧАНИЕ: источник ограничен FBref с Feb-2026 —
    таблица может отсутствовать в Bronze; Silver-трансформация проверяет наличие
    перед запуском. Источник: FBref scrape (dag_ingest_fbref).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: match_id
    description: FBref ID матча.
  - name: minute
    description: Минута удара (текст; формат "45+2" для добавленного времени).
  - name: player
    description: Имя игрока, нанёсшего удар.
    tags:
      - PII.Low
  - name: player_id
    description: FBref ID игрока.
  - name: team
    description: Команда, нанёсшая удар.
  - name: xg
    description: Ожидаемые голы удара (Expected Goals; приводится к DOUBLE в Silver).
  - name: psxg
    description: Post-Shot Expected Goals удара (приводится к DOUBLE в Silver).
  - name: outcome
    description: Исход удара (goal / saved / blocked / off target и т.п.).
  - name: distance
    description: Дистанция удара в ярдах (приводится к INTEGER в Silver).
  - name: body_part
    description: Часть тела/способ удара (нога/голова и т.п.).
  - name: notes
    description: Примечания к удару (напр. удар со штрафного/пенальти).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — год начала (bigint, напр. 2025 = сезон 2025/26).
  - name: _source
    description: Источник данных Bronze (всегда 'fbref').
  - name: _entity_type
    description: Внутренняя метка типа сущности ingest-конвейера FBref.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze.
  - name: _batch_id
    description: ID batch'а загрузки (трассировка и идемпотентность ingest).
