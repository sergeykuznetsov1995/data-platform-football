# =============================================================================
# OpenMetadata description: iceberg.gold.feat_player_form
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.feat_player_form
  description: |
    Rolling-фичи игрока за последние 5 матчей (point-in-time safe, текущий
    матч исключён из окна). Avg по голам/ассистам/ударам/минутам и sum по
    голам, ассистам и карточкам. Первые 5 появлений сезона = NULL.
    Используется для моделей "забьёт/нет", expected goals игрока и т.п.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.Low
    - UseCase.ML
columns:
  - name: match_id_canonical
    description: PK part 1 — canonical ID матча (FK -> dim_match.match_id).
  - name: player_id_canonical
    description: PK part 2 — canonical ID игрока (FK -> dim_player.player_id).
  - name: team_id_canonical
    description: Canonical ID команды игрока в матче (FK -> dim_team.team_id).
  - name: l5_minutes_avg
    description: Среднее сыгранных минут за L5.
  - name: l5_goals_avg
    description: Среднее голов за L5.
  - name: l5_assists_avg
    description: Среднее ассистов за L5.
  - name: l5_shots_avg
    description: Среднее ударов за L5.
  - name: l5_sot_avg
    description: Среднее ударов в створ за L5.
  - name: l5_goals_sum
    description: Сумма голов за L5.
  - name: l5_assists_sum
    description: Сумма ассистов за L5.
  - name: l5_yellows_sum
    description: Сумма жёлтых карточек за L5.
  - name: l5_reds_sum
    description: Сумма красных карточек за L5.
  - name: appearances_so_far
    description: Сколько матчей сыграл игрок к этому моменту в сезоне.
  - name: league
    description: Лига.
  - name: season
    description: Сезон.
relationships:
  - from: match_id_canonical
    to: trino_iceberg.iceberg.gold.dim_match.match_id
    type: FOREIGN_KEY
  - from: player_id_canonical
    to: trino_iceberg.iceberg.gold.dim_player.player_id
    type: FOREIGN_KEY
  - from: team_id_canonical
    to: trino_iceberg.iceberg.gold.dim_team.team_id
    type: FOREIGN_KEY
