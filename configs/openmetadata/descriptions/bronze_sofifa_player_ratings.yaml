    description: Издание игры (e.g. 'FC 26'); partition key.
  - name: update
    description: Метка обновления ростера на sofifa.com (e.g. 'Jun 2, 2026').
  - name: overallrating
    description: Общий рейтинг игрока (0-99).
  - name: potential
    description: Потенциал — потолок будущего рейтинга (0-99).
