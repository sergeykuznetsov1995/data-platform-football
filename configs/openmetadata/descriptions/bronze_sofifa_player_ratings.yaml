# =============================================================================
# OpenMetadata description: iceberg.bronze.sofifa_player_ratings
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofifa_player_ratings
  description: |
    Детальные атрибуты игроков из карточек видеоигры EA Sports FC / FIFA (sofifa.com,
    per-player страницы через scrapers/sofifa + FlareSolverr, dag_ingest_sofifa,
    еженедельно). Grain — один row на (игрок, издание игры). Несёт общий рейтинг +
    потенциал, 6 агрегатов карты, 34 детальных навыка, 5 вратарских и рыночно-контрактные
    поля. Большинство навыков — шкала 0-99. Партиционирование ['fifa_edition'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: player
    description: Имя игрока.
    tags:
      - PII.Low
  - name: player_id
    description: SoFIFA id игрока (bigint).
