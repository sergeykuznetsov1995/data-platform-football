# =============================================================================
# OpenMetadata description: iceberg.gold.dim_player
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_player
  description: |
    Канонический справочник игроков по сезонам. PK (player_id, season).
    Учитывает что игрок может менять команду внутри сезона (берём last_team
    через MAX). Возраст и позиция — снимок на момент последнего обновления
    в Silver. Используется как FK target из fct_player_match и feat_player_form.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.Low
columns:
  - name: player_id
    description: Стабильный FBref player_id (хеш, присвоенный источником).
  - name: player_name
    description: Полное имя игрока (PII.Low — публично известное лицо).
    tags:
      - PII.Low
  - name: nation
    description: Национальность (трёхбуквенный код, например ENG, FRA).
  - name: position
    description: Позиция игрока (GK / DF / MF / FW; может комбинироваться, "DF,MF").
  - name: born_year
    description: Год рождения. PII.Low — широкодоступная информация.
    tags:
      - PII.Low
  - name: last_team
    description: Последняя команда игрока в сезоне.
  - name: league
    description: Лига сезона.
  - name: season
    description: Сезон.
relationships:
  - from: player_id
    to: trino_iceberg.iceberg.gold.fct_player_match.player_id_canonical
    type: FOREIGN_KEY
  - from: player_id
    to: trino_iceberg.iceberg.gold.feat_player_form.player_id_canonical
    type: FOREIGN_KEY
