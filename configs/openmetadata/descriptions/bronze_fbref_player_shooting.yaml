# =============================================================================
# OpenMetadata description: iceberg.bronze.fbref_player_shooting
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fbref_player_shooting
  description: |
    Сезонная статистика ударов игроков из FBref (Shooting). Гранулярность:
    один row на (player, squad, league, season). Метрики — текстовые (приведение
    типов в Silver). Источник: FBref scrape (dag_ingest_fbref).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: rk
    description: Порядковый номер строки (Rank) в таблице FBref.
  - name: player
    description: Имя игрока.
    tags:
      - PII.Low
  - name: nation
    description: Код страны игрока (напр. "eng ENG").
  - name: pos
    description: Позиция игрока.
  - name: squad
    description: Клуб игрока.
  - name: age
    description: Возраст игрока.
  - name: born
    description: Год рождения игрока.
  - name: 90s
    description: Число сыгранных 90-минуток (минуты / 90).
  - name: gls
    description: Голы.
  - name: sh
    description: Удары (всего).
  - name: sot
    description: Удары в створ (Shots on Target).
  - name: sot%
    description: Доля ударов в створ, % (SoT / Shots).
  - name: sh/90
    description: Удары на 90 минут.
  - name: sot/90
    description: Удары в створ на 90 минут.
  - name: g/sh
    description: Голов на удар (Goals per Shot).
  - name: g/sot
    description: Голов на удар в створ (Goals per Shot on Target).
  - name: pk
    description: Забитые пенальти.
  - name: pkatt
    description: Пробитые пенальти (попытки).
  - name: matches
    description: Текст ссылки "Matches" на FBref (служебная колонка из scrape).
  - name: player_id
    description: FBref ID игрока.
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — год начала (bigint, напр. 2025 = сезон 2025/26).
  - name: stat_type
    description: Категория stat-таблицы FBref (для этой таблицы — shooting).
  - name: _source
    description: Источник данных Bronze (всегда 'fbref').
  - name: _entity_type
    description: Внутренняя метка типа сущности ingest-конвейера FBref.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze.
  - name: _batch_id
    description: ID batch'а загрузки (трассировка и идемпотентность ingest).
