# =============================================================================
# OpenMetadata description: iceberg.gold.fct_goal
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.fct_goal
  description: |
    Narrow fact for goals (E4). Built as UNION of fct_shot is_goal=TRUE rows
    and FBref own-goal annotations (own-goal team attribution is INVERTED in
    bronze.fbref_match_events — handled in CTAS). Grain: goal_canonical
    (xxhash64 of match_id|minute|is_own_goal|team).
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: goal_canonical
    description: Logical PK (xxhash64-based, includes pk_tiebreaker for own-goal collisions).
  - name: match_id_canonical
    description: FK -> dim_match.match_id.
  - name: team_id_canonical
    description: FK -> dim_team.team_id (scoring team — corrected for own-goals).
  - name: scorer_id_canonical
    description: FK -> dim_player.player_id (scorer).
  - name: assist_id_canonical
    description: FK -> dim_player.player_id (assist provider; NULL if no assist).
  - name: minute
    description: Match minute the goal was scored.
  - name: is_own_goal
    description: TRUE for own goals.
  - name: is_penalty
    description: TRUE for penalty goals.
  - name: goal_source
    description: Source label ('understat_v1' or 'fbref_own_goal').
  - name: league
    description: League slug.
  - name: season
    description: Season (BIGINT; 2000+season_int).
relationships:
  - from: trino_iceberg.iceberg.gold.fct_goal
    to:   trino_iceberg.iceberg.gold.dim_match
    type: FOREIGN_KEY
    description: match_id_canonical -> dim_match.match_id
  - from: trino_iceberg.iceberg.gold.fct_goal
    to:   trino_iceberg.iceberg.gold.fct_shot
    type: FOREIGN_KEY
    description: Subset of fct_shot rows where is_goal=TRUE.
