# =============================================================================
# OpenMetadata description: iceberg.bronze.clubelo_ratings_historical
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.clubelo_ratings_historical
  description: |
    Еженедельные снимки клубных ELO-рейтингов с clubelo.com (метод soccerdata
    read_by_date в цикле +7 дней, через scrapers/clubelo). Скрейпится gated-веткой
    dag_ingest_clubelo (воскресенье / ручной триггер run_full=True, #716);
    еженедельный refresh покрывает последние ~365 дней, разовый бэкфилл #716 —
    ~10 сезонов АПЛ. Grain — один row на клуб за дату снимка.
    Партиционирование ['rating_date']. Отличие от clubelo_ratings: rating_date —
    varchar 'YYYY-MM-DD' (строка нужна, чтобы replace_partitions строил корректный
    DELETE-фильтр).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: team
    description: Название клуба в написании ClubElo (e.g. 'Man City').
  - name: rank
    description: Место клуба по ELO (1 = сильнейший); double, может быть NULL.
  - name: country
    description: ISO-код страны клуба (e.g. 'ENG','GER').
  - name: level
    description: Дивизион (1 = высший); bigint.
  - name: elo
    description: Рейтинг ELO клуба на дату снимка (double; база ≈1500).
  - name: from
    description: Начало периода действия этого рейтинга (timestamp).
  - name: to
    description: Конец периода действия этого рейтинга (timestamp).
  - name: league
    description: Лига клуба; varchar, часто NULL (заполнено лишь для 'ENG-Premier League').
  - name: rating_date
    description: Дата снимка рейтинга (varchar 'YYYY-MM-DD'); partition key.
  - name: _source
    description: Источник данных ('clubelo'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
