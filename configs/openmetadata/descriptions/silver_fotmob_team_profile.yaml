# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_team_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_team_profile
  description: |
    Conform-only профиль команды per-season из FotMob (issue #600).
    Один row per (team_id, league, season). Сезонный scope берётся из
    bronze.fotmob_season_teams_current, глобальный профиль — из
    team_snapshots_current, позиция — из standings_current. Снапшотные/JSON-
    колонки не переносятся. canonical_id не
    резолвится — храним numeric team_id + team_name, резолв в Gold (charter §5).
    Native current views выбирают последние успешные manifest batches.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob id команды (bigint). Raw passthrough — резолв canonical в Gold.
  - name: team_name
    description: Полное название команды (для JOIN на silver.xref_team в Gold).
  - name: short_name
    description: Короткое название команды.
  - name: country
    description: Страна команды.
  - name: venue
    description: Название домашнего стадиона.
  - name: table_position
    description: Текущее место в native standings_current (table_type='all').
  - name: _bronze_ingested_at
    description: Timestamp native-наблюдения Bronze (для freshness).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — slug ('2526'), выведенный из exact source_season_key.
