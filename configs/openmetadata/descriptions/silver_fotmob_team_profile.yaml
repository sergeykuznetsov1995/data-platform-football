# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_team_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_team_profile
  description: |
    Conform-only профиль команды per-season из FotMob (issue #600).
    Один row per (team_id, league, season). Источник: bronze.fotmob_team_profile
    (endpoint /api/data/teams). Снапшотные/JSON-колонки (next_match/last_match/
    overview_season/history_seasons_count) не переносятся. canonical_id не
    резолвится — храним numeric team_id + team_name, резолв в Gold (charter §5).
    Дедуп: ROW_NUMBER per (team_id, league, season) ORDER BY _ingested_at DESC.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob id команды (bigint). Raw passthrough — резолв canonical в Gold.
  - name: team_name
    description: Полное название команды (для JOIN на silver.xref_team в Gold).
  - name: short_name
    description: Короткое название команды.
  - name: country
    description: Страна команды.
  - name: venue
    description: Название домашнего стадиона.
  - name: table_position
    description: Текущее место в таблице (TRY_CAST из bronze overview_table_position varchar).
  - name: _bronze_ingested_at
    description: Timestamp Bronze ingest'а (для freshness).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — slug ('2526'), из bronze season bigint через LPAD(MOD(season,100))||LPAD(MOD(season+1,100)).
