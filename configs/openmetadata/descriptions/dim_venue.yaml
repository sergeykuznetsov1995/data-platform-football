# =============================================================================
# OpenMetadata description: iceberg.gold.dim_venue
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_venue
  description: |
    Канонический справочник стадионов (звёздный дизайн, #425), объединённый
    из FBref и ESPN. Одна строка на venue_id — стабильный explicit-слаг
    `venue_<...>` из curated-справочника configs/medallion/venue_aliases.yaml
    (issue #145), а НЕ хеш имени. Разные написания одного стадиона
    ("Brentford Community Stadium" / "Gtech Community Stadium") сливаются в
    один venue_id; тёзки в разных городах не склеиваются. Стадионы без алиаса
    попадают как venue_source='orphan' (fallback на хеш нормализованного
    имени) и сигналятся DQ-WARNING для куратора.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: venue_id
    description: PK — explicit-слаг `venue_<...>` из venue_aliases.yaml (curated), для orphan — `venue_<xxhash64>` от нормализованного имени.
  - name: venue_name
    description: Каноническое имя стадиона из venue_aliases.yaml (для orphan — наблюдаемое имя FBref>ESPN).
  - name: city
    description: Город стадиона из venue_aliases.yaml (NULL для orphan).
  - name: country
    description: Страна стадиона из venue_aliases.yaml (NULL для orphan).
  - name: capacity
    description: Вместимость стадиона. Пока NULL-заглушка — источника нет (ESPN capacity 100% NULL); обогащение — отдельная задача.
  - name: venue_source
    description: Происхождение идентичности ('curated' — матч по алиасу | 'orphan' — алиас не найден); используется DQ-чеком orphan-rate.
  - name: _silver_created_at
    description: Технический timestamp создания строки CTAS-раннером.
relationships: []
