# =============================================================================
# OpenMetadata description: iceberg.bronze.transfermarkt_players
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.transfermarkt_players
  description: |
    Профили/анкеты игроков с transfermarkt.com (HTML профиля + JSON ceapi через
    scrapers/transfermarkt, dag_ingest_transfermarkt, еженедельно). Grain — один row на
    (league, season, player_id). Несёт анкету (позиция/рост/нога/гражданство), текущий
    клуб и рыночную стоимость в EUR. Охват: только ENG-Premier League (MVP).
    Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: player_id
    description: Transfermarkt id игрока (varchar).
  - name: player_slug
    description: URL-слаг игрока (e.g. 'erling-haaland').
  - name: name
    description: Имя игрока.
    tags:
      - PII.Low
  - name: position
    description: Основная позиция (e.g. 'Goalkeeper','Midfielder').
  - name: dob
    description: Дата рождения игрока (date).
    tags:
      - PII.Low
  - name: age
    description: Возраст игрока в годах на момент ingest'а (bigint).
  - name: height_cm
    description: Рост игрока, см (bigint).
  - name: foot
    description: Рабочая нога ('left'/'right'); ~0.5% NULL.
  - name: nationality
    description: Гражданство игрока.
    tags:
      - PII.Low
  - name: contract_until
    description: Дата окончания контракта (date); ~0.7% NULL.
  - name: market_value_eur
    description: Текущая рыночная стоимость игрока, EUR (bigint).
  - name: market_value_last_update
    description: Дата последнего обновления рыночной стоимости (date).
  - name: current_club_id
    description: Transfermarkt id текущего клуба (varchar).
  - name: current_club_name
    description: Название текущего клуба.
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон в коротком виде (e.g. '2526'); partition key.
  - name: _source
    description: Источник данных ('transfermarkt'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
