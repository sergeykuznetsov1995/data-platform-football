table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.matchhistory_results
  description: |
    Сырые результаты матчей с football-data.co.uk (CSV
    mmz4281/{сезон}/{код_лиги}.csv через scrapers/matchhistory, dag_ingest_matchhistory).
    Grain — один row на матч. Несёт счёт (полный/первый тайм), командную статистику
    (удары, фолы, угловые, карточки) и предматчевые/закрывающие котировки ~15
    букмекеров по рынкам 1X2, тотал 2.5 и азиатский гандикап. Партиционирование
    ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
