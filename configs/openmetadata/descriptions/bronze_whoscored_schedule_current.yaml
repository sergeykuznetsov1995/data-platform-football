    description: Числовой идентификатор матча WhoScored.
  - name: stage_id
    description: Идентификатор стадии WhoScored.
  - name: date
    description: Дата и время начала матча.
  - name: _scope_batch_id
    description: Идентификатор успешно опубликованного scope batch.
