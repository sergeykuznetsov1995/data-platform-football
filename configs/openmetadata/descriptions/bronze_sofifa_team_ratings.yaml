table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofifa_team_ratings
  description: |
    Командные рейтинги из видеоигры EA Sports FC / FIFA (sofifa.com, страница команды
    через scrapers/sofifa + FlareSolverr, dag_ingest_sofifa). Grain — один row на
    (команда, издание игры). Несёт сводные рейтинги (overall/attack/midfield/defence),
    бюджет/стоимость клуба и подрейтинги тактики. Значения — строки (varchar). NB: 15
    подрейтингов (build_up_*/chance_creation_*/defence_* + престиж/средний возраст)
    100% NULL — sofifa.com убрал их в FC 26. Без партиционирования.
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
