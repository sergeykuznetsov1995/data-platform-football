  - name: league
    description: Лига (e.g. 'ENG-Premier League').
  - name: team
    description: Название команды.
  - name: overall
    description: Сводный рейтинг команды (varchar, 0-99).
  - name: attack
    description: Рейтинг атаки команды (varchar, 0-99).
  - name: midfield
    description: Рейтинг полузащиты команды (varchar, 0-99).
  - name: defence
    description: Рейтинг обороны команды (varchar, 0-99).
  - name: transfer_budget
