# =============================================================================
# OpenMetadata description: iceberg.bronze.fbref_keeper_keeper
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fbref_keeper_keeper
  description: |
    Сезонная вратарская статистика из FBref (Goalkeeping). Гранулярность:
    один row на (player, squad, league, season). Метрики — текстовые (приведение
    типов в Silver). Источник: FBref scrape (dag_ingest_fbref).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: rk
    description: Порядковый номер строки (Rank) в таблице FBref.
  - name: player
    description: Имя вратаря.
    tags:
      - PII.Low
  - name: nation
    description: Код страны игрока (напр. "eng ENG").
  - name: pos
    description: Позиция (обычно GK).
  - name: squad
    description: Клуб игрока.
  - name: age
    description: Возраст игрока.
  - name: born
    description: Год рождения игрока.
  - name: mp
    description: Сыграно матчей (Matches Played).
  - name: starts
    description: Матчи в стартовом составе.
  - name: min
    description: Сыграно минут.
  - name: 90s
    description: Число сыгранных 90-минуток (минуты / 90).
  - name: ga
    description: Пропущенные голы (Goals Against).
  - name: ga90
    description: Пропущенные голы на 90 минут.
  - name: sota
    description: Удары в створ по воротам (Shots on Target Against).
  - name: saves
    description: Сейвы.
  - name: save%
    description: Процент отражённых ударов (Save %).
  - name: w
    description: Победы команды с этим вратарём.
  - name: d
    description: Ничьи.
  - name: l
    description: Поражения.
  - name: cs
    description: Сухие матчи (Clean Sheets).
  - name: cs%
    description: Процент сухих матчей (Clean Sheet %).
  - name: pkatt
    description: Пенальти пробито по воротам (Penalty Kicks Attempted against).
  - name: pka
    description: Пропущенные пенальти (Penalty Kicks Allowed).
  - name: pksv
    description: Отражённые пенальти (Penalty Kicks Saved).
  - name: pkm
    description: Пенальти, не реализованные соперником мимо/штанга (Penalty Kicks Missed).
  - name: save%_1
    description: Процент отражённых пенальти (Penalty Save %).
  - name: matches
    description: Текст ссылки "Matches" на FBref (служебная колонка из scrape).
  - name: player_id
    description: FBref ID игрока.
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — год начала (bigint, напр. 2025 = сезон 2025/26).
  - name: stat_type
    description: Категория stat-таблицы FBref (для этой таблицы — keeper).
  - name: _source
    description: Источник данных Bronze (всегда 'fbref').
  - name: _entity_type
    description: Внутренняя метка типа сущности ingest-конвейера FBref.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze.
  - name: _batch_id
    description: ID batch'а загрузки (трассировка и идемпотентность ingest).
