# =============================================================================
# OpenMetadata description: iceberg.bronze.clubelo_ratings
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.clubelo_ratings
  description: |
    Ежедневный снимок клубных ELO-рейтингов с clubelo.com (метод soccerdata
    read_by_date через scrapers/clubelo, dag_ingest_clubelo, ежедневно). ELO —
    «оценка силы» клуба как очки в шахматах (база ≈1500). Grain — один row на клуб
    за дату снимка. Партиционирование ['rating_date'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: team
    description: Название клуба в написании ClubElo (e.g. 'Man City').
  - name: rank
    description: Место клуба по ELO (1 = сильнейший); double, ~47% NULL (rank проставлен не у всех клубов).
  - name: country
    description: ISO-код страны клуба (e.g. 'ENG','GER').
  - name: level
    description: Дивизион (1 = высший); bigint.
  - name: elo
    description: Рейтинг ELO клуба на дату снимка (double; база ≈1500).
  - name: from
    description: Начало периода действия этого рейтинга (timestamp).
  - name: to
    description: Конец периода действия этого рейтинга (timestamp).
  - name: league
    description: Лига клуба; varchar, ~55% NULL (заполнено лишь для 'ENG-Premier League').
  - name: rating_date
    description: Дата снимка рейтинга (timestamp); partition key.
  - name: _source
    description: Источник данных ('clubelo'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
