# =============================================================================
# OpenMetadata description: iceberg.gold.fct_player_unavailable
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.fct_player_unavailable
  description: |
    Pre-match unavailable / injured / suspended players (E5). Source:
    silver.whoscored_player_unavailable bridged to FBref match via dim_match
    + dim_player. Orphan-safe: unmapped players keep 'ws_<id>' canonical
    (deferred to E1.5 cross-source player xref). #426 renamed player_id_canonical
    to player_id, dropped match_date / player_name, and added a normalised
    reason enum + raw detail.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: match_id
    description: FK -> dim_match.match_id (FBref-canonical).
  - name: team_id
    description: FK -> dim_team.team_id (player's team for this match).
  - name: player_id
    description: FK -> dim_player.player_id; orphan-safe fallback 'ws_<source_id>' (never NULL).
  - name: reason
    description: >-
      Нормализованная причина: 'injury' (injured / unfit) / 'suspension'
      (suspended) / 'other' (прочее наблюдаемое) / NULL.
  - name: detail
    description: >-
      Сырой ярлык причины из WhoScored (provenance для reason):
      injured / suspended / unfit / ineligible / other.
  - name: _silver_ingested_at
    description: Bronze provenance timestamp (carried from _bronze_ingested_at).
  - name: league
    description: League slug.
  - name: season
    description: Season slug.
  - name: _silver_created_at
    description: >-
      Технический timestamp: инжектируется runner'ом (run_silver_transform)
      поверх SQL.
relationships:
  - from: trino_iceberg.iceberg.gold.fct_player_unavailable
    to:   trino_iceberg.iceberg.gold.dim_match
    type: FOREIGN_KEY
    description: match_id -> dim_match.match_id
  - from: trino_iceberg.iceberg.gold.fct_player_unavailable
    to:   trino_iceberg.iceberg.gold.dim_player
    type: FOREIGN_KEY
    description: player_id -> dim_player.player_id
