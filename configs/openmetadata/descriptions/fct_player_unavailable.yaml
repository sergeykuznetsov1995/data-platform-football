# =============================================================================
# OpenMetadata description: iceberg.gold.fct_player_unavailable
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.fct_player_unavailable
  description: |
    Pre-match unavailable / injured / suspended players (E5). Source:
    silver.whoscored_missing_players bridged to FBref match via dim_match
    + dim_player. Orphan-safe: unmapped players keep 'ws_<id>' canonical
    (deferred to E1.5 cross-source player xref).
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: match_id
    description: FK -> dim_match.match_id (FBref-canonical).
  - name: match_date
    description: Match date.
  - name: team_id
    description: FK -> dim_team.team_id (player's team for this match).
  - name: player_id_canonical
    description: FK -> dim_player.player_id; orphan fallback 'ws_<source_id>'.
  - name: player_name
    description: Player display name (raw WhoScored).
  - name: reason
    description: Unavailability reason (injury / suspension / illness / etc.).
  - name: league
    description: League slug.
  - name: season
    description: Season slug.
relationships:
  - from: trino_iceberg.iceberg.gold.fct_player_unavailable
    to:   trino_iceberg.iceberg.gold.dim_match
    type: FOREIGN_KEY
    description: match_id -> dim_match.match_id
  - from: trino_iceberg.iceberg.gold.fct_player_unavailable
    to:   trino_iceberg.iceberg.gold.dim_player
    type: FOREIGN_KEY
    description: player_id_canonical -> dim_player.player_id
