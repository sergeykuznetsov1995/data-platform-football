# =============================================================================
# OpenMetadata description: iceberg.gold.feat_team_xg_form
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.feat_team_xg_form
  description: |
    Per-(team, match) rolling xG / PSxG form features. Two windows: L5 and
    L10 trailing matches. Point-in-time safe (NULL for first 5 matches per
    team). xG sourced from cross-source FBref<->Understat join.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: match_id
    description: FK -> dim_match.match_id.
  - name: team_id
    description: FK -> dim_team.team_id.
  - name: opponent_id
    description: FK -> dim_team.team_id (opposing team).
  - name: xg_for_l5_avg
    description: Trailing 5-match avg xG generated.
  - name: xg_against_l5_avg
    description: Trailing 5-match avg xG conceded.
  - name: xg_diff_l5_avg
    description: Trailing 5-match avg (xg_for - xg_against).
  - name: xg_for_l10_avg
    description: Trailing 10-match avg xG generated.
  - name: psxg_diff_l10_avg
    description: Trailing 10-match avg post-shot xG differential.
  - name: league
    description: League slug.
  - name: season
    description: Season slug.
relationships:
  - from: trino_iceberg.iceberg.gold.feat_team_xg_form
    to:   trino_iceberg.iceberg.gold.dim_team
    type: FOREIGN_KEY
    description: team_id -> dim_team.team_id
