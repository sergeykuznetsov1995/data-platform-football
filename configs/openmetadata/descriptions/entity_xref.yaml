# =============================================================================
# OpenMetadata description: iceberg.gold.entity_xref
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.entity_xref
  description: |
    Кросс-референс внешних ID источников к каноническим ID платформы.
    Один из ключевых строительных блоков Gold-слоя: позволяет проектировать
    систему как Data Mesh — каждый источник (FBref, Understat, SofaScore, ...)
    публикует свои ID, а entity_xref привязывает их к единым canonical_id.
    Для MVP содержит только записи из FBref (team / player / match).
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: entity_type
    description: Тип сущности — 'team' | 'player' | 'match'.
  - name: source
    description: Имя внешнего источника ('fbref', далее 'understat', 'sofascore', ...).
  - name: source_id
    description: Внешний ID сущности как он представлен в источнике.
  - name: canonical_id
    description: Стабильный канонический ID, используемый по всему Gold-слою.
  - name: display_name
    description: Человекочитаемая метка для отладки и UI.
  - name: league
    description: Лига (например 'ENG-Premier League').
  - name: season
    description: Сезон в формате 'YYYY-YYYY' или 'YYYY' (зависит от источника).
relationships:
  - from: canonical_id
    to: trino_iceberg.iceberg.gold.dim_team.team_id
    type: FOREIGN_KEY
  - from: canonical_id
    to: trino_iceberg.iceberg.gold.dim_player.player_id
    type: FOREIGN_KEY
  - from: canonical_id
    to: trino_iceberg.iceberg.gold.dim_match.match_id
    type: FOREIGN_KEY
