# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_player_season_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_player_season_profile
  description: |
    Широкий профиль полевого игрока за сезон из FotMob — один row на
    (player_id, league, season). Содержит per-season идентичность (клуб, позиция)
    и ~34 статистические метрики (голы, ассисты, xG/xA, удары, отборы, дисциплина).
    Источники: bronze.fotmob_player_details (identity) + bronze.fotmob_player_stats
    (статы в LONG-формате, развёрнуты в wide через MAX(CASE WHEN stat_name=...) PIVOT).
    Дедупликация details — ROW_NUMBER PARTITION BY (player_id, league, season)
    ORDER BY _ingested_at DESC. Фильтры: NOT is_coach AND
    LOWER(position_description)<>'keeper' (вратари — в silver.fotmob_keeper_profile).
    primary_position нормализована LOWER() (FotMob отдаёт inconsistent case);
    capitalize — на BI-слое. Время-инвариантные атрибуты (рост/нога/страна/дата
    рождения) — в silver.fotmob_player_profile, не здесь. Идентификаторы сырые
    FotMob — canonical-резолюция в Gold.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
