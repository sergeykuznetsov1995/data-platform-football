# =============================================================================
# OpenMetadata description: iceberg.bronze.fbref_keeper_keeper_adv
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fbref_keeper_keeper_adv
  description: |
    Сезонная продвинутая вратарская статистика из FBref (Advanced Goalkeeping):
    PSxG (post-shot xG), shot-stopping, игра ногами/пасы, выходы и
    sweeper-действия. Гранулярность: один row на (player, squad, league, season).
    Метрики — текстовые (приведение типов в Silver). Источник: FBref scrape
    (dag_ingest_fbref).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: rk
    description: Порядковый номер строки (Rank) в таблице FBref.
  - name: player
    description: Имя вратаря.
    tags:
      - PII.Low
  - name: nation
    description: Код страны игрока (напр. "eng ENG").
  - name: pos
    description: Позиция (обычно GK).
  - name: squad
    description: Клуб игрока.
  - name: age
    description: Возраст игрока.
  - name: born
    description: Год рождения игрока.
  - name: 90s
    description: Число сыгранных 90-минуток (минуты / 90).
  - name: goals_ga
    description: Пропущенные голы (Goals Against).
  - name: goals_pka
    description: Пропущенные пенальти (Penalty Kicks Allowed).
  - name: goals_fk
    description: Пропущенные голы со штрафных (Free Kick goals against).
  - name: goals_ck
    description: Пропущенные голы с угловых (Corner Kick goals against).
  - name: goals_og
    description: Голы, забитые партнёрами в свои ворота (Own Goals against keeper).
  - name: psxg
    description: Post-Shot Expected Goals — ожидаемые голы по ударам в створ.
  - name: psxg/sot
    description: PSxG на удар в створ (PSxG per Shot on Target).
  - name: psxg+/-
    description: PSxG минус пропущенные голы (мера игры на линии; +ve = лучше ожидания).
  - name: /90
    description: PSxG+/- на 90 минут.
  - name: cmp
    description: Точные длинные пасы 40+ ярдов (Launched passes Completed).
  - name: att
    description: Длинные пасы 40+ ярдов — попытки (Launched passes Attempted).
  - name: cmp%
    description: Процент точных длинных пасов (Launched Completion %).
  - name: att (gk)
    description: Все пасы вратаря, кроме ударов от ворот — попытки (Passes Attempted).
  - name: thr
    description: Выбросы рукой (Throws).
  - name: launch%
    description: Доля пасов «в борьбу» 40+ ярдов, % (исключая удары от ворот).
  - name: avglen
    description: Средняя длина паса, ярды (Average pass length).
  - name: att_1
    description: Удары от ворот — попытки (Goal Kicks Attempted).
  - name: launch%_1
    description: Доля ударов от ворот «в борьбу», % (Goal Kick Launch %).
  - name: avglen_1
    description: Средняя длина удара от ворот, ярды.
  - name: opp
    description: Навесы соперника в штрафную (Crosses faced).
  - name: stp
    description: Перехваченные навесы (Crosses Stopped).
  - name: stp%
    description: Процент перехваченных навесов (Crosses Stopped %).
  - name: "#opa"
    description: Оборонительные действия вне штрафной (sweeper, # Out of Penalty Area).
  - name: "#opa/90"
    description: Sweeper-действия вне штрафной на 90 минут.
  - name: avgdist
    description: Средняя дистанция оборонительных действий от ворот, ярды.
  - name: matches
    description: Текст ссылки "Matches" на FBref (служебная колонка из scrape).
  - name: player_id
    description: FBref ID игрока.
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — год начала (bigint, напр. 2025 = сезон 2025/26).
  - name: stat_type
    description: Категория stat-таблицы FBref (для этой таблицы — keeper_adv).
  - name: _source
    description: Источник данных Bronze (всегда 'fbref').
  - name: _entity_type
    description: Внутренняя метка типа сущности ingest-конвейера FBref.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze.
  - name: _batch_id
    description: ID batch'а загрузки (трассировка и идемпотентность ingest).
