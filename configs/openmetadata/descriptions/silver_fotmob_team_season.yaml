# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_team_season
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_team_season
  description: |
    Per-(team, season) team-level season aggregate из FotMob. Rollup из
    silver.fotmob_team_match через SUM / COUNT / AVG (один row на команду
    за сезон). Mirror формы, которую ожидает gold.fct_team_season_stats
    на FotMob-блоке (issue #97 Phase B).
    Главная ценность — `expected_assists` (team-grain xA), которого нет ни
    у Understat, ни у SofaScore на season-grain.
    INCOMPLETE-SEASON caveat: суммируются только матчи со stats_json
    (~89% календаря) → SUM-счётчики (goals/shots) недосчитаны vs полного
    сезона FBref; `appearances` показывает реальное число учтённых матчей.
    PK: (team_id, league, season). team_id = team NAME (== xref source_id).
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob team NAME (varchar) — совпадает с silver.xref_team.source_id (source='fotmob').
  - name: appearances
    description: Число учтённых матчей сезона (COUNT — только матчи со stats_json).
  - name: goals
    description: Голы за сезон (SUM goals_for).
  - name: goals_conceded
    description: Пропущенные голы за сезон (SUM goals_against).
  - name: total_shots
    description: Всего ударов за сезон (SUM).
  - name: shots_on_target
    description: Ударов в створ за сезон (SUM).
  - name: total_passes
    description: Всего пасов за сезон (SUM).
  - name: accurate_passes
    description: Точных пасов за сезон (SUM).
  - name: accurate_passes_pct
    description: Точность пасов, % (recomputed = 100 * SUM(accurate) / SUM(total)).
  - name: yellow_cards
    description: Жёлтые карточки за сезон (SUM).
  - name: red_cards
    description: Красные карточки за сезон (SUM).
  - name: fouls_committed
    description: Фолы за сезон (SUM fouls).
  - name: offsides
    description: Офсайды за сезон (SUM).
  - name: corner_kicks
    description: Угловые за сезон (SUM).
  - name: tackles
    description: Отборы за сезон (SUM).
  - name: interceptions
    description: Перехваты за сезон (SUM).
  - name: clearances
    description: Выносы за сезон (SUM).
  - name: saves
    description: Сейвы вратаря за сезон (SUM).
  - name: possession_pct
    description: Среднее владение мячом за сезон, % (AVG по матчам).
  - name: expected_goals
    description: Сумма xG за сезон (SUM, FotMob модель).
  - name: npxg
    description: Сумма non-penalty xG за сезон (SUM).
  - name: xgot
    description: Сумма xG on target за сезон (SUM). UNIQUE_FOTMOB.
  - name: expected_assists
    description: |
      Сумма xA за сезон (SUM). FotMob — единственный источник team-grain xA;
      raison d'être issue #97 на season-grain.
  - name: big_chances
    description: Big chances за сезон (SUM). UNIQUE_FOTMOB.
  - name: big_chances_missed
    description: Big chances missed за сезон (SUM). UNIQUE_FOTMOB.
  - name: touches_in_box
    description: Касания в штрафной соперника за сезон (SUM).
  - name: shots_inside_box
    description: Удары из штрафной за сезон (SUM). UNIQUE_FOTMOB.
  - name: shots_outside_box
    description: Удары вне штрафной за сезон (SUM). UNIQUE_FOTMOB.
  - name: blocked_shots
    description: Заблокированные удары за сезон (SUM).
  - name: shots_off_target
    description: Удары мимо створа за сезон (SUM).
  - name: _bronze_ingested_at
    description: MAX timestamp Bronze ingest'а (для freshness).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — slug ('2526'), passthrough из fotmob_team_match.
