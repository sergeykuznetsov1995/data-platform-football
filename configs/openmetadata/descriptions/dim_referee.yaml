# =============================================================================
# OpenMetadata description: iceberg.gold.dim_referee
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_referee
  description: |
    Канонический справочник судей (звёздный дизайн, #425). Одна строка =
    один судья. PK — canonical_id из silver.xref_referee (curated-алиасы,
    3 источника: FBref + MatchHistory + FotMob): 'ref_<slug>' для
    распознанных, '<src>_ref_<slug>' для orphan. country — только из FotMob
    (единственный источник национальности судьи). first/last_seen — по датам
    матчей FBref-расписания.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: referee_id
    description: PK — canonical_id из silver.xref_referee ('ref_<slug>' | '<src>_ref_<slug>' для orphan).
  - name: referee_name
    description: Каноническое имя судьи (curated canonical_name; для orphan — FBref-написание).
  - name: country
    description: Страна судьи (FotMob — единственный источник; NULL вне его покрытия).
  - name: first_seen_date
    description: Дата первого матча судьи в данных (FBref schedule).
  - name: last_seen_date
    description: Дата последнего матча судьи в данных (FBref schedule).
  - name: _silver_created_at
    description: Технический timestamp создания строки CTAS-раннером.
relationships: []
