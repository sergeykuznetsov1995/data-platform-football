table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.capology_team_payrolls
  description: |
    Клубные фонды зарплат с capology.com (через scrapers/capology, dag_ingest_capology,
    еженедельно). Grain — один row на (клуб, сезон): суммарный платёжный фонд клуба
    (gross/net, недельный/годовой, бонусы, итоги) сразу в трёх валютах GBP/EUR/USD;
    единицы — целые единицы валюты. Охват: только ENG-Premier League (много сезонов
    2014/15…2025/26). Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
