    description: Capology URL-слаг клуба.
  - name: club_name
    description: Название клуба.
  - name: club_code
    description: Короткий код клуба (может быть NULL).
  - name: weekly_gross_gbp
    description: Недельный фонд зарплат до налога, GBP (bigint); = annual_gross / 52.
