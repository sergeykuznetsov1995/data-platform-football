# =============================================================================
# OpenMetadata description: iceberg.bronze.transfermarkt_market_value_history
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.transfermarkt_market_value_history
  description: |
    Временной ряд рыночной стоимости игроков с transfermarkt.com (JSON ceapi
    marketValueDevelopment через scrapers/transfermarkt, dag_ingest_transfermarkt,
    еженедельно). Grain — один row на точку (player_id, mv_date); даты исторические
    (вплоть до 2011), стоимость в EUR. Охват: только ENG-Premier League (MVP).
    Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: player_id
    description: Transfermarkt id игрока (varchar).
  - name: mv_date
    description: Дата точки рыночной стоимости (date); может быть в далёком прошлом.
  - name: value_eur
    description: Рыночная стоимость игрока на эту дату, EUR (bigint).
  - name: club_name
    description: Клуб игрока на эту дату (может быть историческим).
  - name: age
    description: Возраст игрока на эту дату (bigint).
  - name: mv_raw
    description: Сырая строка стоимости от Transfermarkt (e.g. '€300k'); в Silver отбрасывается.
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон ingest'а в коротком виде (e.g. '2526'), НЕ дата точки; partition key.
  - name: _source
    description: Источник данных ('transfermarkt'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
