# =============================================================================
# OpenMetadata description: iceberg.bronze.fotmob_team_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fotmob_team_profile
  description: |
    Сырой профиль команды из FotMob (endpoint /api/data/teams по team_id из
    турнирной таблицы, через scrapers/fotmob, dag_ingest_fotmob). Grain — один
    row на команду за сезон: страна, стадион, текущая позиция, ближайший и
    прошлый матчи. Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob id команды (bigint).
  - name: team_name
    description: Полное название команды.
  - name: short_name
    description: Короткое название команды.
  - name: country
    description: Страна команды.
  - name: venue
    description: Название домашнего стадиона.
  - name: overview_season
    description: Сезон, к которому относится обзор (varchar).
  - name: overview_table_position
    description: Текущее место команды в таблице (varchar).
  - name: next_match
    description: Сырой JSON ближайшего матча (строка; NULL если будущих матчей нет).
  - name: last_match
    description: Сырой JSON последнего сыгранного матча (строка).
  - name: history_seasons_count
    description: Число сезонов в истории команды на FotMob (varchar).
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон — год начала (bigint, e.g. 2025); partition key.
  - name: _source
    description: Источник данных ('fotmob'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
