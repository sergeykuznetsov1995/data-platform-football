# =============================================================================
# OpenMetadata description: iceberg.gold.fct_match_rating
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.fct_match_rating
  description: |
    Per-(match, player) SofaScore performance ratings (E4). Source:
    silver.sofascore_player_ratings. Grain: rating_canonical (xxhash64 of
    match|player). Used as feature/target for ML and as scouting signal.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: rating_canonical
    description: Logical PK (xxhash64 over match + player).
  - name: match_id_canonical
    description: FK -> dim_match.match_id.
  - name: team_id_canonical
    description: FK -> dim_team.team_id.
  - name: player_id_canonical
    description: FK -> dim_player.player_id.
  - name: rating
    description: SofaScore player rating (typical range 4.0-10.0; NULL if not graded).
  - name: rating_source
    description: Source label ('sofascore').
  - name: league
    description: League slug.
  - name: season
    description: Season (BIGINT).
relationships:
  - from: trino_iceberg.iceberg.gold.fct_match_rating
    to:   trino_iceberg.iceberg.gold.dim_player
    type: FOREIGN_KEY
    description: player_id_canonical -> dim_player.player_id
