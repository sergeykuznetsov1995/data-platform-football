# =============================================================================
# OpenMetadata description: iceberg.gold.dim_match
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_match
  description: |
    Размерность матча: дата, тур, домашняя/гостевая команды, счёт, исход 1X2.
    Один матч = одна строка (PK match_id). Источник истины для всех fct_*
    и feat_*-таблиц, ссылающихся на match_id. Включает производные поля
    result_1x2, total_goals, btts, is_completed.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: match_id
    description: Канонический ID матча (FBref match_id).
  - name: date
    description: Дата матча (UTC date).
  - name: gameweek
    description: Номер тура чемпионата.
  - name: time
    description: Время начала (локальное, как у источника).
  - name: venue
    description: Стадион проведения матча.
  - name: referee
    description: Имя судьи.
  - name: attendance
    description: Посещаемость (число зрителей).
  - name: home_team_id
    description: Канонический ID домашней команды (FK -> dim_team.team_id).
  - name: away_team_id
    description: Канонический ID гостевой команды (FK -> dim_team.team_id).
  - name: home_team_name
    description: Имя домашней команды (для отладки/UI).
  - name: away_team_name
    description: Имя гостевой команды (для отладки/UI).
  - name: home_score
    description: Голы домашней команды.
  - name: away_score
    description: Голы гостевой команды.
  - name: result_1x2
    description: Исход 1X2 — 'H' (home wins) | 'A' (away wins) | 'D' (draw). NULL до окончания матча.
  - name: total_goals
    description: Сумма голов в матче (home_score + away_score).
  - name: btts
    description: Both Teams To Score — обе команды забили (boolean).
  - name: is_completed
    description: Матч сыгран и счёт известен (boolean).
  - name: league
    description: Лига.
  - name: season
    description: Сезон.
relationships:
  - from: home_team_id
    to: trino_iceberg.iceberg.gold.dim_team.team_id
    type: FOREIGN_KEY
  - from: away_team_id
    to: trino_iceberg.iceberg.gold.dim_team.team_id
    type: FOREIGN_KEY
