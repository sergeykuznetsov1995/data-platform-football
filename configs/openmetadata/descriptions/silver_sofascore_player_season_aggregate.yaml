# =============================================================================
# OpenMetadata description: iceberg.silver.sofascore_player_season_aggregate
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.sofascore_player_season_aggregate
  description: |
    Сезонная статистика игрока из SofaScore — один row на
    (canonical_id, league, season). Самый полный набор метрик среди источников
    (дуэли, обводки, разбивка пенальти и голов). Источник:
    bronze.sofascore_player_season_stats (уже season-grain, без агрегации) INNER
    JOIN silver.xref_player (source='sofascore', non-orphan) с обязательным
    предикатом (league, season). Orphan-игроки отфильтрованы — они не bridge'атся
    к FBref-spine на Gold. Дедуп: ROW_NUMBER PARTITION BY
    (player_id, league, season) ORDER BY _ingested_at DESC. Форма зеркалит
    understat/whoscored player_season_aggregate для LEFT JOIN на Gold.
    canonical_id — FK → gold.dim_player.player_id.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
