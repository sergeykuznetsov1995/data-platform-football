# =============================================================================
# OpenMetadata description: iceberg.gold.mart_event_heatmap
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.mart_event_heatmap
  description: |
    BI mart for pitch heatmap visualisations (E7). Per-(team, season, league,
    zone, action) SPADL action distribution over a 12x8 grid (zone_x in 0..11,
    zone_y in 0..7) computed from fct_event x/y (SPADL 0-100). Excludes
    'unknown' meta-events.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FK -> dim_team.team_id (PK component).
  - name: team_name
    description: Team display name (denormalised).
  - name: season
    description: Season slug (PK component).
  - name: league
    description: League slug (PK component).
  - name: zone_x
    description: 0..11 horizontal zone bin (FLOOR(x / (100/12))).
  - name: zone_y
    description: 0..7 vertical zone bin (FLOOR(y / (100/8))).
  - name: action_canonical
    description: SPADL canonical action type (PK component).
  - name: event_count
    description: Number of events of this action in this zone (PK aggregate).
  - name: success_rate
    description: Share of events where outcome_success = TRUE.
relationships:
  - from: trino_iceberg.iceberg.gold.mart_event_heatmap
    to:   trino_iceberg.iceberg.gold.dim_team
    type: FOREIGN_KEY
    description: team_id -> dim_team.team_id
  - from: trino_iceberg.iceberg.gold.mart_event_heatmap
    to:   trino_iceberg.iceberg.gold.fct_event
    type: FOREIGN_KEY
    description: Aggregated from fct_event by (team, zone, action).
