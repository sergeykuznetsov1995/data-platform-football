# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_team_leaderboards
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_team_leaderboards
  description: |
    Conform-only сезонные командные лидерборды из FotMob (issue #600), long-form.
    Один row per (team_id, stat_category_group, stat_name, league, season):
    место (rank) + значение метрики (stat_value) на команду в каждой статкатегории.
    Грейн bronze сохранён (charter §1) — НЕ PIVOT, НЕ rollup. Источник:
    bronze.fotmob_leaderboards_current (index /api/data/leagues + полные списки
    data.fotmob.com/stats). Низкоценные колонки (participant_name/team_color/
    country_code) не переносятся. canonical_id не резолвится (numeric team_id +
    team_name, резолв в Gold). Native current view выбирает последние успешные
    manifest batches.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob id команды (bigint). Raw passthrough — резолв canonical в Gold.
  - name: team_name
    description: Название команды (для JOIN на silver.xref_team в Gold).
  - name: stat_category_group
    description: Группа категорий статистики (часть natural key).
  - name: stat_name
    description: Имя метрики лидерборда (часть natural key).
  - name: rank
    description: Место команды в рейтинге по метрике.
  - name: stat_value
    description: Значение метрики (double).
  - name: sub_stat_value
    description: Вторичное значение метрики (double).
  - name: stat_value_count
    description: База подсчёта метрики (bigint).
  - name: matches_played
    description: Сыграно матчей.
  - name: minutes_played
    description: Сыграно минут.
  - name: stat_category_header
    description: Заголовок категории статистики.
  - name: _bronze_ingested_at
    description: Timestamp native-наблюдения Bronze (для freshness).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — slug ('2526'), из bronze season bigint через LPAD(MOD(season,100))||LPAD(MOD(season+1,100)).
