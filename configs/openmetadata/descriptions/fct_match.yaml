table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.fct_match
  description: |
    Wide-form факт-таблица для ML: один матч = одна строка с готовыми
    pre-match-фичами (home/away rolling form L5, H2H, xG L5/L10) и
    ML-таргетами (result_1x2, total_goals, btts). Готова к обучению моделей
    1X2, BTTS, totals. Все фичи point-in-time safe (NULL для первых матчей).
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
    - UseCase.ML
columns:
  - name: match_id
    description: PK; ссылается на dim_match.match_id.
  - name: date
    description: Дата матча.
  - name: gameweek
    description: Номер тура.
  - name: home_team_id
    description: Домашняя команда (FK -> dim_team.team_id).
  - name: away_team_id
    description: Гостевая команда (FK -> dim_team.team_id).
  - name: home_team_name
    description: Имя домашней команды.
  - name: away_team_name
    description: Имя гостевой команды.
  - name: home_score
    description: ML target — голы дома.
  - name: away_score
    description: ML target — голы в гостях.
  - name: result_1x2
    description: ML target — исход 1X2 ('H'/'A'/'D').
  - name: total_goals
    description: ML target — сумма голов.
  - name: btts
