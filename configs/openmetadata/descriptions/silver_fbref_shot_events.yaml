# =============================================================================
# OpenMetadata description: iceberg.silver.fbref_shot_events
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fbref_shot_events
  description: |
    Детальные удары с xG — по строке на удар. Несколько строк на матч.
    Источник: bronze.fbref_shot_events (без JOIN'ов). xg/psxg = DOUBLE,
    distance = INTEGER (TRY_CAST), остальное VARCHAR. Дедупликация:
    ROW_NUMBER PARTITION BY (match_id, minute, player_id, outcome) ORDER BY
    _ingested_at DESC.
    ВНИМАНИЕ: Bronze-источник OPTIONAL — FBref shot-данные могут
    отсутствовать (restriction с фев-2026); Silver-трансформ gracefully
    скипает таблицу, если Bronze нет.
    match_id — сырой FBref-идентификатор (FK → silver.fbref_match_enriched).
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
columns:
  - name: match_id
    description: ID матча (FK → silver.fbref_match_enriched.match_id).
  - name: minute
    description: Минута удара (строка, может содержать добавленное время).
  - name: player
    description: Игрок, нанёсший удар.
    tags:
      - PII.Low
  - name: player_id
    description: Сырой FBref player_id бьющего.
  - name: team
    description: Команда бьющего (название как на FBref).
  - name: xg
    description: Expected Goals удара (xG) — модельная вероятность гола, DOUBLE.
  - name: psxg
    description: |
      Post-Shot Expected Goals (psxg) — xG с поправкой на точность створа
      (учитывает, куда летел мяч), DOUBLE.
  - name: outcome
    description: Исход удара (Goal / Saved / Off Target / Blocked / ...).
  - name: distance
    description: Дистанция удара до ворот в ярдах, INTEGER (TRY_CAST).
  - name: body_part
    description: Часть тела при ударе (Right Foot / Left Foot / Head / ...).
  - name: notes
    description: Примечания к удару (например тип розыгрыша / стандарт), может быть NULL.
  - name: _bronze_ingested_at
    description: Технический timestamp ingest'а Bronze (lineage).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон short-form '2526' (partition key).
  - name: _silver_created_at
    description: Технический timestamp создания строки в Silver-слое (добавляется CTAS-раннером).
relationships:
  - from: match_id
    to: trino_iceberg.iceberg.silver.fbref_match_enriched.match_id
    type: FOREIGN_KEY
    description: N:1 — удары матча.
