# =============================================================================
# OpenMetadata description: iceberg.gold.dim_player_attributes
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_player_attributes
  description: |
    Cross-source snapshot per игрок — один row per canonical_id. Time-invariant
    атрибуты (dob, height, foot, nationality, контракт) с per-source колонками
    без winning-value logic — потребитель выбирает источник. FBref-spine:
    WHERE source='fbref' AND confidence != 'orphan'. SofaScore-side читает
    silver.sofascore_player_profile (canonical_id уже подтянут в Silver).
    Transfermarkt-side после native-v2 cutover читает conflict-safe
    silver.transfermarkt_player_attributes_v2 — primary источник для height_cm
    и current_market_value_eur (EUR, не USD-конверсия). НЕ заменяет
    gold.dim_player (per-season, FBref-only). См. docs/research/
    RX_cross_source_player_profile.md для полного rationale (D1-D4 решений).

    SoFIFA-side (issue #42) читает silver.sofifa_player_profile (canonical_id
    подтянут в Silver). ВНИМАНИЕ: колонки *_sofifa — это game-side рейтинги
    EA Sports FC (мнение видеоигры, 0-99), а НЕ реальные метрики матчей.
    FIFA/FC edition маппится на football-season по году конца сезона
    (EA FC 26 → сезон 2025/26 → slug '2526').
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.Low
columns:
  - name: player_id
    description: Канонический ID игрока (`fb_<xxhash64>` для FBref-spine). PK.
  - name: player_name
    description: COALESCE(FBref → FotMob → SofaScore) — name fallback chain.
    tags:
      - PII.Low
  - name: current_team_name
    description: Команда из FBref (per-spine, 100% coverage).
  - name: born_year_fbref
    description: Год рождения из FBref (year-only — FBref не отдаёт точную дату).
    tags:
      - PII.Low
  - name: dob_fotmob
    description: Полная дата рождения из FotMob (date_of_birth).
    tags:
      - PII.Low
  - name: dob_sofascore
    description: Полная дата рождения из SofaScore /player/{id} (cross-validation для dob_fotmob).
    tags:
      - PII.Low
  - name: nationality_fbref
    description: Национальность из FBref (per-season snapshot, latest сезон).
  - name: nationality_fotmob
    description: Национальность из FotMob (snapshot).
  - name: nationality_sofascore
    description: Национальность из SofaScore (snapshot из /player/{id}).
  - name: country_code_fotmob
    description: ISO 3166-1 alpha-2 код страны из FotMob.
  - name: country_code_sofascore
    description: ISO 3166-1 alpha-2 код страны из SofaScore (country.alpha2).
  - name: height_cm_fotmob
    description: Рост в см из FotMob team_squad (≈93% coverage APL 2025).
  - name: height_cm_sofascore
    description: Рост в см из SofaScore /player/{id} (≈99% coverage APL 2025).
  - name: foot_fotmob
    description: Ведущая нога из FotMob (Right/Left/Both).
  - name: foot_sofascore
    description: Ведущая нога из SofaScore (preferredFoot, обычно совпадает с FotMob).
  - name: shirt_number_fotmob
    description: Номер на футболке из FotMob (текущий сезон).
  - name: shirt_number_sofascore
    description: Номер на футболке из SofaScore /player/{id}.
  - name: retired_sofascore
    description: Флаг "ушёл из футбола" из SofaScore (boolean, может быть NULL).
  - name: contract_end_fotmob
    description: Дата окончания контракта (FotMob; slowly-changing, as-of-latest-ingest).
  - name: current_market_value_eur_fotmob
    description: Текущая рыночная стоимость EUR из FotMob market_values_json.timeline (latest точка).
  - name: market_value_currency_fotmob
    description: Валюта рыночной стоимости (обычно EUR).
  - name: height_cm_tm
    description: Рост в см из Transfermarkt (парсинг с официального профиля клуба, наиболее точный из источников).
  - name: dob_tm
    description: Полная дата рождения из Transfermarkt.
    tags:
      - PII.Low
  - name: foot_tm
    description: Ведущая нога из Transfermarkt (right/left/both).
  - name: nationality_tm
    description: Национальность из Transfermarkt (full country name, не ISO code).
  - name: current_market_value_eur_tm
    description: Текущая рыночная стоимость EUR из Transfermarkt (primary use-case; snapshot as-of-latest-ingest, full timeline в gold.fct_player_market_value — issue #11).
  - name: mv_last_update_tm
    description: Дата последнего обновления market value на Transfermarkt.
  - name: contract_until_tm
    description: Дата окончания контракта из Transfermarkt (slowly-changing, snapshot).
  # --- SoFIFA block (issue #609): identity + контрактные атрибуты. Game-side
  # EA-рейтинги (overall/pace/value_eur/wage_eur/…) переехали в gold-факт
  # fct_player_fifa_rating per-(player, fifa_edition). ---
  - name: release_clause_eur_sofifa
    description: Game-side сумма отступных в EUR (если задана).
  - name: contract_valid_until_sofifa
    description: Год окончания контракта по данным игры.
  - name: joined_sofifa
    description: Дата присоединения к клубу по данным игры.
  - name: position_sofifa
    description: Игровая позиция по данным SoFIFA (e.g. CB, RM, GK).
  - name: dob_sofifa
    description: Дата рождения из профиля SoFIFA.
    tags:
      - PII.Low
  - name: height_cm_sofifa
    description: Рост в см из профиля SoFIFA.
  - name: weight_kg_sofifa
    description: Вес в кг из профиля SoFIFA (единственный источник веса в платформе).
  - name: nationality_sofifa
    description: Национальность из профиля SoFIFA (флаг страны).
  - name: _gold_created_at
    description: Технический timestamp создания строки в Gold-слое.
