# =============================================================================
# OpenMetadata description: iceberg.gold.dim_manager
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.dim_manager
  description: |
    Канонический справочник тренеров (звёздный дизайн, #425). Одна строка =
    один тренер. PK — canonical_id из silver.xref_manager (FBref + FotMob).
    История работы («кто когда тренировал какую команду») здесь НЕ хранится —
    она уезжает в gold.fct_manager_stint (#429); прежняя SCD-2 версия этой
    таблицы доступна в git-истории dim_manager.sql. nationality/dob обогащаются
    из FotMob (текущий сезон) и native global
    silver.transfermarkt_coach_profiles_v2, приоритет FotMob > TM (#434).
    Transfermarkt stints остаются отдельным фактом и не смешиваются с
    match-derived fct_manager_stint; конфликтный source bridge не обогащает
    canonical manager. Тренер без покрытия остаётся NULL.
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.Low
columns:
  - name: manager_id
    description: PK — canonical_id из silver.xref_manager.
  - name: manager_name
    description: Имя тренера (приоритет FBref display_name). PII.Low — публично известное лицо.
    tags:
      - PII.Low
  - name: nationality
    description: Гражданство тренера (полное название страны). Источники FotMob > Transfermarkt (#434); NULL, если тренер не покрыт.
  - name: dob
    description: Дата рождения тренера. Источники FotMob > Transfermarkt (#434); NULL, если тренер не покрыт.
  - name: _silver_created_at
    description: Технический timestamp создания строки CTAS-раннером.
relationships: []
