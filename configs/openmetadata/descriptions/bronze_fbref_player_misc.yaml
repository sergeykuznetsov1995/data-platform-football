# =============================================================================
# OpenMetadata description: iceberg.bronze.fbref_player_misc
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fbref_player_misc
  description: |
    Сезонная «прочая» статистика игроков из FBref (Miscellaneous Stats):
    карточки, фолы, офсайды, навесы, перехваты, отборы, пенальти, автоголы.
    Гранулярность: один row на (player, squad, league, season). Метрики —
    текстовые (приведение типов в Silver). Источник: FBref scrape
    (dag_ingest_fbref).
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
columns:
  - name: rk
    description: Порядковый номер строки (Rank) в таблице FBref.
  - name: player
    description: Имя игрока.
    tags:
      - PII.Low
  - name: nation
    description: Код страны игрока (напр. "eng ENG").
  - name: pos
    description: Позиция игрока.
  - name: squad
    description: Клуб игрока.
  - name: age
    description: Возраст игрока.
  - name: born
    description: Год рождения игрока.
  - name: 90s
    description: Число сыгранных 90-минуток (минуты / 90).
  - name: crdy
    description: Жёлтые карточки.
  - name: crdr
    description: Красные карточки.
  - name: 2crdy
    description: Вторые жёлтые карточки (удаление за две жёлтые).
  - name: fls
    description: Фолы совершённые.
  - name: fld
    description: Фолы заработанные (на игроке сфолили).
  - name: "off"
    description: Положения вне игры (офсайды).
  - name: crs
    description: Навесы (crosses).
  - name: int
    description: Перехваты (interceptions).
  - name: tklw
    description: Отборы с возвратом владения (Tackles Won).
  - name: pkwon
    description: Заработанные пенальти.
  - name: pkcon
    description: Привезённые пенальти.
  - name: og
    description: Автоголы.
  - name: matches
    description: Текст ссылки "Matches" на FBref (служебная колонка из scrape).
  - name: player_id
    description: FBref ID игрока.
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — год начала (bigint, напр. 2025 = сезон 2025/26).
  - name: stat_type
    description: Категория stat-таблицы FBref (для этой таблицы — misc).
  - name: _source
    description: Источник данных Bronze (всегда 'fbref').
  - name: _entity_type
    description: Внутренняя метка типа сущности ingest-конвейера FBref.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze.
  - name: _batch_id
    description: ID batch'а загрузки (трассировка и идемпотентность ingest).
