# =============================================================================
# OpenMetadata description: iceberg.gold.feat_team_event_style
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.gold.feat_team_event_style
  description: |
    Per-(team, match) rolling event-style features (E6). 5-match trailing
    window over fct_event-derived action shares (pass/dribble/tackle/cross/etc.).
    Point-in-time safe (NULL for first 5 matches per team).
  tags:
    - Tier.Gold
    - Domain.Football
    - PII.None
columns:
  - name: match_id
    description: FK -> dim_match.match_id.
  - name: team_id
    description: FK -> dim_team.team_id.
  - name: pass_share_l5_avg
    description: Trailing 5-match share of pass actions among team events.
  - name: dribble_share_l5_avg
    description: Trailing 5-match share of dribble actions.
  - name: tackle_share_l5_avg
    description: Trailing 5-match share of tackles.
  - name: shot_share_l5_avg
    description: Trailing 5-match share of shots.
  - name: success_rate_l5_avg
    description: Trailing 5-match avg event success rate.
  - name: set_piece_share_l5_avg
    description: Trailing 5-match share of set-piece actions.
  - name: open_play_share_l5_avg
    description: Trailing 5-match share of open-play actions.
  - name: header_share_l5_avg
    description: Trailing 5-match share of header actions.
  - name: league
    description: League slug.
  - name: season
    description: Season slug.
relationships:
  - from: trino_iceberg.iceberg.gold.feat_team_event_style
    to:   trino_iceberg.iceberg.gold.fct_event
    type: FOREIGN_KEY
    description: Aggregated from fct_event by (team_id, match_id).
