# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_player_profile
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_player_profile
  description: |
    Время-инвариантный снимок атрибутов игрока из FotMob — один row на
    (player_id, league, season). Хранит то, что не меняется внутри сезона: рост,
    дату рождения, национальность, ведущую ногу, номер на футболке, действующий
    контракт и последнюю рыночную стоимость. Источники — manifest-backed native
    views: fotmob_squad_snapshots_current (рост / дата рождения / страна / код /
    номер для текущего ростера), fotmob_player_snapshots_current (`foot`, contract,
    market value) и fotmob_leaderboards_current (историческое сезонное членство).
    Глобальные снапшоты получают (league, season) через competition seasons и
    season teams. `is_current_season` помечает selected/latest сезон; исторические
    leaderboard-строки честно имеют NULL squad-only атрибуты и исключены из DQ
    coverage роста/ноги. Фильтр NOT is_coach. Идентификаторы сырые FotMob —
    canonical-резолюция в Gold.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
columns:
  - name: player_id
    description: Сырой FotMob player_id (FK → gold.dim_player через xref_player в Gold).
  - name: player_name
    description: Имя игрока (FotMob name).
    tags:
      - PII.Low
  - name: date_of_birth
    description: Дата рождения игрока (varchar ISO YYYY-MM-DD из текущего squad snapshot; для исторических leaderboard-only строк может быть NULL).
    tags:
      - PII.Low
  - name: height_cm
    description: Рост игрока в сантиметрах (CAST→INTEGER; coverage измеряется только где is_current_season=true).
    tags:
      - PII.Low
  - name: nationality
    description: Национальность игрока (полное название страны, например 'England').
    tags:
      - PII.Low
  - name: country_code
    description: Код страны игрока (например 'ENG').
    tags:
      - PII.Low
  - name: contract_end
    description: Дата окончания контракта (DATE; ISO-substring из JSON $.utcTime с COALESCE на сырое значение, TRY_CAST; NULL для безконтрактных).
    tags:
      - PII.Low
  - name: current_market_value_eur
    description: Последняя рыночная стоимость игрока в EUR (MAX_BY по дате из market_values_json timeline, BIGINT).
  - name: market_value_currency
    description: Валюта рыночной стоимости (обычно EUR).
  - name: primary_team_id
    description: Сырой FotMob team_id текущего клуба (FK → gold.dim_team через xref_team в Gold).
  - name: primary_team_name
    description: Название текущего клуба игрока.
  - name: foot
    description: Ведущая нога ('Right' / 'Left' / 'Both'); извлечена из player_information_json по title='Preferred foot' (единственный источник, ~97% покрытие).
    tags:
      - PII.Low
  - name: shirt_number
    description: Игровой номер на футболке (CAST→INTEGER; источник fotmob_squad_snapshots_current).
  - name: is_current_season
    description: Boolean из native season axis (is_selected OR is_latest). TRUE означает живой roster scope; FALSE — историческое членство из leaderboards.
  - name: _bronze_ingested_at
    description: Технический timestamp native Bronze lineage (GREATEST по player/squad snapshots).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — varchar slug ('2526' = сезон 2025/26), partition key.
  - name: _silver_created_at
    description: Технический timestamp создания строки в Silver-слое (добавляется CTAS-раннером).
relationships: []
