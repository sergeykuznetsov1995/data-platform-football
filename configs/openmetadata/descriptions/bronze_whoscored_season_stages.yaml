# =============================================================================
# OpenMetadata description: iceberg.bronze.whoscored_season_stages
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.whoscored_season_stages
  description: |
    Справочник стадий турнира из WhoScored, разобранный parser v2 из сохранённой
    raw-копии season page. Очень маленькая таблица (~6 строк): различает
    кубковые стадии и лиговый формат, несёт region/tournament/season/stage
    идентификаторы WhoScored. Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон в формате WhoScored 'YYZZ' (e.g. '2425'); partition key.
  - name: region_id
    description: Внутренний идентификатор региона/страны WhoScored.
  - name: league_id
    description: Внутренний идентификатор лиги WhoScored.
  - name: season_id
    description: Внутренний идентификатор сезона WhoScored.
  - name: stage_id
    description: Идентификатор стадии турнира WhoScored.
  - name: stage
    description: Название стадии турнира (обычно NULL для лиг; заполняется для кубковых форматов).
  - name: _source
    description: Источник данных ('whoscored'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
