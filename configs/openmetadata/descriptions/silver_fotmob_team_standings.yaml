# =============================================================================
# OpenMetadata description: iceberg.silver.fotmob_team_standings
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fotmob_team_standings
  description: |
    Conform-only турнирная таблица per-season из FotMob (issue #600), из
    bronze.fotmob_team_stats (endpoint /api/data/leagues, table.all). Один row
    per (team_id, league, season): место + игры/победы/голы/очки. Season-grain
    SNAPSHOT, который FotMob отдаёт напрямую — НЕ rollup из match-grain, поэтому
    conform (charter §2). `form` (100% NULL) не переносится. Snapshot-семантика:
    при ingest в середине сезона played < полного календаря. canonical_id не
    резолвится (numeric team_id + team_name, резолв в Gold). Дедуп: ROW_NUMBER
    per (team_id, league, season) ORDER BY _ingested_at DESC.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: FotMob id команды (bigint). Raw passthrough — резолв canonical в Gold.
  - name: team_name
    description: Название команды (для JOIN на silver.xref_team в Gold).
  - name: position
    description: Место в турнирной таблице.
  - name: played
    description: Сыграно матчей.
  - name: wins
    description: Победы.
  - name: draws
    description: Ничьи.
  - name: losses
    description: Поражения.
  - name: goals_for
    description: Забито голов.
  - name: goals_against
    description: Пропущено голов.
  - name: goal_diff
    description: Разница мячей.
  - name: points
    description: Очки.
  - name: _bronze_ingested_at
    description: Timestamp Bronze ingest'а (для freshness).
  - name: league
    description: Лига (partition key).
  - name: season
    description: Сезон — slug ('2526'), из bronze season bigint через LPAD(MOD(season,100))||LPAD(MOD(season+1,100)).
