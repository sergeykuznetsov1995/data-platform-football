table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fbref_team_season_profile
  description: |
    Широкий профиль команды за сезон — один row на (team_id, league, season).
    Аналог player_season_profile на уровне команды; основной feed для Gold
    командных фактов и фич (сила атаки/обороны, тренд владения, вратарские
    агрегаты). Склейка по (team_id, league, season): fbref_team_stats (база),
    fbref_team_shooting, fbref_team_misc, fbref_team_playingtime, плюс
    fbref_keeper_keeper, агрегированный к уровню команды по (squad, league,
    season): счётчики суммируются, save% взвешивается по SOTA. Каждый источник
    дедуплицируется через ROW_NUMBER ... ORDER BY _ingested_at DESC.
    Командные Bronze-таблицы уже типизированы (bigint/double) — TRY_CAST нужен
    только для вратарских агрегатов. Идентификаторы сырые FBref
    (canonical-резолюция — в Gold).
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.None
