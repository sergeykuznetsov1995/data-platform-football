# =============================================================================
# OpenMetadata description: iceberg.silver.xref_manager
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.xref_manager
  description: |
    Кросс-источниковый справочник тренеров (главных). Три источника:
    FBref (bronze.fbref_match_managers — spine, есть только имя, без стабильного id)
    + FotMob (manifest-backed bronze.fotmob_squad_snapshots_current,
    member_type='coach': member_id → stable coachId, member_name → glue)
    + native Transfermarkt coach stints/profiles. FotMob current squad row is the
    mandatory driver; player_snapshots_current is only a LEFT name fallback, so a
    coach без player profile не исчезает. Один row на
    (source, source_id, league, season). Cascade: curated alias → normalized name →
    unique surname/initial (TM) → orphan.
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
columns:
  - name: canonical_id
    description: Name-based slug тренера (strip-диакритики → '[^a-z0-9]+'→'_'); одинаков для FBref и FotMob при идентичном написании.
  - name: source
    description: Источник тренера — fbref (spine), fotmob или transfermarkt.
  - name: source_id
    description: FBref — сырое имя; FotMob — stable squad member_id (coachId); Transfermarkt — coach_id.
  - name: display_name
    description: Сырое имя тренера из источника (персональные данные).
  - name: league
    description: Код лиги (например 'ENG-Premier League').
  - name: season
    description: Нормализованный сезон (varchar; в Bronze хранится BIGINT).
  - name: confidence
    description: "Уровень привязки: name_alias / name_normalize / name_initial / orphan."
  - name: match_score
    description: Всегда NULL — fuzzy-скоринга для тренеров нет.
  - name: _silver_created_at
    description: Технический timestamp создания строки в Silver-слое (добавляется CTAS-раннером).
relationships: []
