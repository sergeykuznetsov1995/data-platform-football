table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofascore_player_season_stats
  description: |
    Сырая сезонная статистика игроков из SofaScore (endpoint
    /player/{id}/.../statistics через dag_ingest_sofascore, задача
    _run_player_season_stats). Grain — один row на игрока за сезон (snapshot,
    full refresh каждый прогон). ~110 Opta-метрик за сезон: голы/пасы/отборы/
    дриблинг/единоборства/вратарские. Кормит Silver-агрегаты по игрокам.
    Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.Low
