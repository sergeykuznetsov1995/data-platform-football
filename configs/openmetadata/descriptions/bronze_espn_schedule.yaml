# =============================================================================
# OpenMetadata description: iceberg.bronze.espn_schedule
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.espn_schedule
  description: |
    Сырое расписание матчей из ESPN (soccerdata ESPN.read_schedule через
    dag_ingest_espn). Grain — один row на матч. Несёт команды, числовой
    ESPN match_id и время начала матча. Используется Silver как источник
    написаний команд (xref_team) и дат матчей (xref_match).
    Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон в формате 'YYZZ' (e.g. '2526'); partition key.
  - name: game
    description: Строковый идентификатор матча ESPN (slug с префиксом-датой, e.g. '2025-08-15 Liverpool-AFC Bournemouth').
  - name: match_date
    description: Дата и время начала матча (timestamp).
  - name: home_team
    description: Название домашней команды.
  - name: away_team
    description: Название гостевой команды.
  - name: game_id
    description: Числовой ESPN match_id (bigint).
  - name: league_id
    description: Внутренний идентификатор лиги ESPN.
  - name: _source
    description: Источник данных ('espn'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
