# =============================================================================
# OpenMetadata description: iceberg.bronze.fotmob_team_leaderboards
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.fotmob_team_leaderboards
  description: |
    Сырые сезонные командные лидерборды из FotMob (index /api/data/leagues +
    полные списки data.fotmob.com/stats/.../<category>.json через scrapers/fotmob,
    dag_ingest_fotmob). Long-form: grain — один row на (команда, статистическая
    категория) с местом и значением. Партиционирование ['league','season'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: participant_name
    description: Имя участника рейтинга (для team-лидербордов = название команды).
  - name: team_id
    description: FotMob id команды (bigint).
  - name: team_name
    description: Название команды.
  - name: team_color
    description: Цвет команды (hex-код).
  - name: country_code
    description: Код страны команды.
  - name: rank
    description: Место команды в рейтинге по метрике.
  - name: stat_value
    description: Значение метрики (double).
  - name: sub_stat_value
    description: Вторичное значение метрики (double).
  - name: stat_value_count
    description: База подсчёта метрики (bigint).
  - name: matches_played
    description: Сыграно матчей.
  - name: minutes_played
    description: Сыграно минут.
  - name: stat_category_header
    description: Заголовок категории статистики.
  - name: stat_category_group
    description: Группа категорий статистики.
  - name: stat_name
    description: Имя метрики лидерборда.
  - name: league
    description: Лига (e.g. 'ENG-Premier League'); partition key.
  - name: season
    description: Сезон — год начала (bigint, e.g. 2025); partition key.
  - name: _source
    description: Источник данных ('fotmob'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
