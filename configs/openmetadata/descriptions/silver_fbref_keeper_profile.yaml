table:
  fullyQualifiedName: trino_iceberg.iceberg.silver.fbref_keeper_profile
  description: |
    Широкий профиль вратаря за сезон — один row на (player_id, league, season).
    Базовая таблица fbref_player_stats отфильтрована до вратарей
    (pos LIKE '%GK%') и склеена с fbref_keeper_keeper (вратарские метрики),
    fbref_player_shooting и fbref_player_misc по (player_id, league, season).
    Каждый источник дедуплицируется через ROW_NUMBER ... ORDER BY
    _ingested_at DESC до JOIN. Все числовые — TRY_CAST.
    Идентификаторы сырые FBref (canonical-резолюция — в Gold).
  tags:
    - Tier.Silver
    - Domain.Football
    - PII.Low
