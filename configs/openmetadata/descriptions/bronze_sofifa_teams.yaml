# =============================================================================
# OpenMetadata description: iceberg.bronze.sofifa_teams
# =============================================================================
table:
  fullyQualifiedName: trino_iceberg.iceberg.bronze.sofifa_teams
  description: |
    Каталог команд с sofifa.com — сайта-зеркала рейтингов из видеоигры EA Sports FC /
    FIFA (через scrapers/sofifa + FlareSolverr, dag_ingest_sofifa, еженедельно). Grain —
    один row на (команда, издание игры). Несёт только идентификацию команды (командные
    рейтинги attack/midfield/defence в этой таблице отсутствуют). Партиционирование
    ['fifa_edition'].
  tags:
    - Tier.Bronze
    - Domain.Football
    - PII.None
columns:
  - name: team_id
    description: SoFIFA id команды (bigint).
  - name: team
    description: Название команды.
  - name: league
    description: Лига (e.g. 'ENG-Premier League').
  - name: fifa_edition
    description: Издание игры (e.g. 'FC 26'); partition key.
  - name: update
    description: Метка обновления ростера на sofifa.com (e.g. 'Jun 2, 2026').
  - name: _source
    description: Источник данных ('sofifa'); метаколонка Bronze.
  - name: _entity_type
    description: Тип сущности в Bronze; метаколонка.
  - name: _ingested_at
    description: Timestamp ingest'а строки в Bronze; метаколонка.
  - name: _batch_id
    description: Идентификатор батча ingest'а; метаколонка.
