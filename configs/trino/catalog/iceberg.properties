connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hive-metastore:9083

# Enable HDFS file system support (required for hdfs:// URIs in Trino 479+)
fs.hadoop.enabled=true
hive.config.resources=/etc/trino/core-site.xml,/etc/trino/hdfs-site.xml

# Performance settings
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

# Metadata settings
iceberg.max-partitions-per-writer=1000
iceberg.target-max-file-size=128MB
