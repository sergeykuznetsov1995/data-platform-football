connector.name=iceberg

# Repointed from hive_metastore -> Lakekeeper REST after the HDFS/HMS ->
# SeaweedFS/Lakekeeper migration: the hive-metastore container is gone, so the
# old thrift catalog dead-connected on every query. Prod code uses
# catalog='iceberg' everywhere, so point it at the same 'football' REST
# warehouse the lakekeeper catalog serves (identical backend, two names).
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://lakekeeper:8181/catalog
iceberg.rest-catalog.warehouse=football
iceberg.rest-catalog.security=NONE

# Native S3 on SeaweedFS with static credentials (warehouse sts-enabled=false).
fs.native-s3.enabled=true
s3.endpoint=http://seaweedfs:8333
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:S3_ACCESS_KEY}
s3.aws-secret-key=${ENV:S3_SECRET_KEY}

# Performance settings
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

# Metadata settings
iceberg.max-partitions-per-writer=1000
iceberg.target-max-file-size=128MB
