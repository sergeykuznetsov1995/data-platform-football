# =============================================================================
# Trino Coordinator Configuration
# =============================================================================

coordinator=true
node-scheduler.include-coordinator=true

# HTTPS
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/certs/keystore.jks
http-server.https.keystore.key=${ENV:TRINO_KEYSTORE_PASSWORD}
http-server.http.enabled=false

discovery.uri=https://localhost:8443

# Authentication
http-server.authentication.type=PASSWORD

# Internal communication (HTTPS with self-signed cert)
internal-communication.shared-secret=${ENV:TRINO_KEYSTORE_PASSWORD}
internal-communication.https.required=true
internal-communication.https.keystore.path=/etc/trino/certs/keystore.jks
internal-communication.https.keystore.key=${ENV:TRINO_KEYSTORE_PASSWORD}
internal-communication.https.truststore.path=/etc/trino/certs/truststore.jks
internal-communication.https.truststore.key=${ENV:TRINO_KEYSTORE_PASSWORD}

# Query settings
query.max-memory=3GB
query.max-memory-per-node=2GB

# Memory management
memory.heap-headroom-per-node=384MB

# Spill to disk (#728) — when a query exceeds query.max-memory-per-node the
# hash-join / aggregation / sort state spills to disk instead of growing the
# JVM heap. Without this, a memory spike on the heavy whoscored_events_spadl
# CTAS pushed the 3.5G heap into a Java OOM; jvm.config's
# -XX:+ExitOnOutOfMemoryError then hard-exits the process → container restart →
# clients see "Connection refused" and the silver task fails. Spilling lets such
# queries complete (slower) on disk. Path = node.data-dir (/data/trino, writable,
# ~24G free on the overlay fs).
spill-enabled=true
spiller-spill-path=/data/trino/spill

# HTTP request logging
http-server.log.enabled=true
http-server.log.path=/var/trino/data/http-request.log
