# =============================================================================
# Trino Coordinator Configuration
# =============================================================================

coordinator=true
node-scheduler.include-coordinator=true

# HTTPS
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/certs/keystore.jks
http-server.https.keystore.key=${ENV:TRINO_KEYSTORE_PASSWORD}
http-server.http.enabled=false

discovery.uri=https://localhost:8443

# Authentication: PASSWORD первым — машинные аккаунты (Basic) идут по password.db
# как раньше; OAUTH2 — люди (Bearer-токены Keycloak и web UI).
http-server.authentication.type=PASSWORD,OAUTH2
http-server.authentication.oauth2.issuer=${ENV:TRINO_OAUTH2_ISSUER}
http-server.authentication.oauth2.client-id=trino
http-server.authentication.oauth2.client-secret=${ENV:TRINO_OIDC_CLIENT_SECRET}
# offline_access — чтобы Keycloak выдал refresh-токен (нужен для refresh-tokens ниже)
http-server.authentication.oauth2.scopes=openid,offline_access
http-server.authentication.oauth2.principal-field=preferred_username
# ВНИМАНИЕ: oauth2.groups-field в Trino 482 НЕ существует (проверено —
# 'was not used', сервер не стартует). Группы для rules.json приходят из
# file group provider (groups.txt) для ВСЕХ типов входа.
web-ui.authentication.type=oauth2

# Refresh-токены: без них DataGrip/web-UI гонят в браузер каждые ~5 мин
# (короткий access-token Keycloak). С ними Trino сам обновляет токен — логин
# раз в issued-token.timeout. secret-key фиксирован в .env: иначе рестарт Trino
# генерит новый ключ и разлогинивает всех людей.
http-server.authentication.oauth2.refresh-tokens=true
http-server.authentication.oauth2.refresh-tokens.issued-token.timeout=12h
http-server.authentication.oauth2.refresh-tokens.secret-key=${ENV:TRINO_OAUTH2_REFRESH_KEY}

# Trino стоит за Caddy (docs/design/analyst-access.md): доверять X-Forwarded-*
# заголовкам прокси. Без этого запросы через Caddy падают с 406
# «does not allow processing of the x-forwarded-host header».
http-server.process-forwarded=true

# Internal communication (HTTPS with self-signed cert)
internal-communication.shared-secret=${ENV:TRINO_KEYSTORE_PASSWORD}
internal-communication.https.required=true
internal-communication.https.keystore.path=/etc/trino/certs/keystore.jks
internal-communication.https.keystore.key=${ENV:TRINO_KEYSTORE_PASSWORD}
internal-communication.https.truststore.path=/etc/trino/certs/truststore.jks
internal-communication.https.truststore.key=${ENV:TRINO_KEYSTORE_PASSWORD}

# Query settings
query.max-memory=6GB
query.max-memory-per-node=5GB

# Memory management
memory.heap-headroom-per-node=384MB

# Spill to disk (#728) — when a query exceeds query.max-memory-per-node the
# hash-join / aggregation / sort state spills to disk instead of growing the
# JVM heap. Without this, a memory spike on the heavy whoscored_events_spadl
# CTAS pushed the 3.5G heap into a Java OOM; jvm.config's
# -XX:+ExitOnOutOfMemoryError then hard-exits the process → container restart →
# clients see "Connection refused" and the silver task fails. Spilling lets such
# queries complete (slower) on disk. Path = node.data-dir (/data/trino, writable,
# ~24G free on the overlay fs).
spill-enabled=true
spiller-spill-path=/data/trino/spill

# HTTP request logging
http-server.log.enabled=true
http-server.log.path=/var/trino/data/http-request.log
optimizer.optimize-top-n-ranking=false
