# Resource groups (issue #861): защита пайплайнов от запросов людей.
# Машинные аккаунты — без практических ограничений, люди (аналитики/viewers,
# в т.ч. под Superset-impersonation) — ограниченная конкуренция и память.
# Включение/изменение требует РЕСТАРТА Trino (в отличие от rules.json).
resource-groups.configuration-manager=file
resource-groups.config-file=/etc/trino/resource-groups.json
