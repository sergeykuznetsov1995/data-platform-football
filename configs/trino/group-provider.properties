# File group provider: членство юзеров в группах для правил rules.json.
# Нужен, чтобы группа analysts работала и для password-логинов (DBeaver-fallback),
# и для Superset-impersonation (у сессионного юзера нет OAuth-токена с группами).
# groups.txt перечитывается каждые 30с без рестарта.
group-provider.name=file
file.group-file=/etc/trino/groups.txt
file.refresh-period=30s
