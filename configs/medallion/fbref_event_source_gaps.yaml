# Matches for which FBref publishes no match events at all (#901).
#
# Contract:
#   * match_id is the stable FBref /matches/<id>/ slug.
#   * every entry must state what the source publishes (evidence) and why the
#     gap is legitimate (reason); the Silver renderer rejects missing or
#     duplicate fields before Trino runs.
#   * this is a finite evidence registry, not an inference rule: a scored match
#     with zero events that is NOT listed here still fails the
#     scored_match_without_events gate, and a listed match that starts carrying
#     events fails stale_event_source_gap until the entry is removed.
#
# Evidence for the entries below was produced by refetching each page through
# the production control plane on 2026-07-12 (bounded backfill runs): the raw
# HTML carries the two event columns (div.event id="a"/"b") and both
# stats_<team>_summary tables as *empty* containers, so Bronze records
# match_events=empty and match_player_stats=empty in fbref_dataset_availability
# while managers, team stats and officials parse normally.  FBref simply never
# published player-level data for these relegation play-offs.
version: 1
