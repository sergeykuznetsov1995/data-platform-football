# =============================================================================
# Country code map — FBref/FIFA 3-letter code -> full country name (issue #435)
# =============================================================================
# FBref `nation` column carries FIFA/IOC 3-letter codes (e.g. 'eng ENG'), NOT
# ISO-3166 alpha-3. The UK home nations (ENG/SCO/WAL/NIR) and many football
# codes diverge from ISO (GER≠DEU, NED≠NLD, POR≠PRT, SUI≠CHE, CRO≠HRV, ...).
#
# Used by gold.dim_player.sql.j2 via the {{ country_map_values_sql }}
# placeholder (medallion_config.get_country_map_sql_values): the FBref-code
# fallback in the nationality COALESCE is mapped to a full name so the column
# is single-format (full names) across all sources. Unmapped codes degrade to
# the raw 3-letter code (graceful — never NULL).
#
# #585: each entry MAY carry an optional `aliases` list — alternate full-name
# spellings emitted by the enrichment sources (e.g. USA -> United States,
# Czechia -> Czech Republic). Rendered via the {{ nationality_alias_values_sql }}
# placeholder (medallion_config.get_country_alias_sql_values) and applied in
# dim_player.sql.j2 to canonicalize the winning source spelling BEFORE the
# code-map fallback. Every alias maps to the canonical `name`; an alias must be
# globally unique and must not collide with any `name`.
#
# `name` MUST match the spelling emitted by FotMob/SofaScore/Transfermarkt so
# a player resolved via the map reads identically to one resolved via a source
# (single canonical spelling). Reconcile against:
#   SELECT DISTINCT nationality FROM iceberg.silver.fotmob_player_profile
# Coverage MUST cover 100% of:
#   SELECT DISTINCT REGEXP_EXTRACT(nation,'[A-Z]{3}') FROM iceberg.silver.fbref_player_season_profile
#
# Field reference:
#   code — FIFA/IOC 3-letter code, upper-case (^[A-Z]{3}$), unique
#   name — full country name (full-name spelling per the enrichment sources)
#   aliases — optional list of alternate source spellings -> canonical `name`
# =============================================================================

countries:
  # --- UK & Ireland (FBref home-nation codes, absent from ISO-3166) ---
  - {code: ENG, name: England}
  - {code: SCO, name: Scotland}
  - {code: WAL, name: Wales}
  - {code: NIR, name: Northern Ireland}
  - {code: IRL, name: Republic of Ireland, aliases: [Ireland]}

