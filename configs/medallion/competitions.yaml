# =============================================================================
# Medallion competition catalog (E1)
# =============================================================================
# Каталог competitions для cross-source xref/feature pipelines.
# В E1 заполнен только APL (in_scope=true). Остальные — stub'ы для E8a/b/c.
#
# Sources priority здесь — это ТОЛЬКО факт того, что источник существует
# для competition'a. Per-metric primary/fallback (xG vs goals vs cards)
# живёт в Gold SQL, не в YAML. См. R1 verdict
# (docs/MEDALLION_REDESIGN_ROADMAP.md L574-L580).
#
# Season ID convention: 4-digit slug — 2024-25 -> 2425, 2025-26 -> 2526
# (matches Bronze season convention from utils.config.get_current_season).
#
# Field reference:
#   id                — competition slug, совпадает с Bronze.league string
#   name              — human-readable name
#   country           — страна лиги ('Europe' для UEFA-турниров); → gold.dim_competition
#   tier              — 1 = top flight (only tier=1 currently)
#   seasons           — list of {id, format, team_count, start, end}
#   sources.primary   — sources с >80% coverage (R0.1 verdict)
#   sources.fallback  — sources с partial coverage / per-metric fallback
#   in_scope          — true = currently materialized in Gold; false = stub
#   notes             — rationale, deferral target
# =============================================================================

