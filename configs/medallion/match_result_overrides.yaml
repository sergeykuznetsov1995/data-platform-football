# Explicit official-result decisions for FBref matches whose source-published
# score is not a reliable statement of the competition's official result.
#
# Contract:
#   * match_id is the stable FBref /matches/<id>/ slug.
#   * every entry must carry an authoritative result and a durable reference;
#     the Silver renderer rejects missing/duplicate fields before Trino runs.
#   * this is deliberately a finite evidence registry, not an inference rule.
#     `notes: Match awarded to ...` identifies candidates, but does not encode
#     the score (FBref is inconsistent for awarded matches).
