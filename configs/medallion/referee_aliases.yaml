# =============================================================================
# Cross-source referee-name aliases — APL referees (E1, issue #143)
# =============================================================================
# Curated map source-specific raw referee-name → canonical referee identity.
# Mirrors `team_aliases.yaml` (#141/#148). Referees have NO stable source ID
# (both FBref and MatchHistory emit plain name strings), so identity is an
# explicit slug here and FBref spelling is the canonical (spine) form.
#
# Структура одной записи:
#   - canonical_name: <FBref spelling>          # display; FBref is the spine
#     canonical_id:   ref_<stable slug>          # IDENTITY — see below
#     aliases:
#       _generic:    [forms valid in any source — optional]
#       fbref:       [FBref full-name form, e.g. "Michael Oliver"]
#       matchhistory:[MatchHistory "Initial Surname" form, e.g. "M Oliver"]
#     competition_scope: [competition.id where valid]
#
# Why canonical_id (issue #141/#143)?
#   Identity must NOT be derived from the raw name. MatchHistory writes
#   "M Oliver", FBref writes "Michael Oliver" — same person. The explicit
#   `ref_<slug>` slug (owned here) lets BOTH forms point at one identity via
#   their per-source alias rows, with zero fuzzy matching. Convention:
#   `^[a-z0-9_]+$` (loader enforces), `ref_` prefix, lower-snake-case.
#   At worldwide scale disambiguate namesakes with a country suffix
#   (e.g. ref_michael_oliver_eng) — never reuse a slug for two real people.
#
# Why no fuzzy / no initials algorithm?
#   With only ~44 APL referees a hand-curated dictionary is exact and cheaper
#   than a resolver (cf. worldfootballR's 6100-player manual dictionary). The
#   "M Oliver" ↔ "Michael Oliver" merge is just two alias rows — the SQL norm
#   (NFD diacritics + strip non-alnum) only canonicalises cosmetics.
#
# MatchHistory form note: forms are "Initial Surname" WITHOUT a period
#   ("M Oliver", "A Taylor"). Surname collisions are disambiguated by initial:
#   A Madley→Andy, R Madley→Robert; J Smith→Joshua, L Smith→Lewis;
#   R Jones→Robert (Mike Jones has no MH form). Two suspected MH mis-keys
#   ("K Kavanagh", "O Oliver") map to the single existing surname-holder —
#   flagged inline; revisit if a real new namesake appears.
#
# competition_scope: ["ENG-Premier League"] for everything — E1 is APL-only,
#   same as team_aliases.yaml. Other competitions add their own blocks later.
#
# Discovery source: SELECT DISTINCT referee FROM bronze.{fbref_schedule,
#   matchhistory_games} WHERE league='ENG-Premier League' (2026-06-03).
# =============================================================================

