  - source: capology
    source_id: "jamie-bynoe-gittens-38207"
    fbref_player_id: "10745192"
    season: "*"
    reason: "Bynoe-Gittens (Capology) ‚Üî Gittens (FBref) surname extension"

  # Issue #500 ‚Äî Transfermarkt "Savinho" (743591) vs FBref "S√°vio" (fe6e7156).
  # Brazilian nickname: TM stores "Savinho", FBref the birth-name short form
  # "S√°vio". Distinct tokens ‚Üí surname-anchor / token_set / nicknames all miss.
  - source: transfermarkt
    source_id: "743591"
    fbref_player_id: "fe6e7156"
    season: "*"
    reason: "Savinho (Transfermarkt) ‚Üî S√°vio (FBref) Brazilian nickname"

