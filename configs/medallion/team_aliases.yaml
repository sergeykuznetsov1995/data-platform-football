# =============================================================================
# Cross-source team-name aliases — APL clubs (E1)
# =============================================================================
# Список clubs с per-source raw-name variants → canonical_name.
# canonical_name следует Wikipedia "official name" convention.
#
# Структура одной записи:
#   - canonical_name: <official Wikipedia name>      # display only
#     canonical_id:   <stable identity slug>         # IDENTITY — see below
#     country:        <страна клуба>                 # → gold.dim_team (issue #425)
#     short_name:     <короткое display-имя>         # → gold.dim_team (issue #425)
#     aliases:
#       _generic:    [list of raw_names that may appear in any source — UNION pool]
#       fbref:       [list, optional]    # full names with spaces (mostly canonical)
#       understat:   [list, optional]    # full names with spaces (mostly canonical)
#       sofascore:   [list, optional]    # full names; some short ("Wolverhampton")
#       matchhistory:[list, optional]    # short forms ('Wolves', 'Spurs', "Nott'm Forest")
#       clubelo:     [list, optional]    # camelCase URL-style ('ManCity', 'WestHam')
#       fotmob:      [list, optional]
#       espn:        [list, optional]
#       whoscored:   [list, optional]
#       sofifa:      [list, optional]    # FIFA/EA FC team names — full, ≈ canonical (#601)
#     competition_scope: [list of competition.id where this alias-set is valid]
#
# Why canonical_id (issue #141)?
#   Identity must NOT be derived from the display name. At worldwide scope a
#   name stops being a unique key (FC Barcelona vs Barcelona SC; Spartak Moscow
#   vs Spartak Nalchik). `canonical_id` is an explicit, stable slug owned here;
#   `xref_team.sql.j2` reads it verbatim instead of slugifying canonical_name.
#   Convention: lower-snake-case, `^[a-z0-9_]+$` (loader enforces). For the
#   current APL set the slug equals the old name-derived value (e.g.
#   "Manchester United" -> manchester_united) so Gold canonical_id is unchanged.
#   When onboarding an ambiguous club, disambiguate with a country/city suffix
#   (e.g. barcelona_es, spartak_moscow) — never reuse a slug for two real clubs.
#
# Why _generic?
#   The original `_team_aliases.sql` lists `(raw, canonical)` pairs without
#   source attribution. Those pairs MUST keep working source-agnostic so the
#   loader can produce the same UNION VALUES that the legacy SQL produced.
#   Source-specific buckets exist for future per-source filtering (E8a/b/c
#   когда захочется ограничить ClubElo camelCase только этим источником).
#
# Why competition_scope: ["ENG-Premier League"] for everything?
#   E1 материализует APL-only. UCL (E8a) и Top-5 (E8b) добавят свои
#   alias-blocks с другим scope. Не трогать сейчас.
#
# Source-specific naming notes (kept here so a future maintainer doesn't
# chase the same dragons twice):
#   * FBref       — full names with spaces, mostly canonical
#   * Understat   — full names with spaces, mostly canonical
#   * SofaScore   — full names; "Wolverhampton" is short for "Wolverhampton Wanderers"
#   * MatchHistory (football-data.co.uk) — short forms: 'Wolves', 'Spurs',
#                   'Man United', "Nott'm Forest"
#   * ClubElo     — camelCase URL-style: 'ManCity', 'ManUnited', 'WestHam',
#                   'CrystalPalace', 'NottinghamForest', 'AstonVilla',
#                   'SheffieldUnited', 'LeicesterCity', 'NorwichCity',
#                   'IpswichTown', 'LutonTown', 'WestBromwich', 'WatfordFC',
#                   'LeedsUnited', 'NewcastleUnited'
#
# Apostrophe handling: YAML strings with apostrophes are written using
# double-quoted form, e.g. "Nott'm Forest". The loader is responsible for
# escaping apostrophes (`'` -> `''`) when emitting Trino SQL VALUES.
# =============================================================================

teams:
  # ====== Wolverhampton Wanderers ======
  - canonical_name: "Wolverhampton Wanderers"
    canonical_id: "wolverhampton_wanderers"
    country: "England"
    short_name: "Wolves"
    aliases:
      _generic:
        - "Wolves"
        - "Wolverhampton"
        - "Wolverhampton Wanderers"
      fbref: ["Wolverhampton Wanderers"]
      understat: ["Wolverhampton Wanderers"]
      sofascore: ["Wolverhampton"]
      matchhistory: ["Wolves"]
      clubelo: ["WolverhamptonWanderers"]
      fotmob: ["Wolves"]
      espn: ["Wolverhampton Wanderers"]
      whoscored: ["Wolves"]
    competition_scope: ["ENG-Premier League"]

