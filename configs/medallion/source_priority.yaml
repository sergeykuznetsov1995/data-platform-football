      - {src: sofascore, expr: "ss.key_passes"}
      - {src: whoscored, expr: "ws.key_passes"}
  passes:
    wrap: "CAST({coalesce} AS BIGINT)"
    sources:
      - {src: sofascore, expr: "ss.passes"}
      - {src: whoscored, expr: "ws.passes"}
  tackles:
    wrap: "CAST({coalesce} AS BIGINT)"
