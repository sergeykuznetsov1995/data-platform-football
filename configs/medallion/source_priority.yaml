      - {src: sofascore, expr: "ss.yellow_cards"}
      - {src: whoscored, expr: "ws.yellow_cards"}
      - {src: understat, expr: "us.yellow_cards"}
  red_cards:
    wrap: "CAST({coalesce} AS BIGINT)"
