      - {src: whoscored, expr: "ws.touches"}
  dispossessed:
    wrap: "CAST({coalesce} AS BIGINT)"
    sources:
      - {src: sofascore, expr: "ss.dispossessed"}
      - {src: whoscored, expr: "ws.dispossessed"}
  fouls_committed:
    wrap: "CAST({coalesce} AS BIGINT)"
    sources:
