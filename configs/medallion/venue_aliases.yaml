# =============================================================================
# Cross-source venue (stadium) aliases — APL (E2, issue #145)
# =============================================================================
# Curated map of source-specific stadium-name spellings → one canonical venue
# identity. Mirrors team_aliases.yaml (#141/#148) and referee_aliases.yaml
# (#143). Consumed by `dim_venue.sql.j2` via
# `medallion_config.get_venue_alias_sql_values()` → a VALUES body of six-tuples
#   ('raw_name', 'canonical_id', 'canonical_name', 'city', 'country', 'league')
# (or seven-tuples with `capacity` when include_capacity=True — dim_venue uses it
# as a FALLBACK behind FotMob, #750).
#
# WHY a curated dictionary (issue #145):
#   `gold.dim_venue` previously keyed venue_id on xxhash64(LOWER(TRIM(name))) —
#   a pure name hash. At worldwide scale this both (a) splits one stadium across
#   spelling/sponsor-rename variants ("Brentford Community Stadium" vs "Gtech
#   Community Stadium") and (b) merges genuine namesakes in different cities.
#   The curated map gives every variant ONE stable `canonical_id` and carries
#   `city`/`country` so namesakes stay distinct and geocoding has a base.
#
# Entry shape:
#   - canonical_name: "Old Trafford"        # display name (current/official)
#     canonical_id:   "venue_old_trafford"  # IDENTITY slug, ^[a-z0-9_]+$
#     city:           "Manchester"
#     country:        "England"
#     aliases:
#       _generic: ["Old Trafford"]          # every observed spelling, any source
#     competition_scope: ["ENG-Premier League"]
#
# capacity (issue #750): PRIMARY source is now FotMob (silver.fotmob_team_profile,
# auto + global) — dim_venue does COALESCE(fotmob_capacity, curated_capacity). The
# hand-curated Wikipedia register (#434) was removed for the ~29 venues FotMob covers;
# only a small CURATED FALLBACK remains for venues FotMob's team-profile cannot supply,
# because that endpoint reports each club's CURRENT ground for every season. So clubs
# that MOVED grounds (Goodison Park ← Everton 2016-24, White Hart Lane / Wembley ←
# Spurs) and a few not in recent FotMob season squads keep a curated capacity. Omit
# capacity for any venue FotMob covers. city/country stay curated (FotMob/SofaScore
# only fill NULLs for non-curated / orphan venues).
#
# Matching: dim_venue normalises raw venue names (NFD + strip diacritics +
# remove non-alphanumerics) and LEFT JOINs on that key. So apostrophe/period
# variants ("St James' Park" / "St. James' Park") fold automatically and need
# only one alias; word-additions ("Portman Road" vs "Portman Road Stadium") and
# sponsor renames must be listed explicitly. All forms below were observed in
# `silver.fbref_match_enriched` + `bronze.espn_matchsheet` for ENG-Premier
# League (snapshot 2026-06-03, 9 seasons of history incl. relegated clubs).
#
# NOTE: Goodison Park and Hill Dickinson Stadium are BOTH Everton (Liverpool)
# but are physically different grounds (2025 move) → two distinct venues, not a
# merge. Same for White Hart Lane (demolished) vs Tottenham Hotspur Stadium.
#
# Scope: APL only today. Other leagues (#141 worldwide) are a tracked followup.
# =============================================================================

venues:
