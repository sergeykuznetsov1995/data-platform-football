# =============================================================================
# Cross-source manager-name aliases — APL head coaches (issue #619)
# =============================================================================
# Curated map: raw coach-name → canonical (FBref-spine) identity.
# Mirrors `referee_aliases.yaml` (#143) — managers, like referees, have NO
# stable source id in the FBref spine (FBref emits a plain name string).
#
# PRIMARY CONSUMER (xref-improvements): silver/xref_manager.sql.j2 — the
# `name_alias` tier of the 3-source manager cascade (FBref spine + FotMob
# coachId + Transfermarkt coach_id), rendered via
# `get_manager_alias_sql_values(source=None)` (all buckets merged; a raw form
# keyed on a TM spelling simply never matches a FotMob name — safe no-op).
# transfermarkt_coaches.sql.j2 still renders the same VALUES during the
# transition (its canonical_id column is DEPRECATED — dim_manager now reads
# TM bio through the xref bridge).
#
# NB: two entries whose raw forms normalise to ONE (norm, league) key but
# point at DIFFERENT canonical_ids are silently collapsed by MAX() in the
# consumers — keep the file free of norm collisions.
#
# WHY THIS FILE (issue #619, followup of #434/#618):
#   Most coaches glue automatically via the shared diacritic-stripping
#   name-normalize (and, since xref-improvements, the surname+first-initial
#   `name_initial` tier). A handful do NOT: a source may store a different
#   spelling / name order (e.g. surname-first "Le Bris, Régis") that normalises
#   to a DIFFERENT canonical_id than the FBref spine. Those become orphans —
#   the TM bio (nationality/dob) never reaches dim_manager. This dictionary
#   remaps the raw form onto the spine id so the JOIN succeeds.
#
# Структура одной записи:
#   - canonical_name: <FBref spelling>           # display; FBref is the spine
#     canonical_id:   <BARE spine slug>           # IDENTITY — see below
#     aliases:
#       _generic:      [forms valid in any source — optional]
#       transfermarkt: [the TM raw coach-name that mis-normalises]
#     competition_scope: [competition.id where valid]
#
# canonical_id (issue #619):
#   The BARE FBref-spine name-normalize id — e.g. "regis_le_bris", NO `mgr_`
#   prefix (referee uses `ref_`; managers do NOT, because dim_manager.manager_id
#   IS the bare name-normalize id and the alias must equal it to JOIN). Convention
#   `^[a-z0-9_]+$` (loader enforces). It MUST be the exact id the FBref name
#   produces: LOWER( strip-NFD-diacritics( name ) → non-alnum→'_' ).
#   "Régis Le Bris" → "regis_le_bris".
#
# Application is a NO-OP when the alias raw form does not normalise to any TM
# coach name, so a wrong/stale entry cannot mis-map a real coach (the LEFT JOIN
# simply does not fire). An empty/absent file degrades to "no aliases" (pre-#619
# behaviour) — the emitter ships a non-matching sentinel row.
#
# -----------------------------------------------------------------------------
# DISCOVERY (run on the target VM to obtain the authoritative orphan list):
#   -- Source rows that DON'T glue to the FBref spine (any source):
#   SELECT source, source_id, display_name, league, season
#   FROM iceberg.silver.xref_manager
#   WHERE confidence = 'orphan'
#   ORDER BY source, display_name;
#   -- For each orphan, find the matching FBref spine id + spelling:
#   SELECT DISTINCT manager_id, manager_name FROM iceberg.gold.dim_manager
#   ORDER BY manager_name;   -- pick the row that is the SAME human
# Append one entry per confirmed orphan below, then re-run the silver transform.
# =============================================================================

managers:
  # Worked example (verify against the discovery query above before merge):
  # Régis Le Bris — Sunderland, promoted to the APL for 2025/26. FBref renders
  # "Régis Le Bris" (→ regis_le_bris); Transfermarkt's surname-first staff form
  # "Le Bris, Régis" normalises to "le_bris_regis" and orphans without this row.
  - canonical_name: "Régis Le Bris"
    canonical_id: "regis_le_bris"
    aliases:
      transfermarkt: ["Le Bris, Régis"]
    competition_scope: ["ENG-Premier League"]
