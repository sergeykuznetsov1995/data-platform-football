# Бёрсты POST на форму логина Keycloak. Неудачный логин KC отдаёт 200 —
# по статусу не поймать; ловим частоту попыток с одного IP.
# Per-user lockout делает сам Keycloak (brute-force protection в realm).
[Definition]
failregex = ^.*"client_ip":"<HOST>".*"method":"POST".*"uri":"/realms/football/login-actions/authenticate[^"]*"
ignoreregex =
