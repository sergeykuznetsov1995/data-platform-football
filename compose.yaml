# =============================================================================
# Data Platform - Docker Compose
# Medallion Architecture: Bronze -> Silver -> Gold
# =============================================================================

name: data-platform

x-airflow-common: &airflow-common
  build:
    context: ./docker/images/airflow
    dockerfile: Dockerfile
  shm_size: '512m'  # Chrome uses /dev/shm for IPC; Docker default 64MB causes crashes
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
    - SYS_PTRACE  # Required for Chrome/nodriver browser automation
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
    SPARK_MASTER_URL: ${SPARK_MASTER_URL}
    TRINO_PASSWORD: ${TRINO_PASSWORD}
    TRINO_PORT: ${TRINO_PORT}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ALERT_ENV: ${ALERT_ENV:-dev}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./configs/spark:/opt/spark/conf
    - ./scrapers:/opt/airflow/scrapers
    - ./scripts:/opt/airflow/scripts
    - ./proxys.txt:/opt/airflow/proxys.txt:ro
  networks:
    - frontend
    - backend
    - storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    trino:
      condition: service_healthy

services:
  # ===========================================================================
  # HDFS - Distributed File System
  # ===========================================================================
  namenode:
    build:
      context: ./docker/images/hdfs
      dockerfile: Dockerfile
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=data-platform
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
      - HDFS_SECONDARYNAMENODE_USER=root
    ports:
      - "127.0.0.1:9870:9870"  # Web UI
      - "127.0.0.1:9000:9000"  # HDFS port
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./configs/hdfs:/opt/hadoop/etc/hadoop
    networks:
      - storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://namenode:9870/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: ["hdfs", "namenode"]
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  datanode1:
    build:
      context: ./docker/images/hdfs
      dockerfile: Dockerfile
    container_name: datanode1
    hostname: datanode1
    environment:
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
    volumes:
      - datanode1_data:/hadoop/dfs/data
      - ./configs/hdfs:/opt/hadoop/etc/hadoop
    networks:
      - storage
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://$(hostname):9864/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["hdfs", "datanode"]
    deploy:
      resources:
        limits:
          memory: 640M
        reservations:
          memory: 256M

  datanode2:
    build:
      context: ./docker/images/hdfs
      dockerfile: Dockerfile
    container_name: datanode2
    hostname: datanode2
    environment:
      - HDFS_NAMENODE_USER=root
      - HDFS_DATANODE_USER=root
    volumes:
      - datanode2_data:/hadoop/dfs/data
      - ./configs/hdfs:/opt/hadoop/etc/hadoop
    networks:
      - storage
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://$(hostname):9864/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["hdfs", "datanode"]
    deploy:
      resources:
        limits:
          memory: 640M
        reservations:
          memory: 256M

  # ===========================================================================
  # PostgreSQL - Metadata Storage
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_READ_SEARCH
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      HIVE_METASTORE_DB_PASSWORD: ${HIVE_METASTORE_DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/images/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===========================================================================
  # Hive Metastore
  # ===========================================================================
  hive-metastore:
    build:
      context: ./docker/images/hive
      dockerfile: Dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HADOOP_CLIENT_OPTS: >-
        -Xmx512m
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=${HIVE_METASTORE_DB_PASSWORD}
    ports:
      - "127.0.0.1:9083:9083"
    volumes:
      - ./configs/hive:/opt/hive/conf
      - hive_warehouse:/user/hive/warehouse
    networks:
      - backend
      - storage
    depends_on:
      postgres:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  # ===========================================================================
  # Spark Cluster
  # ===========================================================================
  spark-master:
    build:
      context: ./docker/images/spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "127.0.0.1:8080:8080"  # Web UI
      - "127.0.0.1:7077:7077"  # Spark Master
    volumes:
      - ./configs/spark:/opt/spark/conf
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - storage
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  spark-worker-1:
    build:
      context: ./docker/images/spark
      dockerfile: Dockerfile
    container_name: spark-worker-1
    hostname: spark-worker-1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=512M
      - SPARK_WORKER_CORES=2
    volumes:
      - ./configs/spark:/opt/spark/conf
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - storage
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  spark-worker-2:
    build:
      context: ./docker/images/spark
      dockerfile: Dockerfile
    container_name: spark-worker-2
    hostname: spark-worker-2
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=512M
      - SPARK_WORKER_CORES=2
    volumes:
      - ./configs/spark:/opt/spark/conf
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - storage
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================================================
  # Redis - Celery Broker for Airflow
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: redis-server --requirepass ${REDIS_PASSWORD} --protected-mode yes --rename-command FLUSHALL "" --rename-command FLUSHDB ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ===========================================================================
  # Tor Proxy - Alternative for Cloudflare bypass
  # ===========================================================================
  tor:
    image: dperson/torproxy:0.3.1
    container_name: tor
    hostname: tor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "127.0.0.1:9150:9050"   # SOCKS5 proxy (mapped to 9150 to avoid conflict)
      - "127.0.0.1:9151:9051"   # Control port
    networks:
      - backend
    environment:
      - TOR_NewCircuitPeriod=30
      - TOR_MaxCircuitDirtiness=60
      - PASSWORD=${TOR_CONTROL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl --socks5 localhost:9050 -s https://check.torproject.org/api/ip | grep -q IsTor || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ===========================================================================
  # Airflow
  # ===========================================================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow initialization complete"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    # Swap as safety buffer for memory spikes
    memswap_limit: 4G

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WORKERS: "2"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    memswap_limit: 2G

  # ===========================================================================
  # Trino - Distributed SQL Query Engine
  # ===========================================================================
  trino:
    image: trinodb/trino:479
    container_name: trino
    hostname: trino
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - HADOOP_CONF_DIR=/etc/trino
      - TRINO_KEYSTORE_PASSWORD=${TRINO_KEYSTORE_PASSWORD:-changeit}
    ports:
      - "127.0.0.1:8082:8443"
      - "[::1]:8082:8443"
    volumes:
      - ./configs/trino:/etc/trino
    networks:
      - frontend
      - backend
      - storage
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 1G

# =============================================================================
# Networks
# =============================================================================
networks:
  # Frontend: services with web UI accessible from host
  frontend:
    driver: bridge
    name: dp-frontend
  # Backend: application services (Airflow, Hive, PostgreSQL, Redis)
  backend:
    driver: bridge
    name: dp-backend
  # Storage: data storage layer (HDFS, Spark)
  storage:
    driver: bridge
    name: dp-storage

# =============================================================================
# Volumes
# =============================================================================
volumes:
  namenode_data:
    name: namenode_data
  datanode1_data:
    name: datanode1_data
  datanode2_data:
    name: datanode2_data
  postgres_data:
    name: postgres_data
  hive_warehouse:
    name: hive_warehouse
  redis_data:
    name: redis_data
