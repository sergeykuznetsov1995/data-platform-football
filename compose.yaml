# =============================================================================
# Data Platform - Docker Compose
# Medallion Architecture: Bronze -> Silver -> Gold
# =============================================================================

name: data-platform

x-airflow-common: &airflow-common
  image: data-platform-airflow-base:2.11.2-whoscored
  build:
    context: ./docker/images/airflow
    dockerfile: Dockerfile
    target: airflow-base
  shm_size: '512m'  # Chrome uses /dev/shm for IPC; Docker default 64MB causes crashes
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
    - SYS_PTRACE  # Required for browser automation
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
    TRINO_PASSWORD: ${TRINO_PASSWORD}
    TRINO_PORT: ${TRINO_PORT}
    TRINO_HOST: ${TRINO_HOST:-trino}
    # Raw-first FBref pages share the existing SeaweedFS bucket but live
    # outside Iceberg table prefixes. The parser uses pyarrow.fs directly.
    S3_ACCESS_KEY: ${S3_ACCESS_KEY}
    S3_SECRET_KEY: ${S3_SECRET_KEY}
    ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
    # Lakekeeper REST warehouse identifier is not the S3 bucket name above.
    ICEBERG_REST_WAREHOUSE: ${ICEBERG_REST_WAREHOUSE:-football}
    S3_ENDPOINT: seaweedfs:8333
    S3_SCHEME: http
    FBREF_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/fbref
    # Production maintenance must delete only fenced, proven-stale FBref
    # staging tables; audit mode is reserved for explicit diagnostics.
    FBREF_STAGE_JANITOR_MODE: ${FBREF_STAGE_JANITOR_MODE:-apply}
    SOFASCORE_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/sofascore
    SOFASCORE_MANIFEST_BACKEND: trino
    SOFASCORE_PROXY_BUDGET_ARTIFACT: /opt/airflow/configs/sofascore/proxy_budget_canary.json
    SOFASCORE_PROXY_BUDGET_LEDGER: /opt/airflow/logs/sofascore/proxy-budget-ledger.json
    SOFASCORE_WORKLOAD_PLAN_DIR: /opt/airflow/logs/sofascore/workload-plans
    # #951: прод-сбор идёт через выделенный шлюз sofascore_proxy_filter, а не
    # общий proxy_filter (свой метринг/леджер, свой пул рестартом одного шлюза).
    SOFASCORE_PROXY_CONTROL_URL: ${SOFASCORE_PROXY_CONTROL_URL:-http://sofascore_proxy_filter:8899}
    SOFASCORE_PROXY_CONTROL_TOKEN: ${SOFASCORE_PROXY_CONTROL_TOKEN:-}
    # Shared authenticated lease control plane for signed/approved sources.
    PROXY_FILTER_CONTROL_TOKEN: ${PROXY_FILTER_CONTROL_TOKEN:-${SOFASCORE_PROXY_CONTROL_TOKEN:-}}
    SOFASCORE_PROXY_LEASE_TTL_SECONDS: ${SOFASCORE_PROXY_LEASE_TTL_SECONDS:-3600}
    # FBref has a dedicated meter and dedicated residential pool.  The worker
    # receives only a short-lived lease token, never an upstream credential.
    FBREF_PROXY_CONTROL_URL: ${FBREF_PROXY_CONTROL_URL:-http://fbref_proxy_filter:8899}
    FBREF_PROXY_CONTROL_TOKEN: ${SOFASCORE_PROXY_CONTROL_TOKEN:-}
    FBREF_PROXY_LEASE_TTL_SECONDS: ${FBREF_PROXY_LEASE_TTL_SECONDS:-7200}
    SOFASCORE_PLAYER_ROTATION_MODULUS: ${SOFASCORE_PLAYER_ROTATION_MODULUS:-4}
    SOFASCORE_PLAYER_ROTATION_MIN_LEAGUES: ${SOFASCORE_PLAYER_ROTATION_MIN_LEAGUES:-10}
    PROXY_FILTER_SOFASCORE_CANARY_HARD_CAP_BYTES: ${PROXY_FILTER_SOFASCORE_CANARY_HARD_CAP_BYTES:-0}
    WHOSCORED_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/whoscored
    WHOSCORED_OPS_STORE_URI: s3://${ICEBERG_WAREHOUSE}/ops/whoscored
    WHOSCORED_BACKUP_DESTINATION_URI: ${WHOSCORED_BACKUP_DESTINATION_URI:-}
    WHOSCORED_BACKUP_SOURCE_SITE_ID: ${WHOSCORED_BACKUP_SOURCE_SITE_ID:-local-seaweedfs}
    WHOSCORED_BACKUP_DESTINATION_SITE_ID: ${WHOSCORED_BACKUP_DESTINATION_SITE_ID:-}
    WHOSCORED_BACKUP_DESTINATION_RETENTION_MODE: ${WHOSCORED_BACKUP_DESTINATION_RETENTION_MODE:-}
    WHOSCORED_BACKUP_SOURCE_S3_ENDPOINT: seaweedfs:8333
    WHOSCORED_BACKUP_SOURCE_S3_SCHEME: http
    WHOSCORED_BACKUP_SOURCE_S3_REGION: ${WHOSCORED_RAW_S3_REGION:-us-east-1}
    WHOSCORED_BACKUP_DESTINATION_S3_ENDPOINT: ${WHOSCORED_BACKUP_DESTINATION_S3_ENDPOINT:-}
    WHOSCORED_BACKUP_DESTINATION_S3_SCHEME: ${WHOSCORED_BACKUP_DESTINATION_S3_SCHEME:-https}
    WHOSCORED_BACKUP_DESTINATION_S3_REGION: ${WHOSCORED_BACKUP_DESTINATION_S3_REGION:-us-east-1}
    WHOSCORED_BACKUP_RESTORE_S3_ENDPOINT: ${WHOSCORED_BACKUP_RESTORE_S3_ENDPOINT:-}
    WHOSCORED_BACKUP_RESTORE_S3_SCHEME: ${WHOSCORED_BACKUP_RESTORE_S3_SCHEME:-https}
    WHOSCORED_BACKUP_RESTORE_S3_REGION: ${WHOSCORED_BACKUP_RESTORE_S3_REGION:-us-east-1}
    WHOSCORED_RAW_S3_ENDPOINT: seaweedfs:8333
    WHOSCORED_RAW_S3_SCHEME: http
    # Keep dedicated pairs unexpanded so Python can reject a partial pair
    # instead of silently mixing one dedicated value with one platform value.
    WHOSCORED_RAW_S3_ACCESS_KEY: ${WHOSCORED_RAW_S3_ACCESS_KEY:-}
    WHOSCORED_RAW_S3_SECRET_KEY: ${WHOSCORED_RAW_S3_SECRET_KEY:-}
    # Paid WhoScored runners receive no proxy origin, lease token or browser
    # session capability.  Only the scheduler-scoped L7 gateway endpoint below
    # can cross into the isolated paid networks.
    # The paid filter is the only writer for these authoritative files.  Airflow
    # receives a separate read-only bind at this path for terminal reconciliation.
    PROXY_FILTER_LEDGER_PATH: /opt/airflow/state/whoscored-proxy-filter/paid_requests.jsonl
    WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH: /opt/airflow/state/whoscored-proxy-filter/whoscored_campaigns.json
    WHOSCORED_REQUEST_LEDGER_PATH: /opt/airflow/logs/whoscored/request_ledger.jsonl
    # All LocalExecutor children share one durable direct-source cooldown.
    # Production fails fast while the circuit is open; the capacity harness
    # alone opts into waiting so its six-hour wall clock remains honest.
    WHOSCORED_SOURCE_CIRCUIT_PATH: /opt/airflow/logs/whoscored/source-circuit-v1.json
    WHOSCORED_SOURCE_CIRCUIT_WAIT: "0"
    WHOSCORED_LOCK_DIR: /opt/airflow/logs/whoscored/commit_locks
    WHOSCORED_RAW_LOCK_DIR: /opt/airflow/logs/whoscored/raw_locks
    # Keep every documented WhoScored runtime control in the Airflow process
    # environment.  Docker Compose does not automatically forward values from
    # .env into containers, so omitting one here would silently select the
    # Python fallback even when an operator changed .env.
    WHOSCORED_DIRECT_POOL: ${WHOSCORED_DIRECT_POOL:-whoscored_direct_pool}
    WHOSCORED_BACKFILL_POOL: ${WHOSCORED_BACKFILL_POOL:-whoscored_direct_pool}
    WHOSCORED_DQ_POOL: ${WHOSCORED_DQ_POOL:-whoscored_dq_pool}
    # Safe default is two. Promote to four only after the sustained direct-only
    # canary passes; runtime_limits.py rejects every value outside 2..4.
    WHOSCORED_SOURCE_POOL_SLOTS: ${WHOSCORED_SOURCE_POOL_SLOTS:-2}
    WHOSCORED_DAILY_SLO_WINDOW: ${WHOSCORED_DAILY_SLO_WINDOW:-30}
    WHOSCORED_DAILY_SLO_MIN_SAMPLES: ${WHOSCORED_DAILY_SLO_MIN_SAMPLES:-20}
    WHOSCORED_DAILY_P95_LIMIT_HOURS: ${WHOSCORED_DAILY_P95_LIMIT_HOURS:-4}
    WHOSCORED_BACKFILL_REQUEST_UNITS_PER_RUN: ${WHOSCORED_BACKFILL_REQUEST_UNITS_PER_RUN:-3000}
    # SLO planning assumption only; it may never exceed the independently
    # derived source-pool-slots x 30 rpm x 1,440 hard ceiling.
    WHOSCORED_BACKFILL_ASSUMED_REQUEST_UNITS_PER_DAY: ${WHOSCORED_BACKFILL_ASSUMED_REQUEST_UNITS_PER_DAY:-86400}
    WHOSCORED_BACKFILL_MAX_NO_PROGRESS_RUNS: ${WHOSCORED_BACKFILL_MAX_NO_PROGRESS_RUNS:-3}
    WHOSCORED_RUN_RETENTION_DAYS: ${WHOSCORED_RUN_RETENTION_DAYS:-90}
    WHOSCORED_OPS_IO_ATTEMPTS: ${WHOSCORED_OPS_IO_ATTEMPTS:-4}
    WHOSCORED_OPS_RETRY_BASE_SECONDS: ${WHOSCORED_OPS_RETRY_BASE_SECONDS:-0.2}
    WHOSCORED_RAW_IO_ATTEMPTS: ${WHOSCORED_RAW_IO_ATTEMPTS:-4}
    WHOSCORED_RAW_RETRY_BASE_SECONDS: ${WHOSCORED_RAW_RETRY_BASE_SECONDS:-0.2}
    WHOSCORED_RAW_LOCK_TIMEOUT_SECONDS: ${WHOSCORED_RAW_LOCK_TIMEOUT_SECONDS:-55}
    WHOSCORED_RAW_SNAPSHOT_LOCK_TIMEOUT_SECONDS: ${WHOSCORED_RAW_SNAPSHOT_LOCK_TIMEOUT_SECONDS:-300}
    WHOSCORED_DAILY_PROFILE_MAX_LIMIT: ${WHOSCORED_DAILY_PROFILE_MAX_LIMIT:-3000}
    WHOSCORED_BACKUP_WORKERS: ${WHOSCORED_BACKUP_WORKERS:-16}
    WHOSCORED_BACKUP_LOCAL_RETENTION_DAYS: ${WHOSCORED_BACKUP_LOCAL_RETENTION_DAYS:-14}
    # Non-secret, measured end-to-end recovery rehearsal inputs. The cutover
    # script requires all of them before it stops a single writer.
    SEAWEEDFS_CUTOVER_REHEARSAL_INVENTORY: ${SEAWEEDFS_CUTOVER_REHEARSAL_INVENTORY:-}
    SEAWEEDFS_CUTOVER_REHEARSAL_MAX_AGE_HOURS: ${SEAWEEDFS_CUTOVER_REHEARSAL_MAX_AGE_HOURS:-24}
    SEAWEEDFS_CUTOVER_INVENTORY_MIBPS: ${SEAWEEDFS_CUTOVER_INVENTORY_MIBPS:-}
    SEAWEEDFS_CUTOVER_BACKUP_MIBPS: ${SEAWEEDFS_CUTOVER_BACKUP_MIBPS:-}
    SEAWEEDFS_CUTOVER_VERIFY_MIBPS: ${SEAWEEDFS_CUTOVER_VERIFY_MIBPS:-}
    SEAWEEDFS_CUTOVER_FIXED_OVERHEAD_SECONDS: ${SEAWEEDFS_CUTOVER_FIXED_OVERHEAD_SECONDS:-}
    SEAWEEDFS_CUTOVER_MAX_DOWNTIME_SECONDS: ${SEAWEEDFS_CUTOVER_MAX_DOWNTIME_SECONDS:-}
    WHOSCORED_STRUCTURED_REQUESTS_PER_MINUTE: ${WHOSCORED_STRUCTURED_REQUESTS_PER_MINUTE:-60}
    WHOSCORED_SCOPE_WRITE_CHUNK_ROWS: ${WHOSCORED_SCOPE_WRITE_CHUNK_ROWS:-20000}
    # Single catalog task, source requests only; hard-capped to 60 with burst 4.
    WHOSCORED_CATALOG_REQUESTS_PER_MINUTE: ${WHOSCORED_CATALOG_REQUESTS_PER_MINUTE:-60}
    # Transfermarkt stays disabled and cannot acquire an unmanaged proxy until
    # an operator supplies the separately approved paid/write packet.
    TM_NATIVE_V2_ENABLED: ${TM_NATIVE_V2_ENABLED:-false}
    # Second activation key: scheduled runs accept the standing approval
    # policies only when this is true (see dags/configs/transfermarkt/).
    TM_STANDING_POLICY_ENABLED: ${TM_STANDING_POLICY_ENABLED:-false}
    TM_PROXY_CONTROL_URL: ${TM_PROXY_CONTROL_URL:-}
    # A dedicated source token wins. The nested fallback preserves the existing
    # production Transfermarkt control plane during credential migration.
    TM_PROXY_CONTROL_TOKEN: ${TM_PROXY_CONTROL_TOKEN:-${PROXY_FILTER_CONTROL_TOKEN:-${SOFASCORE_PROXY_CONTROL_TOKEN:-}}}
    TM_REQUIRE_METERED_PROXY: ${TM_REQUIRE_METERED_PROXY:-false}
    TM_PROXY_LEASE_TTL_SECONDS: ${TM_PROXY_LEASE_TTL_SECONDS:-3600}
    FBREF_RAW_S3_ENDPOINT: seaweedfs:8333
    FBREF_RAW_S3_SCHEME: http
    # Versioned SofaScore discovery registry. Discovery runs outside Airflow;
    # workers only consume explicitly activated entries from this read-only
    # file, so a newly discovered tournament cannot create DAG tasks by itself.
    SOFASCORE_REGISTRY_PATH: /opt/airflow/configs/sofascore/tournaments.json
    # Source-native FotMob JSON uses the same durable raw-first layout.  The
    # HTTP transport is direct-only; these variables configure storage only.
    FOTMOB_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/fotmob
    FOTMOB_RAW_S3_ENDPOINT: seaweedfs:8333
    FOTMOB_RAW_S3_SCHEME: http
    # Development-only legacy FlareSolverr proxy URL. Production keeps this
    # blank: port 8899 requires a lease unless --allow-legacy-noauth is added.
    PROXY_FILTER_URL: ${PROXY_FILTER_URL:-}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ALERT_ENV: ${ALERT_ENV:-dev}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  volumes:
    - ./dags:/opt/airflow/dags:ro
    - ./logs:/opt/airflow/logs
    # E1 medallion config: team_aliases.yaml + competitions.yaml — read-only
    # for utils/medallion_config.py (default CONFIG_DIR=/opt/airflow/configs/medallion)
    - ./configs/medallion:/opt/airflow/configs/medallion:ro
    # #920 Phase 3: versioned soccerdata league_dict fragment (ESPN/WhoScored
    # tournament ids). Read by scrapers/base/soccerdata_config.py, which
    # merges it into ~/soccerdata/config/league_dict.json inside the
    # soccerdata_cache volume before soccerdata is imported — replaces the
    # hand-patched, unversioned file the WC ESPN ingest used to depend on.
    - ./configs/soccerdata:/opt/airflow/configs/soccerdata:ro
    # SofaScore source metadata + activation flags. Deliberately read-only in
    # Airflow: discovery writes the host-side versioned registry, never a
    # scheduler/worker checkout at runtime.
    - ./configs/sofascore:/opt/airflow/configs/sofascore:ro
    # Shared paid-canary runtime fingerprint input. Airflow only reads it.
    - ./configs/proxy_filter:/opt/airflow/configs/proxy_filter:ro
    # SSO-конфиг: читает только webserver, scheduler игнорирует (фаза 6)
    - ./configs/airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
    - ./scrapers:/opt/airflow/scrapers:ro
    - ./scripts:/opt/airflow/scripts:ro
    # Compatibility for non-FBref DAGs that still use the shared proxy pool.
    # The FBref runner does not receive this path and only uses its lease API.
    - ./proxys.txt:/opt/airflow/proxys.txt:ro
    # Tier-2 dbt pilot: dbt project rendered/run by Cosmos (dag_dbt_fbref_silver).
    # rw so `dbt deps`/`dbt` can write dbt_packages/ + target/ (both gitignored).
    - ./transform:/opt/airflow/transform
    # soccerdata page cache (SoFIFA et al.): survives container recreation so
    # a task retry / redeploy mid long crawl (~546 player pages) reuses cached
    # pages instead of refetching. Files are keyed by sofifa version_id, so
    # the cache never goes stale by content.
    - soccerdata_cache:/home/airflow/soccerdata
  networks:
    - frontend
    - backend
    - storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    trino:
      condition: service_healthy

services:
  # ===========================================================================
  # SeaweedFS - S3-compatible object storage (replaces HDFS).
  # Keep the production-compatible legacy `weed mini` data topology in the
  # default Compose model, but never attach its unauthenticated master, filer,
  # volume, WebDAV or admin listeners to an application network. Only the
  # separately sandboxed S3 gateway below spans the private control network and
  # `storage`. The reviewed four-plane migration remains separately gated.
  # ===========================================================================
  seaweedfs:
    image: chrislusf/seaweedfs:4.36@sha256:800b2115c63236e8bd0e5d572dc25dd493dc2feed08b54a2a269dc0101c9d94a
    entrypoint: ["/usr/local/bin/seaweedfs-legacy-entrypoint"]
    container_name: seaweedfs
    hostname: seaweedfs
    restart: unless-stopped
    # Keep routine Compose reconciliation from escalating to SIGKILL while the
    # embedded master/filer/volume services flush metadata and object writes.
    stop_grace_period: 120s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    command:
      - mini
      - -dir=/data
      - -bucket=${ICEBERG_WAREHOUSE}
      - -s3.config=/etc/seaweedfs/s3.config.json
      - -s3=false
      - -s3.port.iceberg=0
      - -s3.iam=false
      - -webdav=false
      - -admin.ui=false
      - -filer.disableDirListing=true
      - -filer.ui.deleteDir=false
    volumes:
      - seaweedfs_data:/data
      - ./scripts/seaweedfs_legacy_entrypoint.sh:/usr/local/bin/seaweedfs-legacy-entrypoint:ro
      - ${SEAWEEDFS_S3_CONFIG_FILE:-./configs/seaweedfs/s3.config.json}:/etc/seaweedfs/s3.config.json:ro
    networks:
      - seaweedfs-control
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          # 1G caused a memcg-OOM crashloop (weed RSS ~1G under Iceberg
          # read/write + metadata load; 5 restarts in ~1h during a bronze
          # backfill). S3 store dying mid-write corrupts the edition write.
          # 4G leaves headroom over the observed ~1G working set.
          memory: 4G
        reservations:
          memory: 256M

  # The only SeaweedFS process reachable from application containers. It has
  # no data volume or filesystem capabilities and talks to the legacy filer on
  # the isolated control network.
  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.36@sha256:800b2115c63236e8bd0e5d572dc25dd493dc2feed08b54a2a269dc0101c9d94a
    entrypoint: ["/usr/local/bin/seaweedfs-legacy-entrypoint"]
    container_name: seaweedfs-s3
    hostname: seaweedfs-s3
    restart: unless-stopped
    stop_grace_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - s3
      - -ip.bind=0.0.0.0
      - -port=8333
      - -filer=seaweedfs:8888
      - -config=/etc/seaweedfs/s3.config.json
      - -port.iceberg=0
      - -iam=false
      - -allowDeleteBucketNotEmpty=false
      - -concurrentFileUploadLimit=16
      - -concurrentUploadLimitMB=512
    volumes:
      - ${SEAWEEDFS_S3_CONFIG_FILE:-./configs/seaweedfs/s3.config.json}:/etc/seaweedfs/s3.config.json:ro
      - ./scripts/seaweedfs_legacy_entrypoint.sh:/usr/local/bin/seaweedfs-legacy-entrypoint:ro
    # The upstream image declares VOLUME /data. Override that implicit,
    # persistent anonymous volume with a bounded ephemeral mount: this gateway
    # talks to the filer and must never own storage state.
    tmpfs:
      - /data:rw,noexec,nosuid,nodev,size=16m,mode=0700
    networks:
      seaweedfs-control:
        aliases:
          - seaweedfs-s3-internal
    depends_on:
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M

  # SeaweedFS 4.36 always opens an unauthenticated S3 gRPC listener at
  # HTTP-port+10000. Keep that process private and expose only its authenticated
  # HTTP listener through this credential-free, volume-free L7 boundary.
  seaweedfs-s3-proxy:
    image: caddy:2.10-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    container_name: seaweedfs-s3-proxy
    hostname: seaweedfs-s3-proxy
    user: "65534:65534"
    read_only: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The official binary carries cap_net_bind_service as a file capability;
    # Docker must retain it in the bounding set even though this listener is
    # on the unprivileged port 8333.
    cap_add:
      - NET_BIND_SERVICE
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/S3ProxyCaddyfile
      - --adapter
      - caddyfile
    environment:
      XDG_CONFIG_HOME: /tmp/caddy/config
      XDG_DATA_HOME: /tmp/caddy/data
    ports:
      - "127.0.0.1:8333:8333"
    volumes:
      - ./configs/seaweedfs/S3ProxyCaddyfile:/etc/caddy/S3ProxyCaddyfile:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=0700,uid=65534,gid=65534
    networks:
      seaweedfs-control:
      storage:
        aliases:
          - seaweedfs
    depends_on:
      seaweedfs-s3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ===========================================================================
  # Lakekeeper - Iceberg REST Catalog (replaces Hive Metastore)
  # Rust single binary backed by Postgres. `migrate` runs schema migrations once;
  # `serve` exposes the REST catalog on :8181. Warehouse + bootstrap created via
  # `make bootstrap-catalog` (curl to the management API).
  # ===========================================================================
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.13.0@sha256:197461260d442a57971f60f663a5550c1113a8c3b21c68e47456e3607182a941
    container_name: lakekeeper-migrate
    command: ["migrate"]
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.13.0@sha256:197461260d442a57971f60f663a5550c1113a8c3b21c68e47456e3607182a941
    container_name: lakekeeper
    hostname: lakekeeper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["serve"]
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
    ports:
      - "127.0.0.1:8181:8181"
    networks:
      - backend
      - storage
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      seaweedfs-s3-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # PostgreSQL - Metadata Storage
  # ===========================================================================
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_READ_SEARCH
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      LAKEKEEPER_DB_PASSWORD: ${LAKEKEEPER_DB_PASSWORD}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      OPENMETADATA_DB_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/images/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          # One instance serves Airflow + Lakekeeper + Superset + OpenMetadata;
          # 256M sat at ~82% during normal load — backfill bursts (Airflow
          # heartbeats + Lakekeeper commits) need headroom (#847).
          memory: 1G
        reservations:
          memory: 128M

  # ===========================================================================
  # Redis - Celery Broker for Airflow
  # ===========================================================================
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: redis
    hostname: redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: redis-server --requirepass ${REDIS_PASSWORD} --protected-mode yes --rename-command FLUSHALL "" --rename-command FLUSHDB ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ===========================================================================
  # Tor Proxy - Alternative for Cloudflare bypass
  # ===========================================================================
  tor:
    profiles: ["heavy"]
    # Registry proof on 2026-07-16: the published 0.3.1 tag is absent (404).
    # The immutable latest index keeps the same torproxy.sh entrypoint and the
    # required 9050/9051 ports; the digest, not the display tag, selects bytes.
    image: dperson/torproxy:latest@sha256:d8b5f1cf24f1b7a0aa334929a264b2606a107223dd0d51eb1cda8aae6fbeec53
    container_name: tor
    hostname: tor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "127.0.0.1:9150:9050"   # SOCKS5 proxy (mapped to 9150 to avoid conflict)
      - "127.0.0.1:9151:9051"   # Control port
    networks:
      - backend
    environment:
      - TOR_NewCircuitPeriod=30
      - TOR_MaxCircuitDirtiness=60
      # :- default silences the unset-variable warning on every compose call
      # (tor is heavy-profile only; control port is bound to 127.0.0.1).
      - PASSWORD=${TOR_CONTROL_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "curl --socks5 localhost:9050 -s https://check.torproject.org/api/ip | grep -q IsTor || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ===========================================================================
  # Airflow
  # ===========================================================================
  airflow-log-init:
    image: data-platform-airflow-base:2.11.2-whoscored
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-base
    container_name: airflow-log-init
    user: "0:0"
    entrypoint: ["/bin/bash", "-euc"]
    command:
      - |
        chown -R --no-dereference 50000:0 /opt/airflow/logs
        chmod 0770 /opt/airflow/logs
        test "$$(stat -c '%u:%g' /opt/airflow/logs)" = '50000:0'
        test -w /opt/airflow/logs
        # Repair volumes created by an older image before any non-root Airflow
        # service imports soccerdata or tries to populate its cache.
        chown -R --no-dereference 50000:0 /home/airflow/soccerdata
        chmod -R u+rwX,g+rwX,o-rwx /home/airflow/soccerdata
        test "$$(stat -c '%u:%g' /home/airflow/soccerdata)" = '50000:0'
    volumes:
      - ./logs:/opt/airflow/logs
      - soccerdata_cache:/home/airflow/soccerdata
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    restart: "no"

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        python /opt/airflow/scripts/init_seaweedfs_bucket.py
        airflow db migrate
        # Durable FBref registry/frontier shares Airflow's PostgreSQL server
        # in an isolated schema.  The migration is advisory-lock protected and
        # idempotent across init retries and rolling upgrades.
        python -m scrapers.fbref.control migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        # Serialize heavy ingest scrapers to 1 concurrent task platform-wide:
        # two browser/FlareSolverr scrapers at once exhaust VM swap → scheduler
        # stalls → live tasks get orphan-reset (#671). Idempotent (create/update).
        airflow pools set 'ingest_scraper_pool' 1 'Serialize heavy ingest scrapers to avoid VM swap (#671)'
        # FotMob is lightweight direct HTTP.  A separate bounded pool prevents
        # browser scrapers from serializing it while limiting source fan-out.
        airflow pools set 'fotmob_http_pool' 4 'Bounded direct FotMob HTTP work'
        # WhoScored daily scopes use one slot each; exclusive controller/DQ
        # tasks consume every configured slot so they cannot overlap writers.
        # `pools set` is an idempotent create/update operation on fresh and
        # already-initialised Airflow metadata databases.
        case "$${WHOSCORED_SOURCE_POOL_SLOTS}" in
          2|3|4) ;;
          *) echo 'WHOSCORED_SOURCE_POOL_SLOTS must be 2, 3, or 4' >&2; exit 1 ;;
        esac
        if [[ "$${WHOSCORED_BACKFILL_POOL}" != "$${WHOSCORED_DIRECT_POOL}" ]]; then
          echo 'WhoScored daily and backfill must share one source pool' >&2
          exit 1
        fi
        airflow pools set "$${WHOSCORED_DIRECT_POOL}" "$${WHOSCORED_SOURCE_POOL_SLOTS}" 'WhoScored bounded direct-only source concurrency'
        airflow pools set "$${WHOSCORED_DQ_POOL}" 2 'WhoScored bounded Iceberg data-quality queries'
        airflow pools set 'whoscored_storage_pool' 1 'WhoScored serialized backup and restore verification'
        echo "Airflow initialization complete"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    depends_on:
      airflow-log-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trino:
        condition: service_healthy
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    # The production service is numeric non-root. Do not inherit the common
    # CHOWN/SETUID/SETGID/SYS_PTRACE set: Chromium already runs without its
    # setuid sandbox and a non-root exec cannot retain these non-ambient caps.
    cap_add: []
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    # Build the scheduler-only native TLS target from the same Dockerfile.
    # This is a real multi-stage dependency and works from a cold build cache.
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-scheduler
    image: data-platform-airflow-scheduler:2.11.2-whoscored
    container_name: airflow-scheduler
    command: scheduler
    environment:
      <<: *airflow-common-env
      # LocalExecutor runs backup/restore tasks in this process. Keep the
      # off-host credentials out of webserver/init and use a read-only source
      # identity when one is configured.
      WHOSCORED_BACKUP_SOURCE_S3_ACCESS_KEY: ${WHOSCORED_BACKUP_SOURCE_S3_ACCESS_KEY:-}
      WHOSCORED_BACKUP_SOURCE_S3_SECRET_KEY: ${WHOSCORED_BACKUP_SOURCE_S3_SECRET_KEY:-}
      WHOSCORED_BACKUP_DESTINATION_S3_ACCESS_KEY: ${WHOSCORED_BACKUP_DESTINATION_S3_ACCESS_KEY:-}
      WHOSCORED_BACKUP_DESTINATION_S3_SECRET_KEY: ${WHOSCORED_BACKUP_DESTINATION_S3_SECRET_KEY:-}
      WHOSCORED_BACKUP_RESTORE_S3_ACCESS_KEY: ${WHOSCORED_BACKUP_RESTORE_S3_ACCESS_KEY:-}
      WHOSCORED_BACKUP_RESTORE_S3_SECRET_KEY: ${WHOSCORED_BACKUP_RESTORE_S3_SECRET_KEY:-}
      # LocalExecutor children can read only signed approval documents.  The
      # approval/control/ledger HMAC keys live in the isolated paid boundary and
      # DagRun.conf must still pin the selected file by approval ID and SHA-256.
      WHOSCORED_PROXY_APPROVAL_ROOT: /opt/airflow/secure/whoscored-approvals
      WHOSCORED_PROXY_APPROVAL_PATH: ${WHOSCORED_PROXY_APPROVAL_PATH:-}
      WHOSCORED_PAID_GATEWAY_URL: ${WHOSCORED_PAID_GATEWAY_URL:-http://whoscored_paid_gateway:8898}
      WHOSCORED_PAID_GATEWAY_TOKEN: ${WHOSCORED_PAID_GATEWAY_TOKEN:-}
      WHOSCORED_SCRAPER_PYTHON: /usr/local/bin/python
      LEGACY_SCRAPER_PYTHON: /opt/legacy-scraper-venv/bin/python
    # YAML merge keys replace sequences, so repeat the common mounts before
    # appending the scheduler-only, deployment-owned approval directory.
    volumes:
      - type: bind
        source: ./dags
        target: /opt/airflow/dags
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${AIRFLOW_LOGS_HOST_DIR:-./logs}
        target: /opt/airflow/logs
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/medallion
        target: /opt/airflow/configs/medallion
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/soccerdata
        target: /opt/airflow/configs/soccerdata
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/sofascore
        target: /opt/airflow/configs/sofascore
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/airflow/webserver_config.py
        target: /opt/airflow/webserver_config.py
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scrapers
        target: /opt/airflow/scrapers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts
        target: /opt/airflow/scripts
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${PLATFORM_PROXY_FILE_HOST_PATH:-./proxys.txt}
        target: /opt/airflow/proxys.txt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./transform
        target: /opt/airflow/transform
        read_only: true
        bind:
          create_host_path: false
      - soccerdata_cache:/home/airflow/soccerdata
      - type: bind
        source: ${WHOSCORED_PROXY_APPROVAL_HOST_DIR:?set an absolute protected approval directory}
        target: /opt/airflow/secure/whoscored-approvals
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PROXY_FILTER_STATE_HOST_DIR:?set an absolute protected paid-filter state directory}
        target: /opt/airflow/state/whoscored-proxy-filter
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 4G OOM-killed a long sofifa backfill run (python rss ~3G after 5h
          # of FS-crashloop retries + scheduler ~0.8G, dmesg 2026-07-02).
          # 8G gave console-run scrapers headroom next to the scheduler (#847).
          # 16G: one sofifa edition peaks ~5-6G at write; 2 parallel backfill
          # pools (2026-07-03 speedup) need ~12G + scheduler base.
          memory: 16G
        reservations:
          memory: 1G
    # NOTE: host swap is currently 0 — memswap_limit is a no-op (ceiling equals
    # the 16G memory limit). Kept for the day a swapfile is enabled; do NOT rely
    # on it as a buffer beyond the limit (#847 review). Must stay >= the memory
    # limit above — docker rejects memswap < memory at container create.
    memswap_limit: 16G
    networks:
      - frontend
      - backend
      - storage
      - whoscored-paid-api

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WORKERS: "2"
      # SSO через Keycloak (webserver_config.py); false = обычная форма логина
      AIRFLOW_OAUTH_ENABLED: ${AIRFLOW_OAUTH_ENABLED:-false}
      AIRFLOW_OIDC_CLIENT_SECRET: ${AIRFLOW_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      # За Caddy: доверять X-Forwarded-* (иначе redirect_uri будет http://)
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
      # 2 gunicorn-воркера по ~550MB RSS (с SSO) — в 1G ловили memcg-OOM
      # (тихий kill воркеров, 502 за Caddy; паттерн #847). Лимит ниже — 2G.
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    memswap_limit: 2G

  # ===========================================================================
  # Trino - Distributed SQL Query Engine
  # ===========================================================================
  trino:
    image: trinodb/trino:482@sha256:90b35b7c603eaa1f889bf03981a62b75f998ee6c0f851d9f4e341b49a57022b6
    container_name: trino
    hostname: trino
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - TRINO_KEYSTORE_PASSWORD=${TRINO_KEYSTORE_PASSWORD:-changeit}
      # Static S3 credentials for the Iceberg REST catalog (no vended creds).
      # Referenced as ${ENV:S3_ACCESS_KEY} / ${ENV:S3_SECRET_KEY} in iceberg.properties.
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      # OAuth2 (SSO людей через Keycloak; машинные аккаунты — по-прежнему password.db)
      - TRINO_OIDC_CLIENT_SECRET=${TRINO_OIDC_CLIENT_SECRET}
      - TRINO_OAUTH2_ISSUER=${OIDC_ISSUER:?}
      # Фикс. ключ шифрования refresh-токенов (иначе рестарт Trino разлогинивает людей)
      - TRINO_OAUTH2_REFRESH_KEY=${TRINO_OAUTH2_REFRESH_KEY}
    ports:
      - "127.0.0.1:8082:8443"
      - "[::1]:8082:8443"
    volumes:
      - ./configs/trino:/etc/trino
    networks:
      - frontend
      - backend
      - storage
    depends_on:
      lakekeeper:
        condition: service_healthy
      seaweedfs-s3-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # 5G caused silent memcg-OOM restarts every 20-50 min under bronze
          # write load (#847): JVM RSS = 3.5G heap + parquet/direct buffers +
          # metaspace + code cache > 5G; the kernel kills java, the launcher
          # (PID 1) exits 0, so Docker never sets OOMKilled — it looks like an
          # external restart. 8G left ~4G native headroom over the 4G heap
          # (configs/trino/jvm.config) — but OpenMetadata table profiling
          # (heavy profile) pushed RSS to 8.3G and OOM'd twice; 12G covers the
          # profiling-driven off-heap spikes.
          memory: 12G
        reservations:
          memory: 1G

  # ===========================================================================
  # Superset - BI / Dashboards
  # ===========================================================================
  superset:
    image: data-platform/superset:4.1.2
    build:
      context: ./docker/images/superset
      dockerfile: Dockerfile
    container_name: superset
    hostname: superset
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      trino:
        condition: service_started
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      TRINO_SUPERSET_PASSWORD: ${TRINO_SUPERSET_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
      # SSO через Keycloak (superset_config.py); false = обычная форма логина
      SUPERSET_OAUTH_ENABLED: ${SUPERSET_OAUTH_ENABLED:-false}
      SUPERSET_OIDC_CLIENT_SECRET: ${SUPERSET_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      # ~100 юзеров (issue #861): дефолт образа — 1 gunicorn-воркер.
      # 4 воркера x gthread; лимит памяти ниже поднят 1500M -> 3G
      # (правило #847: воркеры ~400-500M RSS каждый, тихий memcg-OOM)
      SERVER_WORKER_AMOUNT: "4"
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

  superset-worker:
    profiles: ["heavy"]
    image: data-platform/superset:4.1.2
    container_name: superset-worker
    hostname: superset-worker
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "--pool=prefork", "-O", "fair", "-c", "4"]
    depends_on:
      superset:
        condition: service_healthy
    networks:
      - backend
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRINO_SUPERSET_PASSWORD: ${TRINO_SUPERSET_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 256M

  superset-beat:
    profiles: ["heavy"]
    image: data-platform/superset:4.1.2
    container_name: superset-beat
    hostname: superset-beat
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["celery", "--app=superset.tasks.celery_app:app", "beat", "--pidfile", "/tmp/celerybeat.pid", "-f", "/tmp/celery_beat.log"]
    depends_on:
      superset-worker:
        condition: service_started
    networks:
      - backend
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M

  # ===========================================================================
  # OpenSearch - search backend for OpenMetadata (replaces Elasticsearch).
  # OM 1.13 ships/tests with opensearchproject/opensearch:3.4.0.
  # ===========================================================================
  opensearch:
    profiles: ["heavy"]
    image: opensearchproject/opensearch:3.4.0@sha256:1647ce2e07371f1ac8bbad28890a64ef77c5a694a61f656120f0ace09e66bf48
    container_name: opensearch
    hostname: opensearch
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Heap trimmed from OM's stock 2g/4g — small catalog, plenty of headroom.
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q -E '\"status\":\"(yellow|green)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ===========================================================================
  # OpenMetadata - Data Catalog & Lineage
  # ===========================================================================
  # OM 1.13.x no longer self-migrates on server startup — schema migrations must
  # run as a separate one-shot (`openmetadata-ops.sh migrate`) before the server
  # boots. The server depends on it completing successfully.
  openmetadata-migrate:
    profiles: ["heavy"]
    image: openmetadata/server:1.13.1@sha256:eaa318584c52d4a492a2c56c95818b5564c6ea28b2e9695ac532c856b2c61bc9
    container_name: openmetadata-migrate
    command: ["./bootstrap/openmetadata-ops.sh", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - backend
    environment: &openmetadata-env
      # Database (Postgres)
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: openmetadata
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
      OM_DATABASE: openmetadata
      # Search (OpenSearch). OM keeps the ELASTICSEARCH_* keys and switches the
      # client implementation via SEARCH_TYPE=opensearch.
      ELASTICSEARCH_HOST: opensearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_USER: ""
      ELASTICSEARCH_PASSWORD: ""
      SEARCH_TYPE: opensearch
      # Authentication / Authorization.
      # ВАЖНО: OM 1.13 читает эти значения только при первом старте (пустая
      # таблица openmetadata_settings), дальше конфиг живёт в БД. На живом
      # сервере провайдер переключает scripts/om_apply_security_config.py
      # (штатный PUT /api/v1/system/security/config), а env здесь — источник
      # истины для чистых стендов и для ОТКАТА: снёс строки настроек в БД →
      # сервер пересоздал конфиг отсюда (см. configs/openmetadata/README.md).
      # Дефолты ${VAR:-…} = basic-режим (один локальный админ) — это и есть
      # break-glass.
      # SSO-режим (Keycloak, custom-oidc, #866): секция «OpenMetadata SSO»
      # в .env.example; cutover-ранбук — configs/openmetadata/README.md.
      # Имена env сверены с conf/openmetadata.yaml образа 1.13.1.
      AUTHENTICATION_PROVIDER: ${OM_AUTH_PROVIDER:-basic}
      AUTHENTICATION_CLIENT_TYPE: ${OM_AUTH_CLIENT_TYPE:-public}
      AUTHENTICATION_AUTHORITY: ${OM_AUTH_AUTHORITY:-https://accounts.google.com}
      AUTHENTICATION_CLIENT_ID: ${OM_AUTH_CLIENT_ID:-}
      AUTHENTICATION_CALLBACK_URL: ${OM_AUTH_CALLBACK_URL:-}
      # confidential-клиент обязан ходить authorization-code flow: при дефолтном
      # id_token сырой JWT прилетает в адресную строку, и Chrome Safe Browsing
      # помечает страницу входа как фишинг («Опасный сайт»).
      AUTHENTICATION_RESPONSE_TYPE: ${OM_AUTH_RESPONSE_TYPE:-id_token}
      # В SSO-режиме список ОБЯЗАН содержать и собственный JWKS OM
      # (http://localhost:8585/api/v1/system/config/jwks) — иначе бот-JWT
      # ingestion-контура перестанут валидироваться и каталог замрёт.
      AUTHENTICATION_PUBLIC_KEYS: "${OM_AUTH_PUBLIC_KEYS:-[http://localhost:8585/api/v1/system/config/jwks]}"
      # false = входят только заведённые админом юзеры. В Keycloak открыта
      # саморегистрация (defaultGroup viewers) — «есть KC-аккаунт» не должно
      # означать «допущен в каталог».
      AUTHENTICATION_ENABLE_SELF_SIGNUP: ${OM_AUTH_ENABLE_SELF_SIGNUP:-true}
      # preferred_username первым: principal = KC-username (иначе local-part
      # email, и OM_ADMIN_PRINCIPALS не совпадёт с юзером).
      AUTHENTICATION_JWT_PRINCIPAL_CLAIMS: "${OM_AUTH_PRINCIPAL_CLAIMS:-[email,preferred_username,sub]}"
      CUSTOM_OIDC_AUTHENTICATION_PROVIDER_NAME: ${OM_AUTH_PROVIDER_NAME:-}
      # oidcConfiguration — confidential client (authorization-code flow)
      OIDC_CLIENT_ID: ${OM_AUTH_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OPENMETADATA_OIDC_CLIENT_SECRET:-}
      OIDC_TYPE: ${OM_AUTH_PROVIDER_NAME:-}
      OIDC_DISCOVERY_URI: ${OM_OIDC_DISCOVERY_URI:-}
      OIDC_CALLBACK: ${OM_AUTH_CALLBACK_URL:-http://localhost:8585/callback}
      OIDC_SERVER_URL: ${OM_PUBLIC_URL:-http://localhost:8585}
      # Дефолт образа — "consent"; если Keycloak-логин спотыкается о
      # prompt=consent, выставить OM_OIDC_PROMPT_TYPE= (пусто) в .env.
      OIDC_PROMPT_TYPE: ${OM_OIDC_PROMPT_TYPE:-consent}
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      # OM OSS не маппит OIDC-группы в роли: админы перечисляются здесь
      # (KC-username), остальные — обычные юзеры.
      AUTHORIZER_ADMIN_PRINCIPALS: "${OM_ADMIN_PRINCIPALS:-[admin]}"
      AUTHORIZER_PRINCIPAL_DOMAIN: openmetadata.org
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
      AUTHORIZER_ENABLE_SECURE_SOCKET_CONNECTION: "false"
      # Ключи подписи бот-JWT. Дефолт = keypair, зашитый в образ и публично
      # известный (kid Gb389a-…) — годится только для локалки. Перед публикацией
      # meta наружу: make gen-om-jwt-keys + OM_RSA_*/OM_JWT_* в .env.
      # Ротация ключей инвалидирует ВСЕ бот-токены (OM_JWT_TOKEN перевыпустить).
      RSA_PUBLIC_KEY_FILE_PATH: ${OM_RSA_PUBLIC_KEY_FILE_PATH:-./conf/public_key.der}
      RSA_PRIVATE_KEY_FILE_PATH: ${OM_RSA_PRIVATE_KEY_FILE_PATH:-./conf/private_key.der}
      JWT_ISSUER: ${OM_JWT_ISSUER:-open-metadata.org}
      JWT_KEY_ID: ${OM_JWT_KEY_ID:-Gb389a-9f76-gdjs-a92j-0242bk94356}
      # Server
      OPENMETADATA_CLUSTER_NAME: openmetadata
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586
      LOG_LEVEL: INFO
      # Migrations on startup
      MIGRATION_LIMIT_PARAM: 1200
    volumes:
      # RSA-ключи бот-JWT (gitignored, make gen-om-jwt-keys). Пустой каталог
      # безвреден, пока OM_RSA_* в .env не указывают внутрь него.
      - ./configs/openmetadata/jwtkeys:/etc/openmetadata/jwtkeys:ro
    restart: "no"

  openmetadata-server:
    profiles: ["heavy"]
    image: openmetadata/server:1.13.1@sha256:eaa318584c52d4a492a2c56c95818b5564c6ea28b2e9695ac532c856b2c61bc9
    container_name: openmetadata-server
    hostname: openmetadata-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8585:8585"
      - "127.0.0.1:8586:8586"
    environment:
      <<: *openmetadata-env
    volumes:
      # RSA-ключи бот-JWT (gitignored, make gen-om-jwt-keys) — см. openmetadata-migrate.
      - ./configs/openmetadata/jwtkeys:/etc/openmetadata/jwtkeys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8586/healthcheck | grep -q '\"healthy\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  openmetadata-ingestion:
    profiles: ["heavy"]
    image: openmetadata/ingestion:1.13.1@sha256:12e0cde89ecebdfa046bfbbb54d22c841f24e502159f82ece0062bf176f4088d
    container_name: openmetadata-ingestion
    hostname: openmetadata-ingestion
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    depends_on:
      openmetadata-server:
        condition: service_started
    networks:
      - backend
    # Standalone CLI container — used to run `metadata ingest -c /opt/configs/<file>.yaml`
    # on demand. Keep it alive so users can `docker compose exec openmetadata-ingestion bash`.
    entrypoint: ["/bin/bash", "-c"]
    command: ["echo 'OpenMetadata ingestion container ready. Use: docker compose exec openmetadata-ingestion metadata ingest -c /opt/configs/<file>.yaml'; tail -f /dev/null"]
    environment:
      OM_HOST_PORT: http://openmetadata-server:8585/api
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONUNBUFFERED: "1"
      # Resolved by `metadata ingest` CLI when expanding ${VAR} in YAML configs.
      # Empty defaults are intentional — workflows fail with a clear error
      # ("OM_JWT_TOKEN is empty") instead of silently using "${OM_JWT_TOKEN}"
      # as a literal token string.
      TRINO_OPENMETADATA_PASSWORD: ${TRINO_OPENMETADATA_PASSWORD:-}
      OM_JWT_TOKEN: ${OM_JWT_TOKEN:-}
    volumes:
      - ./configs/openmetadata:/opt/configs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 256M

  # ===========================================================================
  # FlareSolverr - Cloudflare challenge solver (proxy over Chromium)
  # Used by WhoScored events scraper via HTTP at port 8191
  # ===========================================================================
  flaresolverr:
    image: data-platform-flaresolverr-whoscored:3.4.6
    build:
      context: .
      dockerfile: docker/images/flaresolverr-whoscored/Dockerfile
    container_name: flaresolverr
    # The derived image uses the exact digest-pinned upstream image and bakes
    # the extension root-owned. Never replace this with an application bind:
    # client preflight must precede every browser/session side effect.
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=2g,uid=1000,gid=1000,mode=1770
      - /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
      - /app/.config:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
      - /app/.local:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: UTC
    shm_size: "1g"
    healthcheck:
      # v3.4.6 image dropped wget (only curl is present); /health returns
      # {"status": "ok"}. Using wget here marks the container unhealthy even
      # though FlareSolverr serves fine.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # 512M held Chromium in a permanent memcg-OOM crashloop during long
          # sofifa/whoscored crawls (dmesg 2026-07-02: chromium killed every
          # ~60s → «tab crashed» storm, ~60s/page). 2G keeps one browser +
          # session churn comfortably below the ceiling (#847).
          # 4G: 2 parallel sofifa pools (2026-07-03 speedup) run 2 concurrent
          # browser sessions (~0.9G each) with churn headroom.
          memory: 4G
        reservations:
          memory: 512M
    networks:
      - backend

  # Paid Chromium is a separate, authenticated process.  It has no host port,
  # no backend attachment and no direct internet route; every /v1 side effect
  # requires a one-use gateway capability.
  flaresolverr_whoscored_paid:
    profiles: ["whoscored-paid"]
    image: data-platform-flaresolverr-whoscored:3.4.6
    build:
      context: .
      dockerfile: docker/images/flaresolverr-whoscored/Dockerfile
    container_name: flaresolverr_whoscored_paid
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=2g,uid=1000,gid=1000,mode=1770
      - /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
      - /app/.config:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
      - /app/.local:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: UTC
      WHOSCORED_FLARESOLVERR_PAID_EXCLUSIVE: "1"
      WHOSCORED_FLARESOLVERR_GATEWAY_SECRET: ${WHOSCORED_FLARESOLVERR_GATEWAY_SECRET:-}
    shm_size: "1g"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - whoscored-paid-browser

  # ===========================================================================
  # fbref_proxy_filter - isolated, byte-metered residential path for FBref.
  # It is the only process that reads the dedicated proxy pool.  Airflow gets
  # an authenticated lease URL whose hard byte caps are enforced before each
  # provider read/write, including Camoufox bootstrap and redirects.
  # ===========================================================================
  fbref_proxy_filter:
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
    container_name: fbref_proxy_filter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PYTHONPATH: /opt/airflow
      PROXY_FILTER_CONTROL_TOKEN: ${SOFASCORE_PROXY_CONTROL_TOKEN:-}
      # Deliberately separate from the shared paid pool below.
      PROXY_POOL_JSON: ""
      PROXY_FILTER_ALLOW_FILE_FALLBACK: "true"
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --listen
      - 0.0.0.0:8899
      - --lease-listen
      - 0.0.0.0:8900
      - --lease-proxy-url
      - http://fbref_proxy_filter:8900
      - --proxy-file
      - /opt/airflow/proxys.txt
      - --allow-proxy-file-fallback
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/logs/fbref/proxy_filter/bytes.json
      - --daily-budget-mb
      - ${FBREF_PROXY_DAILY_BUDGET_MB:-300}
      - --max-lease-mb
      - ${FBREF_PROXY_MAX_LEASE_MB:-100}
      - --max-lease-ttl-seconds
      - ${FBREF_PROXY_MAX_LEASE_TTL_SECONDS:-7200}
      - --dagrun-budget-bytes
      - ${FBREF_PROXY_DAGRUN_BUDGET_BYTES:-104857600}
      - --url-budget-bytes
      - ${FBREF_PROXY_URL_BUDGET_BYTES:-104857600}
      - --max-active-leases
      - "1"
      - --ledger
      - /opt/airflow/logs/fbref/proxy_filter/paid_requests.jsonl
      - --sofascore-allocation-ledger
      - /opt/airflow/logs/fbref/proxy_filter/unused_sofascore_allocations.json
      - --sofascore-allocation-wal
      - /opt/airflow/logs/fbref/proxy_filter/unused_sofascore_claims.jsonl
      - --sofascore-parent-envelope
      - /opt/airflow/logs/fbref/proxy_filter/unused_sofascore_envelopes.json
    volumes:
      - ./scripts:/opt/airflow/scripts:ro
      - ./scrapers:/opt/airflow/scrapers:ro
      - ./configs/proxy_filter:/opt/airflow/configs/proxy_filter:ro
      - ./proxys.txt:/opt/airflow/proxys.txt:ro
      - ./logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - backend

  # ===========================================================================
  # proxy_filter - ad-tech filtering proxy between FlareSolverr and the
  # residential pool (#652). Cuts billable residential traffic by refusing
  # ad-tech CONNECT hosts (no MITM — preserves Chrome's TLS fingerprint).
  # Port 8899 serves the lease control API and also requires a lease for proxy
  # traffic by default. Port 8900 is lease-only; each lease pins one upstream
  # and is charged before every provider read.
  # ===========================================================================
  proxy_filter:
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-base
    container_name: proxy_filter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PROXY_FILTER_CONTROL_TOKEN: ${PROXY_FILTER_CONTROL_TOKEN:-${SOFASCORE_PROXY_CONTROL_TOKEN:-}}
      # Prefer a source credential, but keep the current production shared token
      # usable until the ordinary proxy and scheduler rotate together.
      TM_PROXY_CONTROL_TOKEN: ${TM_PROXY_CONTROL_TOKEN:-${PROXY_FILTER_CONTROL_TOKEN:-${SOFASCORE_PROXY_CONTROL_TOKEN:-}}}
      WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH: ${WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH:-/opt/airflow/logs/proxy_filter/whoscored_campaigns.json}
      # Secret JSON is injected at runtime. The service fails closed when it is
      # blank; the legacy file is intentionally not mounted into this container.
      PROXY_POOL_JSON: ${PROXY_POOL_JSON:-}
      # Production is structurally env-only. Development file fallback, when
      # needed, must use a separate explicit service definition.
      PROXY_FILTER_ALLOW_FILE_FALLBACK: "false"
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --source-mode
      - shared-no-whoscored
      - --listen
      - 0.0.0.0:8899
      - --lease-listen
      - 0.0.0.0:8900
      - --lease-proxy-url
      - http://proxy_filter:8900
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/logs/proxy_filter/bytes.json
      - --daily-budget-mb
      - ${PROXY_FILTER_DAILY_BUDGET_MB:-100}
      - --max-lease-mb
      - ${PROXY_FILTER_MAX_LEASE_MB:-24}
      - --max-lease-ttl-seconds
      - ${PROXY_FILTER_MAX_LEASE_TTL_SECONDS:-3600}
      - --dagrun-budget-bytes
      - ${PROXY_FILTER_DAGRUN_BUDGET_BYTES:-8000000}
      - --transfermarkt-dagrun-budget-bytes
      - ${PROXY_FILTER_TRANSFERMARKT_DAGRUN_BUDGET_BYTES:-0}
      - --url-budget-bytes
      - ${PROXY_FILTER_URL_BUDGET_BYTES:-2000000}
      - --max-active-leases
      - ${PROXY_FILTER_MAX_ACTIVE_LEASES:-4}
      - --sofascore-budget-artifact
      - /opt/airflow/configs/sofascore/proxy_budget_canary.json
      - --sofascore-canary-hard-cap-bytes
      - ${PROXY_FILTER_SOFASCORE_CANARY_HARD_CAP_BYTES:-0}
      - --sofascore-discovery-dagrun-budget-bytes
      - ${PROXY_FILTER_SOFASCORE_DISCOVERY_DAGRUN_BUDGET_BYTES:-0}
      - --ledger
      - /opt/airflow/logs/proxy_filter/paid_requests.jsonl
      - --whoscored-campaign-ledger
      - ${WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH:-/opt/airflow/logs/proxy_filter/whoscored_campaigns.json}
    volumes:
      # Paid-canary runtime fingerprint inputs.  The proxy control plane
      # independently recomputes the same digest as the Airflow producer.
      - ./dags:/opt/airflow/dags:ro
      - ./scripts:/opt/airflow/scripts:ro
      - ./scrapers:/opt/airflow/scrapers:ro
      - ./configs/medallion:/opt/airflow/configs/medallion:ro
      - ./configs/proxy_filter:/opt/airflow/configs/proxy_filter:ro
      - ./configs/sofascore:/opt/airflow/configs/sofascore:ro
      # Mount the already writable Airflow log root. Mounting a missing host
      # subdirectory directly makes Docker create it as root:root, while this
      # image intentionally runs as the unprivileged airflow user.
      - ./logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      airflow-log-init:
        condition: service_completed_successfully
      flaresolverr:
        condition: service_started
    networks:
      - backend

  # Dedicated paid boundary for WhoScored. It has a separate provider pool,
  # control credential and ledgers, and is opt-in until a provider subaccount
  # exposes an authoritative server-side invoice quota/usage receipt.
  whoscored_proxy_filter:
    profiles: ["whoscored-paid"]
    image: data-platform-airflow-whoscored-proxy:2.11.2-whoscored
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-whoscored-proxy
    container_name: whoscored_proxy_filter
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=50000,gid=0,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      CONNECTION_CHECK_MAX_COUNT: "0"
      PROXY_FILTER_CONTROL_TOKEN: ${WHOSCORED_PROXY_FILTER_CONTROL_TOKEN:-}
      WHOSCORED_PROXY_APPROVAL_HMAC_SECRET: ${WHOSCORED_PROXY_APPROVAL_HMAC_SECRET:-}
      WHOSCORED_PROXY_LEDGER_HMAC_SECRET: ${WHOSCORED_PROXY_LEDGER_HMAC_SECRET:-}
      TM_PROXY_CONTROL_TOKEN: ""
      WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH: /opt/airflow/state/whoscored-proxy-filter/whoscored_campaigns.json
      PROXY_POOL_JSON: ${WHOSCORED_PROXY_POOL_JSON:-}
      PROXY_FILTER_ALLOW_FILE_FALLBACK: "false"
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --source-mode
      - whoscored-only
      - --listen
      - 0.0.0.0:8899
      - --lease-listen
      - 0.0.0.0:8900
      - --lease-proxy-url
      - http://whoscored_proxy_filter:8900
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/state/whoscored-proxy-filter/bytes.json
      - --daily-budget-mb
      - ${WHOSCORED_PROXY_FILTER_DAILY_BUDGET_MB:-850}
      - --max-lease-mb
      - ${WHOSCORED_PROXY_FILTER_MAX_LEASE_MB:-2}
      - --max-lease-ttl-seconds
      - ${WHOSCORED_PROXY_FILTER_MAX_LEASE_TTL_SECONDS:-3600}
      - --dagrun-budget-bytes
      - ${WHOSCORED_PROXY_FILTER_DAGRUN_BUDGET_BYTES:-1000000000}
      - --transfermarkt-dagrun-budget-bytes
      - "0"
      - --url-budget-bytes
      - ${WHOSCORED_PROXY_FILTER_URL_BUDGET_BYTES:-2000000}
      - --max-active-leases
      - ${WHOSCORED_PROXY_FILTER_MAX_ACTIVE_LEASES:-2}
      - --sofascore-budget-artifact
      - /opt/airflow/configs/sofascore/proxy_budget_canary.json
      - --sofascore-canary-hard-cap-bytes
      - "0"
      - --sofascore-discovery-dagrun-budget-bytes
      - "0"
      - --ledger
      - /opt/airflow/state/whoscored-proxy-filter/paid_requests.jsonl
      - --whoscored-campaign-ledger
      - /opt/airflow/state/whoscored-proxy-filter/whoscored_campaigns.json
      - --whoscored-state-marker
      - /opt/airflow/state/whoscored-proxy-filter/.whoscored_state_initialized.json
    volumes:
      - type: bind
        source: ./dags
        target: /opt/airflow/dags
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts
        target: /opt/airflow/scripts
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scrapers
        target: /opt/airflow/scrapers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/medallion
        target: /opt/airflow/configs/medallion
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/proxy_filter
        target: /opt/airflow/configs/proxy_filter
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/sofascore
        target: /opt/airflow/configs/sofascore
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PROXY_FILTER_STATE_HOST_DIR:?set an absolute protected paid-filter state directory}
        target: /opt/airflow/state/whoscored-proxy-filter
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      airflow-log-init:
        condition: service_completed_successfully
    networks:
      - whoscored-paid-browser
      - whoscored-paid-provider-egress

  # The runner can ask for exactly one bounded fetch.  This gateway owns and
  # destroys proxy leases and browser sessions before returning content plus a
  # credential-free accounting receipt.
  whoscored_paid_gateway:
    profiles: ["whoscored-paid"]
    image: data-platform-airflow-whoscored-proxy:2.11.2-whoscored
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-whoscored-proxy
    container_name: whoscored_paid_gateway
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=50000,gid=0,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      CONNECTION_CHECK_MAX_COUNT: "0"
      ALERT_ENV: ${ALERT_ENV:-}
      WHOSCORED_PAID_GATEWAY_TOKEN: ${WHOSCORED_PAID_GATEWAY_TOKEN:-}
      WHOSCORED_PROXY_CONTROL_TOKEN: ${WHOSCORED_PROXY_FILTER_CONTROL_TOKEN:-}
      WHOSCORED_PROXY_APPROVAL_HMAC_SECRET: ${WHOSCORED_PROXY_APPROVAL_HMAC_SECRET:-}
      WHOSCORED_PAID_ALERT_HMAC_SECRET: ${WHOSCORED_PAID_ALERT_HMAC_SECRET:-}
      WHOSCORED_PAID_ALERT_AUTHORITY_ROOT: /opt/airflow/secure/whoscored-alert-authority
      WHOSCORED_PAID_ALERT_SECRET_PATH: /opt/airflow/secure/whoscored-alert-authority/telegram.json
      WHOSCORED_PAID_ALERT_BINDING_PATH: /opt/airflow/secure/whoscored-alert-authority/binding.json
      WHOSCORED_PAID_ALERT_RECEIPT_ROOT: /opt/airflow/state/whoscored-paid-gateway/alert-receipts
      WHOSCORED_FLARESOLVERR_GATEWAY_SECRET: ${WHOSCORED_FLARESOLVERR_GATEWAY_SECRET:-}
    command:
      - python
      - /opt/airflow/scripts/whoscored_paid_gateway.py
      - --host
      - 0.0.0.0
      - --port
      - "8898"
      - --proxy-url
      - http://whoscored_proxy_filter:8900
      - --proxy-control-url
      - http://whoscored_proxy_filter:8899
      - --flaresolverr-url
      - http://flaresolverr_whoscored_paid:8191
    volumes:
      - type: bind
        source: ./dags
        target: /opt/airflow/dags
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts
        target: /opt/airflow/scripts
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scrapers
        target: /opt/airflow/scrapers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/medallion
        target: /opt/airflow/configs/medallion
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PAID_GATEWAY_STATE_HOST_DIR:?set an absolute protected paid-gateway state directory}
        target: /opt/airflow/state/whoscored-paid-gateway
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PAID_ALERT_AUTHORITY_HOST_DIR:?set an absolute protected paid-alert authority directory}
        target: /opt/airflow/secure/whoscored-alert-authority
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8898/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      whoscored_proxy_filter:
        condition: service_healthy
      flaresolverr_whoscored_paid:
        condition: service_healthy
    networks:
      - whoscored-paid-api
      - whoscored-paid-browser
      - whoscored-paid-direct-egress

  # ---------------------------------------------------------------------------
  # sofascore_proxy_filter: выделенный платный шлюз SofaScore (#951).
  #
  # Отдельный от общего proxy_filter, чтобы прод-сбор SofaScore не делил один
  # метринг/леджер с TM/whoscored/discovery и чтобы владелец мог подключить
  # купленный под источник пул (PROXY_POOL_JSON) рестартом ТОЛЬКО этого шлюза,
  # не трогая остальные и не сбивая runtime fingerprint (пул в него не входит).
  #
  # hard-cap-bytes=0 => это ПРОДАКШН-подписант (>0 был бы эксперимент-канарейка,
  # которая никогда не авторизует прод). Верифицированный артефакт бюджета
  # монтируется по SOFASCORE_PROXY_BUDGET_ARTIFACT (в деплое — стабильный
  # runtime-путь вне чекаута, чтобы git pull / ротация релиза его не затирали).
  # Ledger/WAL на персистентном logs-руте — переживают пересоздание контейнера.
  sofascore_proxy_filter:
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
    container_name: sofascore_proxy_filter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PYTHONPATH: /opt/airflow
      PROXY_FILTER_CONTROL_TOKEN: ${SOFASCORE_PROXY_CONTROL_TOKEN:-}
      # Купленный под SofaScore пул подставляется сюда; пусто => fail-closed на
      # платный путь, разрешён только --proxy-file fallback ниже.
      PROXY_POOL_JSON: ${SOFASCORE_PROXY_POOL_JSON:-}
      PROXY_FILTER_ALLOW_FILE_FALLBACK: "true"
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --listen
      - 0.0.0.0:8899
      - --lease-listen
      - 0.0.0.0:8900
      - --lease-proxy-url
      - http://sofascore_proxy_filter:8900
      - --proxy-file
      - /opt/airflow/proxys.txt
      - --allow-proxy-file-fallback
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/logs/sofascore_proxy_filter/bytes.json
      - --daily-budget-mb
      - ${SOFASCORE_PROXY_DAILY_BUDGET_MB:-300}
      - --max-lease-mb
      - ${SOFASCORE_PROXY_MAX_LEASE_MB:-46}
      - --max-lease-ttl-seconds
      - ${SOFASCORE_PROXY_MAX_LEASE_TTL_SECONDS:-3600}
      - --dagrun-budget-bytes
      - ${SOFASCORE_PROXY_DAGRUN_BUDGET_BYTES:-8000000}
      - --url-budget-bytes
      - ${SOFASCORE_PROXY_URL_BUDGET_BYTES:-2000000}
      # SofaScore = один активный лиз за раз (сериализация источника).
      - --max-active-leases
      - "1"
      - --sofascore-budget-artifact
      - ${SOFASCORE_PROXY_BUDGET_ARTIFACT:-/opt/airflow/configs/sofascore/proxy_budget_canary.json}
      # 0 = боевой подписант (не эксперимент-канарейка).
      - --sofascore-canary-hard-cap-bytes
      - "0"
      - --sofascore-discovery-dagrun-budget-bytes
      - ${PROXY_FILTER_SOFASCORE_DISCOVERY_DAGRUN_BUDGET_BYTES:-0}
      - --ledger
      - /opt/airflow/logs/sofascore_proxy_filter/paid_requests.jsonl
      - --sofascore-allocation-ledger
      - /opt/airflow/logs/sofascore_proxy_filter/sofascore_allocations.json
      - --sofascore-allocation-wal
      - /opt/airflow/logs/sofascore_proxy_filter/sofascore_allocation_claims.jsonl
    volumes:
      # Runtime-fingerprint входы: контрольная плоскость независимо
      # пересчитывает тот же digest, что и продюсер в Airflow.
      - ./dags:/opt/airflow/dags:ro
      - ./scripts:/opt/airflow/scripts
      - ./scrapers:/opt/airflow/scrapers
      - ./configs/medallion:/opt/airflow/configs/medallion:ro
      - ./configs/proxy_filter:/opt/airflow/configs/proxy_filter:ro
      - ./configs/sofascore:/opt/airflow/configs/sofascore:ro
      - ./proxys.txt:/opt/airflow/proxys.txt:ro
      - ./logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Caddy: публичный вход платформы (docs/design/analyst-access.md).
  # Все сайты на ${PUBLIC_IP}:443 за Keycloak SSO; OpenMetadata не публикуется,
  # все 127.0.0.1-биндинги сервисов остаются для SSH-туннелей.
  # Alias'ы auth./trino.<домен>: контейнеры (backchannel OIDC, ноутбуки)
  # резолвят публичные имена прямо в Caddy без hairpin через интернет.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.10-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    container_name: caddy
    hostname: caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      frontend:
        aliases:
          # Контейнеры резолвят публичные имена в Caddy (issuer/Trino)
          - auth.${PLATFORM_DOMAIN:-platform-domain-unset}
          - trino.${PLATFORM_DOMAIN:-platform-domain-unset}
      # В сети ноутбуков Caddy — единственный «выход наружу»: через его alias
      # юзер-контейнеры ходят в Trino и Keycloak (:443)
      analyst:
        aliases:
          - auth.${PLATFORM_DOMAIN:-platform-domain-unset}
          - trino.${PLATFORM_DOMAIN:-platform-domain-unset}
    ports:
      # Публичный вход на PUBLIC_IP (listener :443, все сайты) + ACME :80.
      - "${PUBLIC_IP:?PUBLIC_IP not set}:80:80"
      - "${PUBLIC_IP:?}:443:443"
    environment:
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-platform-domain-unset}
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # JSON access-log для fail2ban на хосте (configs/fail2ban/)
      - /var/log/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      # именно 127.0.0.1: busybox-wget резолвит localhost в ::1, а admin-порт
      # caddy слушает только IPv4 -> ложный unhealthy
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Keycloak: единый вход (SSO) для аналитиков (docs/design/analyst-access.md).
  # Люди логинятся через него; машинные аккаунты (password.db, локальные админы)
  # от Keycloak НЕ зависят — его падение не трогает пайплайны.
  # База keycloak в общем postgres: на живом проде создать scripts/create_keycloak_db.sh
  # (init-databases.sh выполняется только на свежем томе).
  # Перед первым запуском: make render-keycloak-realm (иначе docker создаст
  # ПАПКУ вместо файла realm-football.json и импорт сломается).
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.3@sha256:357829ec7c4693397533035092ad13b0644bcc95ded311f33a3738c4d9e9bdba
    container_name: keycloak
    hostname: keycloak
    command: ["start", "--import-realm"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?}
      KC_HOSTNAME: ${KC_PUBLIC_URL:?KC_PUBLIC_URL not set — https://auth.<домен>}
      # Админ-консоль (и её OIDC-флоу в master realm) живёт на localhost-бинде:
      # снаружи /admin и /realms/master закрыты Caddy (403), админ ходит через
      # SSH-туннель `ssh -L 8180:127.0.0.1:8180 <VM>`.
      KC_HOSTNAME_ADMIN: http://127.0.0.1:8180
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?}
      # JVM-готча проекта: heap ≤ 50-70% cgroup-лимита, иначе тихий OOM-kill
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx512m"
    volumes:
      - ./configs/keycloak/realm-football.json:/opt/keycloak/data/import/realm-football.json:ro
    restart: unless-stopped
    healthcheck:
      # в образе нет curl/wget; health-эндпоинты на management-порту 9000
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q UP <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # JupyterHub: ноутбуки аналитиков (docs/design/analyst-access.md, фаза 5).
  # Вход через Keycloak; на юзера — свой контейнер (2G/2cpu) в сети dp-analyst,
  # из которой видны только hub и Caddy (не postgres/lakekeeper/seaweedfs).
  # docker.sock нужен DockerSpawner'у (осознанный риск v1, см. риск-регистр).
  # ---------------------------------------------------------------------------
  jupyterhub:
    image: data-platform/jupyterhub:5.3
    build:
      context: ./docker/images/jupyterhub
      dockerfile: Dockerfile
    container_name: jupyterhub
    hostname: jupyterhub
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend
      - analyst
    environment:
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      JUPYTERHUB_OIDC_CLIENT_SECRET: ${JUPYTERHUB_OIDC_CLIENT_SECRET:?}
      TRINO_ANALYST_SVC_PASSWORD: ${TRINO_ANALYST_SVC_PASSWORD:?}
      # Публичные FQDN хаба и Trino для ноутбуков (порт 443 — listener Caddy)
      JUPYTER_PUBLIC_HOST: ${JUPYTER_PUBLIC_HOST:?}
      TRINO_PUBLIC_HOST: ${TRINO_PUBLIC_HOST:?}
      TRINO_PUBLIC_PORT: ${TRINO_PUBLIC_PORT:-443}
    command: ["jupyterhub", "-f", "/srv/jupyterhub/jupyterhub_config.py"]
    volumes:
      - ./configs/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub_data:/srv/jupyterhub
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/hub/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  # Frontend: services with web UI accessible from host
  frontend:
    driver: bridge
    name: dp-frontend
  # Backend: application services (Airflow, Lakekeeper, PostgreSQL, Redis)
  backend:
    driver: bridge
    name: dp-backend
  # Storage: data storage + catalog layer (SeaweedFS, Lakekeeper, Trino)
  storage:
    driver: bridge
    name: dp-storage
  # Only SeaweedFS storage planes and the credential-enforcing S3 gateway may
  # join this network. Docker `internal` isolates container/external routing;
  # it does NOT block host-to-container-IP traffic. Production therefore
  # requires the dedicated-host trust boundary documented in the runbook.
  seaweedfs-control:
    driver: bridge
    internal: true
    name: dp-seaweedfs-control
  # Analyst: JupyterHub + юзер-контейнеры + Caddy (alias). Изолирована от
  # postgres/redis/lakekeeper/seaweedfs — ноутбуки ходят только через Caddy.
  analyst:
    driver: bridge
    name: dp-analyst
  # Scheduler <-> L7 gateway only.  No proxy or browser capability is visible.
  whoscored-paid-api:
    driver: bridge
    internal: true
    name: dp-whoscored-paid-api
  # Gateway, authenticated Chromium and filtering proxy only.
  whoscored-paid-browser:
    driver: bridge
    internal: true
    name: dp-whoscored-paid-browser
  # Deliberately separate egress planes prevent Chromium from bypassing the
  # filter and prevent the filter from becoming a general direct web client.
  whoscored-paid-direct-egress:
    driver: bridge
    name: dp-whoscored-paid-direct-egress
  whoscored-paid-provider-egress:
    driver: bridge
    name: dp-whoscored-paid-provider-egress

# =============================================================================
# Volumes
# =============================================================================
volumes:
  soccerdata_cache:
    name: soccerdata_cache
  seaweedfs_data:
    name: ${SEAWEEDFS_DATA_VOLUME_NAME:?SEAWEEDFS_DATA_VOLUME_NAME is required}
    external: true
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data
  superset_home:
    name: superset_home
  opensearch_data:
    name: opensearch_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  jupyterhub_data:
    name: jupyterhub_data
