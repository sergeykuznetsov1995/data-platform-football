# =============================================================================
# Data Platform - Docker Compose
# Medallion Architecture: Bronze -> Silver -> Gold
# =============================================================================

name: data-platform

x-airflow-common: &airflow-common
  build:
    context: ./docker/images/airflow
    dockerfile: Dockerfile
  shm_size: '512m'  # Chrome uses /dev/shm for IPC; Docker default 64MB causes crashes
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETGID
    - SETUID
    - SYS_PTRACE  # Required for Chrome/nodriver browser automation
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
    TRINO_PASSWORD: ${TRINO_PASSWORD}
    TRINO_PORT: ${TRINO_PORT}
    # Raw-first FBref pages share the existing SeaweedFS bucket but live
    # outside Iceberg table prefixes. The parser uses pyarrow.fs directly.
    S3_ACCESS_KEY: ${S3_ACCESS_KEY}
    S3_SECRET_KEY: ${S3_SECRET_KEY}
    FBREF_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/fbref
    WHOSCORED_RAW_STORE_URI: s3://${ICEBERG_WAREHOUSE}/raw/whoscored
    WHOSCORED_RAW_S3_ENDPOINT: seaweedfs:8333
    WHOSCORED_RAW_S3_SCHEME: http
    # WhoScored V2 uses this endpoint only after two classified direct
    # Cloudflare failures.  PROXY_FILTER_URL remains the legacy always-proxy
    # toggle and is deliberately not reused here.
    # The authenticated data plane is separate from the lease control plane.
    # Keeping the fallback URL on 8900 makes a missing/malformed control-plane
    # response fail closed instead of falling back to the legacy no-auth port.
    WHOSCORED_PAID_PROXY_URL: ${WHOSCORED_PAID_PROXY_URL:-http://proxy_filter:8900}
    WHOSCORED_PROXY_CONTROL_URL: ${WHOSCORED_PROXY_CONTROL_URL:-http://proxy_filter:8899}
    FBREF_RAW_S3_ENDPOINT: seaweedfs:8333
    FBREF_RAW_S3_SCHEME: http
    # Route FlareSolverr scrapers (WhoScored/SoFIFA) through the ad-tech filter (#652).
    # Off by default — set to http://proxy_filter:8899 to cut residential traffic.
    PROXY_FILTER_URL: ${PROXY_FILTER_URL:-}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ALERT_ENV: ${ALERT_ENV:-dev}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    # E1 medallion config: team_aliases.yaml + competitions.yaml — read-only
    # for utils/medallion_config.py (default CONFIG_DIR=/opt/airflow/configs/medallion)
    - ./configs/medallion:/opt/airflow/configs/medallion:ro
    # SSO-конфиг: читает только webserver, scheduler игнорирует (фаза 6)
    - ./configs/airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
    - ./scrapers:/opt/airflow/scrapers
    - ./scripts:/opt/airflow/scripts
    - ./proxys.txt:/opt/airflow/proxys.txt:ro
    # Tier-2 dbt pilot: dbt project rendered/run by Cosmos (dag_dbt_fbref_silver).
    # rw so `dbt deps`/`dbt` can write dbt_packages/ + target/ (both gitignored).
    - ./transform:/opt/airflow/transform
    # soccerdata page cache (SoFIFA et al.): survives container recreation so
    # a task retry / redeploy mid long crawl (~546 player pages) reuses cached
    # pages instead of refetching. Files are keyed by sofifa version_id, so
    # the cache never goes stale by content.
    - soccerdata_cache:/home/airflow/soccerdata
  networks:
    - frontend
    - backend
    - storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    trino:
      condition: service_healthy

services:
  # ===========================================================================
  # SeaweedFS - S3-compatible object storage (replaces HDFS)
  # `mini` = single-process dev mode (master+volume+filer+S3). -bucket pre-creates
  # the warehouse bucket; -s3.config supplies static credentials (no STS/vending).
  # ===========================================================================
  seaweedfs:
    image: chrislusf/seaweedfs:4.36
    container_name: seaweedfs
    hostname: seaweedfs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    command:
      - mini
      - -dir=/data
      - -bucket=${ICEBERG_WAREHOUSE}
      - -s3.config=/etc/seaweedfs/s3.config.json
    ports:
      - "127.0.0.1:8333:8333"  # S3 API
    volumes:
      - seaweedfs_data:/data
      - ./configs/seaweedfs/s3.config.json:/etc/seaweedfs/s3.config.json:ro
    networks:
      - storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          # 1G caused a memcg-OOM crashloop (weed RSS ~1G under Iceberg
          # read/write + metadata load; 5 restarts in ~1h during a bronze
          # backfill). S3 store dying mid-write corrupts the edition write.
          # 4G leaves headroom over the observed ~1G working set.
          memory: 4G
        reservations:
          memory: 256M

  # ===========================================================================
  # Lakekeeper - Iceberg REST Catalog (replaces Hive Metastore)
  # Rust single binary backed by Postgres. `migrate` runs schema migrations once;
  # `serve` exposes the REST catalog on :8181. Warehouse + bootstrap created via
  # `make bootstrap-catalog` (curl to the management API).
  # ===========================================================================
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.13.0
    container_name: lakekeeper-migrate
    command: ["migrate"]
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.13.0
    container_name: lakekeeper
    hostname: lakekeeper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["serve"]
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_PG_ENCRYPTION_KEY}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://lakekeeper:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
    ports:
      - "127.0.0.1:8181:8181"
    networks:
      - backend
      - storage
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # PostgreSQL - Metadata Storage
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_READ_SEARCH
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      LAKEKEEPER_DB_PASSWORD: ${LAKEKEEPER_DB_PASSWORD}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      OPENMETADATA_DB_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/images/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          # One instance serves Airflow + Lakekeeper + Superset + OpenMetadata;
          # 256M sat at ~82% during normal load — backfill bursts (Airflow
          # heartbeats + Lakekeeper commits) need headroom (#847).
          memory: 1G
        reservations:
          memory: 128M

  # ===========================================================================
  # Redis - Celery Broker for Airflow
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: redis-server --requirepass ${REDIS_PASSWORD} --protected-mode yes --rename-command FLUSHALL "" --rename-command FLUSHDB ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ===========================================================================
  # Tor Proxy - Alternative for Cloudflare bypass
  # ===========================================================================
  tor:
    profiles: ["heavy"]
    image: dperson/torproxy:0.3.1
    container_name: tor
    hostname: tor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "127.0.0.1:9150:9050"   # SOCKS5 proxy (mapped to 9150 to avoid conflict)
      - "127.0.0.1:9151:9051"   # Control port
    networks:
      - backend
    environment:
      - TOR_NewCircuitPeriod=30
      - TOR_MaxCircuitDirtiness=60
      # :- default silences the unset-variable warning on every compose call
      # (tor is heavy-profile only; control port is bound to 127.0.0.1).
      - PASSWORD=${TOR_CONTROL_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "curl --socks5 localhost:9050 -s https://check.torproject.org/api/ip | grep -q IsTor || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ===========================================================================
  # Airflow
  # ===========================================================================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        # Serialize heavy ingest scrapers to 1 concurrent task platform-wide:
        # two browser/FlareSolverr scrapers at once exhaust VM swap → scheduler
        # stalls → live tasks get orphan-reset (#671). Idempotent (create/update).
        airflow pools set 'ingest_scraper_pool' 1 'Serialize heavy ingest scrapers to avoid VM swap (#671)'
        echo "Airflow initialization complete"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 4G OOM-killed a long sofifa backfill run (python rss ~3G after 5h
          # of FS-crashloop retries + scheduler ~0.8G, dmesg 2026-07-02).
          # 8G gave console-run scrapers headroom next to the scheduler (#847).
          # 16G: one sofifa edition peaks ~5-6G at write; 2 parallel backfill
          # pools (2026-07-03 speedup) need ~12G + scheduler base.
          memory: 16G
        reservations:
          memory: 1G
    # NOTE: host swap is currently 0 — memswap_limit is a no-op (ceiling equals
    # the 16G memory limit). Kept for the day a swapfile is enabled; do NOT rely
    # on it as a buffer beyond the limit (#847 review). Must stay >= the memory
    # limit above — docker rejects memswap < memory at container create.
    memswap_limit: 16G

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WORKERS: "2"
      # SSO через Keycloak (webserver_config.py); false = обычная форма логина
      AIRFLOW_OAUTH_ENABLED: ${AIRFLOW_OAUTH_ENABLED:-false}
      AIRFLOW_OIDC_CLIENT_SECRET: ${AIRFLOW_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      # За Caddy: доверять X-Forwarded-* (иначе redirect_uri будет http://)
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
      # 2 gunicorn-воркера по ~550MB RSS (с SSO) — в 1G ловили memcg-OOM
      # (тихий kill воркеров, 502 за Caddy; паттерн #847). Лимит ниже — 2G.
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    memswap_limit: 2G

  # ===========================================================================
  # Trino - Distributed SQL Query Engine
  # ===========================================================================
  trino:
    image: trinodb/trino:482
    container_name: trino
    hostname: trino
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    environment:
      - TRINO_KEYSTORE_PASSWORD=${TRINO_KEYSTORE_PASSWORD:-changeit}
      # Static S3 credentials for the Iceberg REST catalog (no vended creds).
      # Referenced as ${ENV:S3_ACCESS_KEY} / ${ENV:S3_SECRET_KEY} in iceberg.properties.
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      # OAuth2 (SSO людей через Keycloak; машинные аккаунты — по-прежнему password.db)
      - TRINO_OIDC_CLIENT_SECRET=${TRINO_OIDC_CLIENT_SECRET}
      - TRINO_OAUTH2_ISSUER=${OIDC_ISSUER:?}
      # Фикс. ключ шифрования refresh-токенов (иначе рестарт Trino разлогинивает людей)
      - TRINO_OAUTH2_REFRESH_KEY=${TRINO_OAUTH2_REFRESH_KEY}
    ports:
      - "127.0.0.1:8082:8443"
      - "[::1]:8082:8443"
    volumes:
      - ./configs/trino:/etc/trino
    networks:
      - frontend
      - backend
      - storage
    depends_on:
      lakekeeper:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          # 5G caused silent memcg-OOM restarts every 20-50 min under bronze
          # write load (#847): JVM RSS = 3.5G heap + parquet/direct buffers +
          # metaspace + code cache > 5G; the kernel kills java, the launcher
          # (PID 1) exits 0, so Docker never sets OOMKilled — it looks like an
          # external restart. 8G left ~4G native headroom over the 4G heap
          # (configs/trino/jvm.config) — but OpenMetadata table profiling
          # (heavy profile) pushed RSS to 8.3G and OOM'd twice; 12G covers the
          # profiling-driven off-heap spikes.
          memory: 12G
        reservations:
          memory: 1G

  # ===========================================================================
  # Superset - BI / Dashboards
  # ===========================================================================
  superset:
    image: data-platform/superset:4.1.2
    build:
      context: ./docker/images/superset
      dockerfile: Dockerfile
    container_name: superset
    hostname: superset
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      trino:
        condition: service_started
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      TRINO_SUPERSET_PASSWORD: ${TRINO_SUPERSET_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
      # SSO через Keycloak (superset_config.py); false = обычная форма логина
      SUPERSET_OAUTH_ENABLED: ${SUPERSET_OAUTH_ENABLED:-false}
      SUPERSET_OIDC_CLIENT_SECRET: ${SUPERSET_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      # ~100 юзеров (issue #861): дефолт образа — 1 gunicorn-воркер.
      # 4 воркера x gthread; лимит памяти ниже поднят 1500M -> 3G
      # (правило #847: воркеры ~400-500M RSS каждый, тихий memcg-OOM)
      SERVER_WORKER_AMOUNT: "4"
      # Уведомление админу в Telegram о заявке «Прошу доступ» (superset_config.py)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

  superset-worker:
    profiles: ["heavy"]
    image: data-platform/superset:4.1.2
    container_name: superset-worker
    hostname: superset-worker
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "--pool=prefork", "-O", "fair", "-c", "4"]
    depends_on:
      superset:
        condition: service_healthy
    networks:
      - backend
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRINO_SUPERSET_PASSWORD: ${TRINO_SUPERSET_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 256M

  superset-beat:
    profiles: ["heavy"]
    image: data-platform/superset:4.1.2
    container_name: superset-beat
    hostname: superset-beat
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["celery", "--app=superset.tasks.celery_app:app", "beat", "--pidfile", "/tmp/celerybeat.pid", "-f", "/tmp/celery_beat.log"]
    depends_on:
      superset-worker:
        condition: service_started
    networks:
      - backend
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://superset:${SUPERSET_DB_PASSWORD}@postgres:5432/superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PYTHONPATH: /app/pythonpath:/app/pythonpath_dev
    volumes:
      - ./configs/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./configs/superset/bootstrap.sh:/app/pythonpath/bootstrap.sh:ro
      - ./configs/superset/datasources.yaml:/app/pythonpath/datasources.yaml:ro
      - ./configs/superset/import_datasources.py:/app/pythonpath/import_datasources.py:ro
      - ./configs/superset/create_analyst_role.py:/app/pythonpath/create_analyst_role.py:ro
      - ./configs/superset/dashboards:/app/pythonpath/dashboards:ro
      - superset_home:/app/superset_home
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M

  # ===========================================================================
  # OpenSearch - search backend for OpenMetadata (replaces Elasticsearch).
  # OM 1.13 ships/tests with opensearchproject/opensearch:3.4.0.
  # ===========================================================================
  opensearch:
    profiles: ["heavy"]
    image: opensearchproject/opensearch:3.4.0
    container_name: opensearch
    hostname: opensearch
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Heap trimmed from OM's stock 2g/4g — small catalog, plenty of headroom.
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q -E '\"status\":\"(yellow|green)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ===========================================================================
  # OpenMetadata - Data Catalog & Lineage
  # ===========================================================================
  # OM 1.13.x no longer self-migrates on server startup — schema migrations must
  # run as a separate one-shot (`openmetadata-ops.sh migrate`) before the server
  # boots. The server depends on it completing successfully.
  openmetadata-migrate:
    profiles: ["heavy"]
    image: openmetadata/server:1.13.1
    container_name: openmetadata-migrate
    command: ["./bootstrap/openmetadata-ops.sh", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - backend
    environment: &openmetadata-env
      # Database (Postgres)
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: openmetadata
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
      OM_DATABASE: openmetadata
      # Search (OpenSearch). OM keeps the ELASTICSEARCH_* keys and switches the
      # client implementation via SEARCH_TYPE=opensearch.
      ELASTICSEARCH_HOST: opensearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_USER: ""
      ELASTICSEARCH_PASSWORD: ""
      SEARCH_TYPE: opensearch
      # Authentication / Authorization (basic auth, single admin)
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_AUTHORITY: https://accounts.google.com
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: openmetadata.org
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
      AUTHORIZER_ENABLE_SECURE_SOCKET_CONNECTION: "false"
      # Server
      OPENMETADATA_CLUSTER_NAME: openmetadata
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586
      LOG_LEVEL: INFO
      # Migrations on startup
      MIGRATION_LIMIT_PARAM: 1200
    restart: "no"

  openmetadata-server:
    profiles: ["heavy"]
    image: openmetadata/server:1.13.1
    container_name: openmetadata-server
    hostname: openmetadata-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8585:8585"
      - "127.0.0.1:8586:8586"
    environment:
      <<: *openmetadata-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8586/healthcheck | grep -q '\"healthy\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  openmetadata-ingestion:
    profiles: ["heavy"]
    image: openmetadata/ingestion:1.13.1
    container_name: openmetadata-ingestion
    hostname: openmetadata-ingestion
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    depends_on:
      openmetadata-server:
        condition: service_started
    networks:
      - backend
    # Standalone CLI container — used to run `metadata ingest -c /opt/configs/<file>.yaml`
    # on demand. Keep it alive so users can `docker compose exec openmetadata-ingestion bash`.
    entrypoint: ["/bin/bash", "-c"]
    command: ["echo 'OpenMetadata ingestion container ready. Use: docker compose exec openmetadata-ingestion metadata ingest -c /opt/configs/<file>.yaml'; tail -f /dev/null"]
    environment:
      OM_HOST_PORT: http://openmetadata-server:8585/api
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONUNBUFFERED: "1"
      # Resolved by `metadata ingest` CLI when expanding ${VAR} in YAML configs.
      # Empty defaults are intentional — workflows fail with a clear error
      # ("OM_JWT_TOKEN is empty") instead of silently using "${OM_JWT_TOKEN}"
      # as a literal token string.
      TRINO_OPENMETADATA_PASSWORD: ${TRINO_OPENMETADATA_PASSWORD:-}
      OM_JWT_TOKEN: ${OM_JWT_TOKEN:-}
    volumes:
      - ./configs/openmetadata:/opt/configs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 256M

  # ===========================================================================
  # FlareSolverr - Cloudflare challenge solver (proxy over Chromium)
  # Used by WhoScored events scraper via HTTP at port 8191
  # ===========================================================================
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: UTC
    shm_size: "1g"
    healthcheck:
      # v3.4.6 image dropped wget (only curl is present); /health returns
      # {"status": "ok"}. Using wget here marks the container unhealthy even
      # though FlareSolverr serves fine.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # 512M held Chromium in a permanent memcg-OOM crashloop during long
          # sofifa/whoscored crawls (dmesg 2026-07-02: chromium killed every
          # ~60s → «tab crashed» storm, ~60s/page). 2G keeps one browser +
          # session churn comfortably below the ceiling (#847).
          # 4G: 2 parallel sofifa pools (2026-07-03 speedup) run 2 concurrent
          # browser sessions (~0.9G each) with churn headroom.
          memory: 4G
        reservations:
          memory: 512M
    networks:
      - backend

  # ===========================================================================
  # proxy_filter - ad-tech filtering proxy between FlareSolverr and the
  # residential pool (#652). Cuts billable residential traffic by refusing
  # ad-tech CONNECT hosts (no MITM — preserves Chrome's TLS fingerprint).
  # Holds the residential creds and rotates the upstream per FlareSolverr session
  # (idle-refresh: a fresh exit is drawn only when no tunnel is open, so a page and
  # its CF challenge share one IP). Scrapers route here when the global
  # PROXY_FILTER_URL=http://proxy_filter:8899 toggle is set.
  # ===========================================================================
  proxy_filter:
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
    container_name: proxy_filter
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PYTHONPATH: /opt/airflow
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --listen
      - 0.0.0.0:8899
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/logs/proxy_filter/bytes.json
      - --daily-budget-mb
      - ${PROXY_FILTER_DAILY_BUDGET_MB:-100}
      - --max-lease-mb
      - ${PROXY_FILTER_MAX_LEASE_MB:-24}
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./scrapers:/opt/airflow/scrapers
      - ./proxys.txt:/opt/airflow/proxys.txt:ro
      - ./configs/proxy_filter:/opt/airflow/configs/proxy_filter:ro
      # Mount the already writable Airflow log root. Mounting a missing host
      # subdirectory directly makes Docker create it as root:root, while this
      # image intentionally runs as the unprivileged airflow user.
      - ./logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      - flaresolverr
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Caddy: публичный вход платформы (docs/design/analyst-access.md).
  # Все сайты на ${PUBLIC_IP}:443 за Keycloak SSO; OpenMetadata не публикуется,
  # все 127.0.0.1-биндинги сервисов остаются для SSH-туннелей.
  # Alias'ы auth./trino.<домен>: контейнеры (backchannel OIDC, ноутбуки)
  # резолвят публичные имена прямо в Caddy без hairpin через интернет.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.10-alpine
    container_name: caddy
    hostname: caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      frontend:
        aliases:
          # Контейнеры резолвят публичные имена в Caddy (issuer/Trino)
          - auth.${PLATFORM_DOMAIN:-platform-domain-unset}
          - trino.${PLATFORM_DOMAIN:-platform-domain-unset}
      # В сети ноутбуков Caddy — единственный «выход наружу»: через его alias
      # юзер-контейнеры ходят в Trino и Keycloak (:443)
      analyst:
        aliases:
          - auth.${PLATFORM_DOMAIN:-platform-domain-unset}
          - trino.${PLATFORM_DOMAIN:-platform-domain-unset}
    ports:
      # Публичный вход на PUBLIC_IP (listener :443, все сайты) + ACME :80.
      - "${PUBLIC_IP:?PUBLIC_IP not set}:80:80"
      - "${PUBLIC_IP:?}:443:443"
    environment:
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-platform-domain-unset}
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # JSON access-log для fail2ban на хосте (configs/fail2ban/)
      - /var/log/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      # именно 127.0.0.1: busybox-wget резолвит localhost в ::1, а admin-порт
      # caddy слушает только IPv4 -> ложный unhealthy
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Keycloak: единый вход (SSO) для аналитиков (docs/design/analyst-access.md).
  # Люди логинятся через него; машинные аккаунты (password.db, локальные админы)
  # от Keycloak НЕ зависят — его падение не трогает пайплайны.
  # База keycloak в общем postgres: на живом проде создать scripts/create_keycloak_db.sh
  # (init-databases.sh выполняется только на свежем томе).
  # Перед первым запуском: make render-keycloak-realm (иначе docker создаст
  # ПАПКУ вместо файла realm-football.json и импорт сломается).
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: keycloak
    hostname: keycloak
    command: ["start", "--import-realm"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    ports:
      - "127.0.0.1:8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?}
      KC_HOSTNAME: ${KC_PUBLIC_URL:?KC_PUBLIC_URL not set — https://auth.<домен>}
      # Админ-консоль (и её OIDC-флоу в master realm) живёт на localhost-бинде:
      # снаружи /admin и /realms/master закрыты Caddy (403), админ ходит через
      # SSH-туннель `ssh -L 8180:127.0.0.1:8180 <VM>`.
      KC_HOSTNAME_ADMIN: http://127.0.0.1:8180
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?}
      # JVM-готча проекта: heap ≤ 50-70% cgroup-лимита, иначе тихий OOM-kill
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx512m"
    volumes:
      - ./configs/keycloak/realm-football.json:/opt/keycloak/data/import/realm-football.json:ro
    restart: unless-stopped
    healthcheck:
      # в образе нет curl/wget; health-эндпоинты на management-порту 9000
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q UP <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # JupyterHub: ноутбуки аналитиков (docs/design/analyst-access.md, фаза 5).
  # Вход через Keycloak; на юзера — свой контейнер (2G/2cpu) в сети dp-analyst,
  # из которой видны только hub и Caddy (не postgres/lakekeeper/seaweedfs).
  # docker.sock нужен DockerSpawner'у (осознанный риск v1, см. риск-регистр).
  # ---------------------------------------------------------------------------
  jupyterhub:
    image: data-platform/jupyterhub:5.3
    build:
      context: ./docker/images/jupyterhub
      dockerfile: Dockerfile
    container_name: jupyterhub
    hostname: jupyterhub
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend
      - analyst
    environment:
      OIDC_ISSUER: ${OIDC_ISSUER:?}
      JUPYTERHUB_OIDC_CLIENT_SECRET: ${JUPYTERHUB_OIDC_CLIENT_SECRET:?}
      TRINO_ANALYST_SVC_PASSWORD: ${TRINO_ANALYST_SVC_PASSWORD:?}
      # Публичные FQDN хаба и Trino для ноутбуков (порт 443 — listener Caddy)
      JUPYTER_PUBLIC_HOST: ${JUPYTER_PUBLIC_HOST:?}
      TRINO_PUBLIC_HOST: ${TRINO_PUBLIC_HOST:?}
      TRINO_PUBLIC_PORT: ${TRINO_PUBLIC_PORT:-443}
    command: ["jupyterhub", "-f", "/srv/jupyterhub/jupyterhub_config.py"]
    volumes:
      - ./configs/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub_data:/srv/jupyterhub
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/hub/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  # Frontend: services with web UI accessible from host
  frontend:
    driver: bridge
    name: dp-frontend
  # Backend: application services (Airflow, Lakekeeper, PostgreSQL, Redis)
  backend:
    driver: bridge
    name: dp-backend
  # Storage: data storage + catalog layer (SeaweedFS, Lakekeeper, Trino)
  storage:
    driver: bridge
    name: dp-storage
  # Analyst: JupyterHub + юзер-контейнеры + Caddy (alias). Изолирована от
  # postgres/redis/lakekeeper/seaweedfs — ноутбуки ходят только через Caddy.
  analyst:
    driver: bridge
    name: dp-analyst

# =============================================================================
# Volumes
# =============================================================================
volumes:
  soccerdata_cache:
    name: soccerdata_cache
  seaweedfs_data:
    name: seaweedfs_data
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data
  superset_home:
    name: superset_home
  opensearch_data:
    name: opensearch_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  jupyterhub_data:
    name: jupyterhub_data
