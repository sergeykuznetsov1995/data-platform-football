# WhoScored выделенный платный шлюз — ОТДЕЛЬНЫЙ compose-проект (#954).
#
# Почему отдельный файл/проект, а не сервисы в общем compose.yaml:
# все источники (fbref/whoscored/sofascore/…) делят ОДИН compose-проект
# `data-platform`. Любой `docker compose up` из чужого чекаута пересоздаёт ВСЕ
# сервисы проекта — и раньше сносил шлюзы (инцидент 2026-07-17: whoscored-деплой
# уронил общий scheduler всем). Вынос платного data-plane whoscored в собственный
# проект делает его невосприимчивым к чужим `up`: жизненный цикл этих трёх
# сервисов управляется ТОЛЬКО этим файлом. Это закрывает дыру, зафиксированную в
# /root/SHARED-STACK-PROTOCOL.md («fbref/whoscored — вынести так же, как sofascore»).
#
# Что здесь: платный трио WhoScored (L7-шлюз + выделенный FlareSolverr + байт-метрич.
# фильтр-прокси) и его сегментированные сети. daily/backfill/6h-canary остаются
# direct-only и этот шлюз НЕ используют (код-sentinel WHOSCORED_FULL_PAID_CRAWL_AVAILABLE=False).
# Шлюз нужен только для санкционированной измерительной канарейки dag_canary_whoscored_proxy
# (1 GB, order 38950, при свежем provider-receipt и ready-v1 attestation).
#
# Запуск (из корня стабильного чекаута, поднимает ТОЛЬКО этот шлюз):
#   docker compose -p whoscored-gw \
#     -f deploy/whoscored/gateway.compose.yaml \
#     --project-directory . \
#     --env-file /root/data-platform-football/.env up -d
#
# Обязательные переменные окружения (в общий .env / стабильные пути, переживают
# пересоздания; сервисы fail-closed при пустых секретах):
#   WHOSCORED_PROXY_POOL_JSON              — платный пул (order 38950) как JSON
#   WHOSCORED_PROXY_FILTER_CONTROL_TOKEN   — control-token фильтра
#   WHOSCORED_PROXY_APPROVAL_HMAC_SECRET   — HMAC подписи approval'ов
#   WHOSCORED_PROXY_LEDGER_HMAC_SECRET     — HMAC ledger'а
#   WHOSCORED_PAID_GATEWAY_TOKEN           — токен L7-шлюза
#   WHOSCORED_PAID_ALERT_HMAC_SECRET       — HMAC alert-квитанции
#   WHOSCORED_FLARESOLVERR_GATEWAY_SECRET  — секрет доступа шлюза к FlareSolverr
#   WHOSCORED_PROXY_FILTER_STATE_HOST_DIR  — абсолютный защищённый каталог state фильтра
#   WHOSCORED_PAID_GATEWAY_STATE_HOST_DIR  — абсолютный защищённый каталог state шлюза
#   WHOSCORED_PAID_ALERT_AUTHORITY_HOST_DIR— абсолютный защищённый каталог alert-authority (ro)
#
# CUTOVER на общем стеке (координированно, в тихое окно — НЕ побочный эффект `up`):
#   1) В общем compose.yaml перевести сети dp-whoscored-paid-{api,browser,
#      provider-egress,direct-egress} в `external: true` (создаёт этот проект),
#      удалить определения сервисов flaresolverr_whoscored_paid /
#      whoscored_proxy_filter / whoscored_paid_gateway (они переехали сюда).
#   2) Оставить у airflow-scheduler только внешнюю привязку к dp-whoscored-paid-api
#      и WHOSCORED_PAID_GATEWAY_URL=http://whoscored_paid_gateway:8898.
#   3) Поднять этот проект (`-p whoscored-gw up -d`), затем — общий scheduler.
# Пока cutover не сделан, файл существует как готовый к ревью артефакт и как
# изолированный egress для измерительной канарейки; routing работающего daily
# (direct) он не меняет.

services:
  # L7-шлюз: единственная точка, куда ходит scheduler. Не видит ни прокси, ни
  # браузера напрямую как источник трафика — только оркестрирует один bounded fetch
  # и возвращает контент + credential-free accounting receipt.
  whoscored_paid_gateway:
    image: ${WHOSCORED_GATEWAY_IMAGE:-data-platform-airflow-whoscored-proxy:2.11.2-whoscored}
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-whoscored-proxy
    container_name: whoscored_paid_gateway
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=50000,gid=0,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      CONNECTION_CHECK_MAX_COUNT: "0"
      ALERT_ENV: ${ALERT_ENV:-}
      WHOSCORED_PAID_GATEWAY_TOKEN: ${WHOSCORED_PAID_GATEWAY_TOKEN:-}
      WHOSCORED_PROXY_CONTROL_TOKEN: ${WHOSCORED_PROXY_FILTER_CONTROL_TOKEN:-}
      WHOSCORED_PROXY_APPROVAL_HMAC_SECRET: ${WHOSCORED_PROXY_APPROVAL_HMAC_SECRET:-}
      WHOSCORED_PAID_ALERT_HMAC_SECRET: ${WHOSCORED_PAID_ALERT_HMAC_SECRET:-}
      WHOSCORED_PAID_ALERT_AUTHORITY_ROOT: /opt/airflow/secure/whoscored-alert-authority
      WHOSCORED_PAID_ALERT_SECRET_PATH: /opt/airflow/secure/whoscored-alert-authority/telegram.json
      WHOSCORED_PAID_ALERT_BINDING_PATH: /opt/airflow/secure/whoscored-alert-authority/binding.json
      WHOSCORED_PAID_ALERT_RECEIPT_ROOT: /opt/airflow/state/whoscored-paid-gateway/alert-receipts
      WHOSCORED_FLARESOLVERR_GATEWAY_SECRET: ${WHOSCORED_FLARESOLVERR_GATEWAY_SECRET:-}
    command:
      - python
      - /opt/airflow/scripts/whoscored_paid_gateway.py
      - --host
      - 0.0.0.0
      - --port
      - "8898"
      - --proxy-url
      - http://whoscored_proxy_filter:8900
      - --proxy-control-url
      - http://whoscored_proxy_filter:8899
      - --flaresolverr-url
      - http://flaresolverr_whoscored_paid:8191
    volumes:
      - type: bind
        source: ./dags
        target: /opt/airflow/dags
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts
        target: /opt/airflow/scripts
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scrapers
        target: /opt/airflow/scrapers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/medallion
        target: /opt/airflow/configs/medallion
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PAID_GATEWAY_STATE_HOST_DIR:?set an absolute protected paid-gateway state directory}
        target: /opt/airflow/state/whoscored-paid-gateway
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PAID_ALERT_AUTHORITY_HOST_DIR:?set an absolute protected paid-alert authority directory}
        target: /opt/airflow/secure/whoscored-alert-authority
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8898/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      whoscored_proxy_filter:
        condition: service_healthy
      flaresolverr_whoscored_paid:
        condition: service_healthy
    networks:
      - whoscored-paid-api
      - whoscored-paid-browser
      - whoscored-paid-direct-egress

  # Выделенный FlareSolverr под платный путь: отдельный провайдерский пул,
  # эксклюзивный режим, отдельный секрет доступа. Не имеет прямого провайдерского
  # egress — ходит только через фильтр-прокси.
  flaresolverr_whoscored_paid:
    image: ${WHOSCORED_PAID_FLARESOLVERR_IMAGE:-data-platform-flaresolverr-whoscored:3.4.6}
    build:
      context: .
      dockerfile: docker/images/flaresolverr-whoscored/Dockerfile
    container_name: flaresolverr_whoscored_paid
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=2g,uid=1000,gid=1000,mode=1770
      - /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700
      - /app/.config:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
      - /app/.local:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: UTC
      WHOSCORED_FLARESOLVERR_PAID_EXCLUSIVE: "1"
      WHOSCORED_FLARESOLVERR_GATEWAY_SECRET: ${WHOSCORED_FLARESOLVERR_GATEWAY_SECRET:-}
    shm_size: "1g"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - whoscored-paid-browser

  # Байт-метричный фильтр-прокси между FlareSolverr и провайдерским пулом.
  # Единственный процесс, читающий платный пул; ведёт HMAC-ledger, durable
  # escrow и провайдерские кампании. Fail-closed при пустом пуле/секрете.
  whoscored_proxy_filter:
    image: ${WHOSCORED_PROXY_IMAGE:-data-platform-airflow-whoscored-proxy:2.11.2-whoscored}
    build:
      context: ./docker/images/airflow
      dockerfile: Dockerfile
      target: airflow-whoscored-proxy
    container_name: whoscored_proxy_filter
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=50000,gid=0,mode=0700
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=builtin
    cap_drop:
      - ALL
    cap_add: []
    environment:
      CONNECTION_CHECK_MAX_COUNT: "0"
      PROXY_FILTER_CONTROL_TOKEN: ${WHOSCORED_PROXY_FILTER_CONTROL_TOKEN:-}
      WHOSCORED_PROXY_APPROVAL_HMAC_SECRET: ${WHOSCORED_PROXY_APPROVAL_HMAC_SECRET:-}
      WHOSCORED_PROXY_LEDGER_HMAC_SECRET: ${WHOSCORED_PROXY_LEDGER_HMAC_SECRET:-}
      TM_PROXY_CONTROL_TOKEN: ""
      WHOSCORED_PROXY_CAMPAIGN_LEDGER_PATH: /opt/airflow/state/whoscored-proxy-filter/whoscored_campaigns.json
      PROXY_POOL_JSON: ${WHOSCORED_PROXY_POOL_JSON:-}
      PROXY_FILTER_ALLOW_FILE_FALLBACK: "false"
    command:
      - python
      - /opt/airflow/scripts/proxy_filter/filter_proxy.py
      - --source-mode
      - whoscored-only
      - --listen
      - 0.0.0.0:8899
      - --lease-listen
      - 0.0.0.0:8900
      - --lease-proxy-url
      - http://whoscored_proxy_filter:8900
      - --blocklist
      - /opt/airflow/configs/proxy_filter/blocklist.txt
      - --out
      - /opt/airflow/state/whoscored-proxy-filter/bytes.json
      - --daily-budget-mb
      - ${WHOSCORED_PROXY_FILTER_DAILY_BUDGET_MB:-850}
      - --max-lease-mb
      - ${WHOSCORED_PROXY_FILTER_MAX_LEASE_MB:-2}
      - --max-lease-ttl-seconds
      - ${WHOSCORED_PROXY_FILTER_MAX_LEASE_TTL_SECONDS:-3600}
      - --dagrun-budget-bytes
      - ${WHOSCORED_PROXY_FILTER_DAGRUN_BUDGET_BYTES:-1000000000}
      - --transfermarkt-dagrun-budget-bytes
      - "0"
      - --url-budget-bytes
      - ${WHOSCORED_PROXY_FILTER_URL_BUDGET_BYTES:-2000000}
      - --max-active-leases
      - ${WHOSCORED_PROXY_FILTER_MAX_ACTIVE_LEASES:-2}
      - --sofascore-budget-artifact
      - /opt/airflow/configs/sofascore/proxy_budget_canary.json
      - --sofascore-canary-hard-cap-bytes
      - "0"
      - --sofascore-discovery-dagrun-budget-bytes
      - "0"
      - --ledger
      - /opt/airflow/state/whoscored-proxy-filter/paid_requests.jsonl
      - --whoscored-campaign-ledger
      - /opt/airflow/state/whoscored-proxy-filter/whoscored_campaigns.json
      - --whoscored-state-marker
      - /opt/airflow/state/whoscored-proxy-filter/.whoscored_state_initialized.json
    volumes:
      - type: bind
        source: ./dags
        target: /opt/airflow/dags
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scripts
        target: /opt/airflow/scripts
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./scrapers
        target: /opt/airflow/scrapers
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/medallion
        target: /opt/airflow/configs/medallion
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/proxy_filter
        target: /opt/airflow/configs/proxy_filter
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./configs/sofascore
        target: /opt/airflow/configs/sofascore
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${WHOSCORED_PROXY_FILTER_STATE_HOST_DIR:?set an absolute protected paid-filter state directory}
        target: /opt/airflow/state/whoscored-proxy-filter
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8899/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - whoscored-paid-browser
      - whoscored-paid-provider-egress

networks:
  # Scheduler <-> L7-шлюз only. Ни прокси, ни браузер не видны. Standalone —
  # создаётся этим проектом; при cutover общий compose ссылается на неё external.
  whoscored-paid-api:
    driver: bridge
    internal: true
    name: dp-whoscored-paid-api
  # Шлюз, аутентифицированный Chromium и фильтр-прокси only.
  whoscored-paid-browser:
    driver: bridge
    internal: true
    name: dp-whoscored-paid-browser
  # Раздельные egress-плоскости: Chromium не может обойти фильтр, а фильтр не
  # становится общим прямым web-клиентом.
  whoscored-paid-direct-egress:
    driver: bridge
    name: dp-whoscored-paid-direct-egress
  whoscored-paid-provider-egress:
    driver: bridge
    name: dp-whoscored-paid-provider-egress
