name: WhoScored production CI

on:
  # The production contract crosses scraper, writer, schema, DAG utility,
  # image, dependency and Compose boundaries.  Run on every PR so a shared
  # dependency cannot silently bypass this gate through a fragile path list.
  pull_request:

permissions:
  contents: read

concurrency:
  group: whoscored-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    # A cold scheduler image build takes about 33 minutes on GitHub-hosted
    # runners, and the remaining production contract needs several more.
    timeout-minutes: 60
    env:
      PYTHONPYCACHEPREFIX: /tmp/whoscored-ci-pycache
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # ready-v1 validates the exact PR-head promotion child while the
          # worktree remains GitHub's synthetic merge result.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
            network=host
            provenance-add-gha=false
          buildkitd-config-inline: |
            [registry."127.0.0.1:5000"]
              http = true
              insecure = true

      - name: Start pinned loopback OCI registry
        run: |
          docker run --detach --restart always \
            --name whoscored-ci-registry \
            --publish 127.0.0.1:5000:5000 \
            registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373

      - name: Validate declared WhoScored build-provenance state
        run: |
          python -I -S scripts/generate_whoscored_runtime_evidence.py \
            --root . --check
          provenance_status="$(python -I -S -c \
            'import json; print(json.load(open("docker/images/airflow/whoscored-build-provenance-attestation.json"))["status"])')"
          case "$provenance_status" in
            blocked-v1) provenance_mode=(--expect-blocked) ;;
            ready-v1)
              provenance_mode=(
                --expect-ready-build
                --release-revision "${{ github.event.pull_request.head.sha }}"
              )
              ;;
            *) echo "unsupported provenance state: $provenance_status" >&2; exit 78 ;;
          esac
          python -I -S scripts/validate_whoscored_build_provenance.py \
            --root . "${provenance_mode[@]}" \
            --report /tmp/whoscored-build-closure.json

      - name: Install test runtime
        run: |
          python -m pip install \
            --disable-pip-version-check --no-deps \
            --require-hashes --only-binary=:all: \
            -r .github/workflows/whoscored-test.lock

      - name: Static and import checks
        run: |
          ruff check \
            scrapers/whoscored \
            scrapers/base/iceberg_writer.py \
            dags/dag_ingest_whoscored.py \
            dags/dag_backfill_whoscored.py \
            dags/dag_canary_whoscored_proxy.py \
            dags/dag_backup_whoscored_storage.py \
            dags/dag_ingest_matchhistory.py \
            dags/dag_iceberg_maintenance.py \
            dags/dag_iceberg_maintenance_daily.py \
            dags/dag_master_pipeline.py \
            dags/scripts/run_whoscored_scraper.py \
            dags/scripts/run_whoscored_backfill_item.py \
            dags/scripts/whoscored_ops_store.py \
            dags/scripts/whoscored_frozen_dq.py \
            dags/scripts/whoscored_identity.py \
            dags/scripts/whoscored_proxy_runtime.py \
            dags/utils/maintenance_tasks.py \
            dags/utils/fbref_pipeline_tasks.py \
            docker/images/airflow/whoscored_capacity_worker_bootstrap.py \
            scripts/init_seaweedfs_bucket.py \
            scripts/audit_seaweedfs_control_network.py \
            scripts/audit_seaweedfs_runtime_container.py \
            scripts/flaresolverr_extended.py \
            scripts/proxy_filter/filter_proxy.py \
            scripts/transition_seaweedfs_recovery_state.py \
            scripts/validate_seaweedfs_s3_identity_config.py \
            scripts/generate_whoscored_deployment_attestation.py \
            scripts/generate_whoscored_runtime_evidence.py \
            scripts/validate_whoscored_build_provenance.py \
            scripts/whoscored_production_admission.py \
            scripts/whoscored_proxy_campaign.py \
            scripts/research/bench_whoscored_workflow.py \
            scripts/research/whoscored_capacity_container_runtime.py \
            $(find scripts tests -type f -name '*.py' -print | grep -E '(whoscored|test_proxy_traffic|test_filter_proxy).*\.py$' | sort)
          python -m compileall -q \
            scrapers/whoscored \
            scrapers/base/iceberg_writer.py \
            dags/dag_ingest_whoscored.py \
            dags/dag_backfill_whoscored.py \
            dags/dag_canary_whoscored_proxy.py \
            dags/dag_backup_whoscored_storage.py \
            dags/dag_ingest_matchhistory.py \
            dags/dag_master_pipeline.py \
            dags/scripts/run_whoscored_scraper.py \
            dags/scripts/run_whoscored_backfill_item.py \
            dags/scripts/whoscored_ops_store.py \
            dags/scripts/whoscored_frozen_dq.py \
            dags/scripts/whoscored_identity.py \
            dags/scripts/whoscored_proxy_runtime.py \
            dags/utils/fbref_pipeline_tasks.py \
            docker/images/airflow/whoscored_capacity_worker_bootstrap.py \
            scripts/init_seaweedfs_bucket.py \
            scripts/audit_seaweedfs_control_network.py \
            scripts/audit_seaweedfs_runtime_container.py \
            scripts/flaresolverr_extended.py \
            scripts/proxy_filter/filter_proxy.py \
            scripts/transition_seaweedfs_recovery_state.py \
            scripts/validate_seaweedfs_s3_identity_config.py \
            scripts/generate_whoscored_deployment_attestation.py \
            scripts/generate_whoscored_runtime_evidence.py \
            scripts/validate_whoscored_build_provenance.py \
            scripts/whoscored_production_admission.py \
            scripts/whoscored_proxy_campaign.py \
            scripts/research/bench_whoscored_workflow.py \
            scripts/research/bench_whoscored_capacity.py \
            scripts/research/whoscored_capacity_container_runtime.py \
            scripts/research/whoscored_capacity_worker_exec.py
          bash -n scripts/cutover_seaweedfs_topology.sh
          bash -n scripts/compose.sh
          bash -n scripts/seaweedfs_legacy_entrypoint.sh
          bash -n scripts/seaweedfs_lifecycle_lock.sh
          bash -n scripts/seaweedfs_plane_entrypoint.sh
          bash -n scripts/research/run_fbref_canary_guarded.sh

      - name: Render production compose
        env:
          OIDC_ISSUER: https://ci.invalid
          PUBLIC_IP: 127.0.0.1
          KC_PUBLIC_URL: https://auth.ci.invalid
          TRINO_PUBLIC_HOST: trino.ci.invalid
          JUPYTER_PUBLIC_HOST: jupyter.ci.invalid
          LAKEKEEPER_DB_PASSWORD: ci-not-a-secret
          LAKEKEEPER_PG_ENCRYPTION_KEY: 00000000000000000000000000000000
          SEAWEEDFS_VOLUME_SIZE_LIMIT_MB: "1024"
        run: |
          minimum=2.24.4
          actual="$(docker compose version --short)"
          test "$(printf '%s\n%s\n' "$minimum" "$actual" | sort -V | head -n1)" = "$minimum"
          docker compose --env-file .env.example config --quiet
          docker compose --env-file .env.example \
            -f compose.yaml -f compose.seaweedfs-supervised.yaml \
            config --quiet
          docker compose --env-file .env.example \
            -f compose.yaml -f compose.seaweedfs-supervised.yaml \
            config --format json > /tmp/supervised-compose.json
          python - <<'PY'
          import json

          services = json.load(open("/tmp/supervised-compose.json"))["services"]
          assert services["seaweedfs"]["command"][0] == "s3"
          assert all(
              mount.get("target") != "/data"
              for mount in services["seaweedfs"]["volumes"]
          )
          for name in ("seaweedfs-master", "seaweedfs-volume", "seaweedfs-filer"):
              assert any(
                  mount.get("target") == "/data"
                  for mount in services[name]["volumes"]
              )
          PY

      - name: Prove checked-in evidence and closure report agree
        run: |
          python - <<'PY'
          import json

          attestation = json.load(open(
              "docker/images/airflow/whoscored-build-provenance-attestation.json"
          ))
          report = json.load(open("/tmp/whoscored-build-closure.json"))
          assert attestation["status"] in {"blocked-v1", "ready-v1"}
          assert report["status"] == attestation["status"]
          assert bool(report["issues"]) == (report["status"] == "blocked-v1")
          PY

      - name: Build immutable Superset and JupyterHub runtimes
        run: |
          docker buildx build \
            --cache-from type=gha,scope=whoscored-superset \
            --cache-to type=gha,mode=max,scope=whoscored-superset \
            --load \
            -t data-platform-superset:ci \
            docker/images/superset
          docker buildx build \
            --cache-from type=gha,scope=whoscored-jupyterhub \
            --cache-to type=gha,mode=max,scope=whoscored-jupyterhub \
            --load \
            -t data-platform-jupyterhub:ci \
            docker/images/jupyterhub

      - name: Build and smoke the hardened scheduler test image
        run: |
          docker buildx build \
            --target airflow-scheduler-test \
            --cache-from type=gha,scope=whoscored-airflow \
            --cache-to type=gha,mode=max,scope=whoscored-airflow \
            --load \
            -t data-platform-airflow-scheduler:ci \
            docker/images/airflow
          scheduler_smoke_tmpdir="$(mktemp -d)"
          scheduler_smoke_cidfile="$scheduler_smoke_tmpdir/cid"
          cleanup_scheduler_smoke() {
            if test -s "$scheduler_smoke_cidfile"; then
              docker rm -f "$(cat "$scheduler_smoke_cidfile")" >/dev/null 2>&1 || true
            fi
            rm -rf -- "$scheduler_smoke_tmpdir"
          }
          trap cleanup_scheduler_smoke EXIT
          timeout --kill-after=5s 45s docker run --rm \
            --cidfile "$scheduler_smoke_cidfile" \
            --network none \
            --user 50000:0 \
            --read-only \
            --shm-size 1g \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=256m,uid=50000,gid=0,mode=0700 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint /opt/legacy-scraper-venv/bin/python \
            data-platform-airflow-scheduler:ci -I -c \
            "import os, tempfile; home = tempfile.TemporaryDirectory(prefix='fbref-camoufox-home-', dir='/tmp'); cache = os.path.join(home.name, '.cache'); os.mkdir(cache, 0o700); env = {'FONTCONFIG_FILE': 'fonts.conf', 'FONTCONFIG_PATH': '/opt/fbref-camoufox/fontconfig/windows', 'HOME': home.name, 'XDG_CACHE_HOME': cache}; from camoufox.addons import DefaultAddons; from camoufox.sync_api import Camoufox; cm = Camoufox(headless='virtual', executable_path='/opt/fbref-camoufox/camoufox-bin', ff_version=152, os='windows', i_know_what_im_doing=True, exclude_addons=list(DefaultAddons), env=env); browser = cm.__enter__(); ua, platform = browser.new_page().evaluate('[navigator.userAgent, navigator.platform]'); cm.__exit__(None, None, None); home.cleanup(); assert 'Firefox/152.0' in ua and 'Windows NT 10.0' in ua, ua; assert platform == 'Win32', platform"
          cleanup_scheduler_smoke
          trap - EXIT
          docker run --rm \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint bash \
            -e PYTHONPATH=/opt/airflow:/opt/airflow/dags \
            -v "$PWD/dags:/opt/airflow/dags:ro" \
            -v "$PWD/scrapers:/opt/airflow/scrapers:ro" \
            -v "$PWD/scripts:/opt/airflow/scripts:ro" \
            -v "$PWD/configs:/opt/airflow/configs:ro" \
            data-platform-airflow-scheduler:ci -euc '
              test "$(id -u):$(id -g)" = 50000:0
              test "$(awk '\''/^CapEff:/ {print $2}'\'' /proc/self/status)" = 0000000000000000
              timeout 30 chromium \
                --headless --no-sandbox --disable-setuid-sandbox \
                --disable-gpu --user-data-dir=/tmp/whoscored-chromium-ci \
                --dump-dom "data:text/html,whoscored-zero-cap-smoke" \
                | grep -q whoscored-zero-cap-smoke
              test "$(airflow version)" = 2.11.2
              test ! -e /opt/airflow/airflow.cfg
              test ! -e /opt/airflow/gunicorn.ctl
              airflow_root_ctime="$(stat -c %Z /opt/airflow)"
              sleep 1
              /usr/local/bin/python -c \
                "from airflow.utils.serve_logs import serve_logs; serve_logs(port=18793)" \
                >/tmp/whoscored-serve-logs-smoke.log 2>&1 &
              serve_logs_pid="$!"
              serve_logs_ready=0
              for _ in $(seq 1 20); do
                if kill -0 "$serve_logs_pid" 2>/dev/null && \
                    grep -q "Listening at:" /tmp/whoscored-serve-logs-smoke.log; then
                  serve_logs_ready=1
                  break
                fi
                if ! kill -0 "$serve_logs_pid" 2>/dev/null; then
                  cat /tmp/whoscored-serve-logs-smoke.log >&2
                  exit 1
                fi
                sleep 1
              done
              test "$serve_logs_ready" = 1
              test ! -e /opt/airflow/airflow.cfg
              test ! -e /opt/airflow/gunicorn.ctl
              test "$(stat -c %Z /opt/airflow)" = "$airflow_root_ctime"
              ! grep -q "Control socket listening" \
                /tmp/whoscored-serve-logs-smoke.log
              kill "$serve_logs_pid"
              wait "$serve_logs_pid" || test "$?" -eq 143
              test "$(stat -c %Z /opt/airflow)" = "$airflow_root_ctime"
              /usr/local/bin/python -m pip check
              /opt/legacy-scraper-venv/bin/python -m pip check
              PYTHONWARNINGS=error /usr/local/bin/python -c "import importlib.metadata as m; import requests; assert m.version(\"chardet\") == \"5.2.0\""
              /usr/local/bin/python -c "import importlib.metadata as m; import curl_cffi,tls_client,tls_requests; assert m.version(\"tls-client-python\") == \"1.15.1\"; client=tls_requests.Client(proxy=\"http://127.0.0.1:9\"); client.close()"
              /opt/legacy-scraper-venv/bin/python -c "import importlib.metadata as m; import camoufox,playwright,selenium,soccerdata; import scrapers.matchhistory.scraper; assert m.version(\"wrapper-tls-requests\") == \"1.2.5\""
              for runner in \
                run_clubelo_scraper.py \
                run_espn_scraper.py \
                run_understat_scraper.py \
                run_sofifa_scraper.py \
                prepare_sofascore_workload.py \
                run_sofascore_scraper.py
              do
                /opt/legacy-scraper-venv/bin/python "/opt/airflow/dags/scripts/${runner}" --help >/dev/null
              done
              /opt/legacy-scraper-venv/bin/python /opt/airflow/dags/scripts/run_fbref_live_waves.py --help >/dev/null
              /opt/legacy-scraper-venv/bin/python /opt/airflow/dags/scripts/run_matchhistory_scraper.py --help >/dev/null
              /usr/local/bin/python -c "from airflow.models import DagBag; bag=DagBag(\"/opt/airflow/dags\", include_examples=False, safe_mode=False); assert not bag.import_errors, bag.import_errors"
            '

      - name: Build production targets and prove the declared gate state
        env:
          GIT_ATTR_NOSYSTEM: "1"
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_NOSYSTEM: "1"
          GIT_EXTERNAL_DIFF: /bin/false
          GIT_NO_REPLACE_OBJECTS: "1"
          GIT_CONFIG_COUNT: "9"
          GIT_CONFIG_KEY_0: core.fsmonitor
          GIT_CONFIG_VALUE_0: "false"
          GIT_CONFIG_KEY_1: core.hooksPath
          GIT_CONFIG_VALUE_1: /dev/null
          GIT_CONFIG_KEY_2: core.attributesFile
          GIT_CONFIG_VALUE_2: /dev/null
          GIT_CONFIG_KEY_3: filter.lfs.process
          GIT_CONFIG_VALUE_3: ""
          GIT_CONFIG_KEY_4: filter.lfs.clean
          GIT_CONFIG_VALUE_4: ""
          GIT_CONFIG_KEY_5: filter.lfs.smudge
          GIT_CONFIG_VALUE_5: ""
          GIT_CONFIG_KEY_6: filter.lfs.required
          GIT_CONFIG_VALUE_6: "false"
          GIT_CONFIG_KEY_7: diff.external
          GIT_CONFIG_VALUE_7: /bin/false
          GIT_CONFIG_KEY_8: core.worktree
          GIT_CONFIG_VALUE_8: ${{ github.workspace }}
        run: |
          umask 077
          install -d -m 0700 /tmp/whoscored-build-metadata
          BUILDX_GIT_CHECK_DIRTY=1 \
          docker buildx build \
            --target airflow-scheduler-payload \
            --platform linux/amd64 \
            --cache-from type=gha,scope=whoscored-airflow \
            --load \
            -t data-platform-airflow-scheduler-payload:provenance-ci \
            docker/images/airflow
          scheduler_tag=127.0.0.1:5000/data-platform-airflow-scheduler:provenance-ci
          proxy_tag=127.0.0.1:5000/data-platform-airflow-whoscored-proxy:provenance-ci
          BUILDX_GIT_CHECK_DIRTY=1 BUILDX_METADATA_PROVENANCE=max \
          docker buildx build \
            --target airflow-scheduler \
            --platform linux/amd64 \
            --provenance=mode=max,version=v1 \
            --metadata-file /tmp/whoscored-build-metadata/airflow-scheduler.json \
            --cache-from type=gha,scope=whoscored-airflow \
            --push \
            --tag "$scheduler_tag" \
            docker/images/airflow
          BUILDX_GIT_CHECK_DIRTY=1 BUILDX_METADATA_PROVENANCE=max \
          docker buildx build \
            --target airflow-whoscored-proxy \
            --platform linux/amd64 \
            --provenance=mode=max,version=v1 \
            --metadata-file /tmp/whoscored-build-metadata/airflow-whoscored-proxy.json \
            --cache-from type=gha,scope=whoscored-airflow \
            --push \
            --tag "$proxy_tag" \
            docker/images/airflow

          scheduler_digest="$(python -I -S -c \
            'import json, sys; print(json.load(open(sys.argv[1]))["containerimage.digest"])' \
            /tmp/whoscored-build-metadata/airflow-scheduler.json)"
          proxy_digest="$(python -I -S -c \
            'import json, sys; print(json.load(open(sys.argv[1]))["containerimage.digest"])' \
            /tmp/whoscored-build-metadata/airflow-whoscored-proxy.json)"
          scheduler="$scheduler_tag@$scheduler_digest"
          proxy="$proxy_tag@$proxy_digest"
          docker pull "$scheduler"
          docker pull "$proxy"
          docker tag "$scheduler" "$scheduler_tag"
          docker tag "$proxy" "$proxy_tag"

          sentinel="$(mktemp -d)"
          trap 'rm -rf "$sentinel"' EXIT
          assert_exit_78_before_sentinel() {
            label="$1"
            shift
            set +e
            docker run --rm -v "$sentinel:/sentinel" "$@"
            status="$?"
            set -e
            test "$status" = 78
            test ! -e "$sentinel/$label"
          }

          assert_success_after_gate() {
            label="$1"
            shift
            docker run --rm -v "$sentinel:/sentinel" "$@"
            test -e "$sentinel/$label"
          }

          provenance_status="$(python -I -S -c \
            'import json; print(json.load(open("docker/images/airflow/whoscored-build-provenance-attestation.json"))["status"])')"
          case "$provenance_status" in
            blocked-v1)
              assert_exit_78_before_sentinel scheduler-normal \
                "$scheduler" bash -c 'touch /sentinel/scheduler-normal'
              for alias in python python3 python3.11; do
                assert_exit_78_before_sentinel "scheduler-$alias" \
                  --entrypoint "$alias" "$scheduler" -S -c \
                  "open('/sentinel/scheduler-$alias','w').close()"
              done
              assert_exit_78_before_sentinel scheduler-bash-python-s \
                --entrypoint bash "$scheduler" -c \
                "python -S -c \"open('/sentinel/scheduler-bash-python-s','w').close()\""
              assert_exit_78_before_sentinel proxy-normal \
                "$proxy" bash -c 'touch /sentinel/proxy-normal'
              assert_exit_78_before_sentinel proxy-python-s \
                --entrypoint python "$proxy" -S -c \
                "open('/sentinel/proxy-python-s','w').close()"
              ;;
            ready-v1)
              assert_success_after_gate scheduler-ready \
                "$scheduler" bash -c 'touch /sentinel/scheduler-ready'
              assert_success_after_gate scheduler-python-ready \
                --entrypoint python "$scheduler" -S -c \
                "open('/sentinel/scheduler-python-ready','w').close()"
              assert_success_after_gate proxy-ready \
                "$proxy" bash -c 'touch /sentinel/proxy-ready'
              ;;
            *) echo "unsupported provenance state: $provenance_status" >&2; exit 78 ;;
          esac

          # The internal raw interpreter is an explicit trusted-host boundary,
          # not a public alias. Even through it, a real mounted WhoScored runner
          # refuses production execution before argparse, imports or I/O.
          set +e
          docker run --rm \
            --entrypoint /usr/local/libexec/whoscored-python-real \
            -v "$PWD/dags:/opt/airflow/dags:ro" \
            -v "$PWD/scrapers:/opt/airflow/scrapers:ro" \
            -v "$PWD/scripts:/opt/airflow/scripts:ro" \
            -v "$sentinel:/sentinel" \
            "$scheduler" -S \
            /opt/airflow/dags/scripts/run_whoscored_scraper.py
          raw_status="$?"
          set -e
          test "$raw_status" -ne 0
          test ! -e "$sentinel/raw-runner"

          # Materializing a venv-local executable before replacing the system
          # aliases preserves the isolated legacy dependency identity.
          docker run --rm \
            --entrypoint /opt/legacy-scraper-venv/bin/python \
            "$scheduler" -c \
            "import importlib.metadata as m, urllib3; assert urllib3.__version__.startswith('1.'); assert m.version('rich') == '14.3.4'"

      - name: Build and smoke the immutable WhoScored FlareSolverr image
        run: |
          docker buildx build \
            --file docker/images/flaresolverr-whoscored/Dockerfile \
            --load \
            -t data-platform-flaresolverr-whoscored:ci \
            .
          container="$(docker run -d \
              --read-only \
              --shm-size 1g \
              --security-opt no-new-privileges:true \
              --security-opt apparmor=docker-default \
              --security-opt seccomp=builtin \
              --cap-drop ALL \
              --tmpfs /tmp:rw,exec,nosuid,nodev,size=2g,uid=1000,gid=1000,mode=1770 \
              --tmpfs /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700 \
              --tmpfs /app/.config:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700 \
              --tmpfs /app/.local:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700 \
              data-platform-flaresolverr-whoscored:ci)"
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT
          test "$(docker inspect --format '{{.Config.User}}' "$container")" = 1000:1000
          test "$(docker inspect --format '{{.AppArmorProfile}}' "$container")" = docker-default
          test "$(docker inspect --format '{{json .HostConfig.SecurityOpt}}' "$container")" = \
            '["no-new-privileges:true","apparmor=docker-default","seccomp=builtin"]'
          test "$(docker inspect --format '{{json .HostConfig.CapAdd}}' "$container")" = null
          test "$(docker exec "$container" awk '/^CapEff:/ {print $2}' /proc/1/status)" = \
            0000000000000000
          ready=0
          for _ in $(seq 1 30); do
            if docker exec "$container" curl -fsS \
              http://127.0.0.1:8191/v1/whoscored/runtime-identity \
              > /tmp/whoscored-flaresolverr-identity.json; then
              ready=1
              break
            fi
            sleep 2
          done
          test "$ready" = 1
          docker exec "$container" curl -fsS \
            -H 'Content-Type: application/json' \
            -d '{"cmd":"sessions.list"}' \
            http://127.0.0.1:8191/v1 \
            > /tmp/whoscored-flaresolverr-v1.json
          python - <<'PY'
          import json
          import re

          identity = json.load(open("/tmp/whoscored-flaresolverr-identity.json"))
          response = json.load(open("/tmp/whoscored-flaresolverr-v1.json"))
          assert set(identity) == {"status", "version", "extension_sha256"}
          assert identity["status"] == "ok"
          assert identity["version"] == "3.4.6"
          assert re.fullmatch(r"[0-9a-f]{64}", identity["extension_sha256"])
          assert response["version"] == identity["version"]
          assert response["extension_sha256"] == identity["extension_sha256"]
          assert response["sessions"] == []
          PY

      - name: Test production admission from a protected release
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          protected_root=/opt/whoscored-ci-admission
          test ! -e "$protected_root"
          sudo install -d -o root -g root -m 0755 \
            "$protected_root/scripts"
          sudo install -o root -g root -m 0444 \
            scripts/__init__.py \
            scripts/validate_whoscored_build_provenance.py \
            scripts/whoscored_production_admission.py \
            "$protected_root/scripts/"
          test "$(stat -c '%u:%g:%a:%h' \
            "$protected_root/scripts/validate_whoscored_build_provenance.py")" \
            = "0:0:444:1"
          (
            cd /tmp
            WHOSCORED_CI_PROTECTED_ROOT="$protected_root" \
              PYTHONPATH="$protected_root:${GITHUB_WORKSPACE}" \
              python - <<'PY'
          import os
          from pathlib import Path

          from scripts import whoscored_production_admission as admission
          import pytest

          expected_root = Path(os.environ["WHOSCORED_CI_PROTECTED_ROOT"])
          assert Path(admission.__file__).absolute().parents[1] == expected_root
          test_path = (
              Path(os.environ["GITHUB_WORKSPACE"])
              / "tests/unit/scripts/test_whoscored_production_admission.py"
          )
          raise SystemExit(pytest.main(["-q", str(test_path)]))
          PY
          )

      - name: WhoScored unit, DAG and storage contract
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          WHOSCORED_REAL_DOCKER_TEST: "1"
          WHOSCORED_SCHEDULER_BUILD_METADATA: /tmp/whoscored-build-metadata/airflow-scheduler.json
          WHOSCORED_SCHEDULER_IMAGE: 127.0.0.1:5000/data-platform-airflow-scheduler:provenance-ci
          WHOSCORED_SCHEDULER_PAYLOAD_IMAGE: data-platform-airflow-scheduler-payload:provenance-ci
        run: |
          pytest -q \
            $(find tests -type f -name '*.py' -print | grep -E '/test_.*whoscored.*\.py$|/test_whoscored.*\.py$' | grep -v '/test_whoscored_production_admission.py$' | sort) \
            tests/unit/scrapers/test_iceberg_writer.py \
            tests/unit/dags/test_proxy_traffic.py \
            tests/unit/scrapers/test_flaresolverr_client.py \
            tests/unit/scrapers/test_flaresolverr_traffic_audit.py \
            tests/unit/scrapers/test_schemas.py \
            tests/unit/scripts/test_audit_bronze_columns.py \
            tests/unit/scripts/test_filter_proxy.py \
            tests/unit/scripts/test_flaresolverr_extended.py \
            tests/unit/scripts/test_cutover_seaweedfs_topology.py \
            tests/unit/scripts/test_seaweedfs_legacy_entrypoint.py \
            tests/unit/scripts/test_seaweedfs_plane_entrypoint.py \
            tests/unit/scripts/test_seaweedfs_runtime_boundary.py \
            tests/unit/scripts/test_transition_seaweedfs_recovery_state.py \
            tests/unit/scripts/test_init_seaweedfs_bucket.py \
            tests/unit/dags/test_maintenance_tasks.py \
            tests/unit/dags/test_dag_iceberg_maintenance.py \
            tests/unit/dags/test_dag_iceberg_maintenance_daily.py \
            tests/unit/dags/test_fbref_pipeline_tasks.py \
            tests/unit/dags/test_alerts_telegram_message.py \
            tests/unit/dags/test_dag_master_pipeline_fail_closed.py \
            tests/unit/dags/test_dag_ingest_matchhistory.py \
            tests/unit/configs/test_tls_requests_runtime.py \
            tests/unit/dags/test_dag_ingest_clubelo.py \
            tests/unit/dags/test_dag_ingest_sofascore.py \
            tests/unit/dags/test_dag_ingest_sofifa.py \
            tests/unit/dags/test_dag_ingest_understat.py \
            tests/unit/scrapers/test_run_clubelo_scraper.py \
            tests/unit/scrapers/test_run_espn_scraper.py \
            tests/unit/scrapers/test_run_sofascore_scraper.py \
            tests/unit/scrapers/test_run_sofifa_scraper.py \
            tests/unit/scrapers/test_run_understat_scraper.py \
            tests/unit/scripts/test_inventory_bronze_orphans.py

  real-airflow-dag-import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 2.11.2 is the pinned production image; 2.7.3 remains a supported
        # backward-compatibility parser check for existing metadata upgrades.
        airflow-version: ["2.7.3", "2.11.2"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build the immutable Airflow parser runtime
        run: |
          docker build \
            --file "docker/images/airflow/Dockerfile.ci-dag-import-${{ matrix.airflow-version }}" \
            --tag "whoscored-airflow-import:${{ matrix.airflow-version }}" \
            docker/images/airflow

      - name: Stage production WhoScored DAGs
        run: |
          dag_dir="${GITHUB_WORKSPACE}/dags/.whoscored-ci-staged"
          test ! -e "${dag_dir}"
          mkdir -p "${dag_dir}"
          for dag in \
            dag_ingest_whoscored.py \
            dag_backfill_whoscored.py \
            dag_canary_whoscored_proxy.py \
            dag_backup_whoscored_storage.py
          do
            cp "${GITHUB_WORKSPACE}/dags/${dag}" "${dag_dir}/${dag}"
          done

      - name: Check real Airflow DAG imports
        run: |
          docker run --rm \
            --read-only \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,mode=1777 \
            -e HOME=/tmp/home \
            -e AIRFLOW_HOME=/tmp/airflow \
            -e AIRFLOW__CORE__LOAD_EXAMPLES=False \
            -e AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow/airflow.db \
            -e AIRFLOW__CORE__DAGS_FOLDER=/workspace/dags/.whoscored-ci-staged \
            -e PYTHONPATH=/workspace:/workspace/dags \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            --entrypoint /bin/bash \
            "whoscored-airflow-import:${{ matrix.airflow-version }}" \
            -euc 'mkdir -p "$HOME" "$AIRFLOW_HOME"; airflow db migrate; airflow dags list-import-errors; python /workspace/scripts/ci/check_whoscored_dag_imports.py'
