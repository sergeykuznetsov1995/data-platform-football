name: WhoScored production CI

on:
  # The production contract crosses scraper, writer, schema, DAG utility,
  # image, dependency and Compose boundaries.  Run on every PR so a shared
  # dependency cannot silently bypass this gate through a fragile path list.
  pull_request:

permissions:
  contents: read

concurrency:
  group: whoscored-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BASH_ENV: /dev/null
      ENV: /dev/null
      LD_PRELOAD: ""
      PYTHONPYCACHEPREFIX: /tmp/whoscored-ci-pycache
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Protect the preinstalled runner Python 3.11
        run: |
          test -d /opt/hostedtoolcache/Python
          test ! -L /opt/hostedtoolcache/Python
          mapfile -t python_candidates < <(
            find /opt/hostedtoolcache/Python \
              -mindepth 4 -maxdepth 4 -path '*/3.11.*/x64/bin/python3.11' \
              -type f -print | sort
          )
          test "${#python_candidates[@]}" = 1
          source_python="$(readlink -f "${python_candidates[0]}")"
          source_prefix="$(dirname "$(dirname "$source_python")")"
          [[ "$source_prefix" =~ ^/opt/hostedtoolcache/Python/3\.11\.[0-9]+/x64$ ]]
          /usr/bin/sudo /bin/chmod go-w /opt
          /usr/bin/sudo /bin/chown root:root /usr/share
          /usr/bin/sudo /bin/chmod go-w /usr/share
          /usr/bin/sudo /bin/chown -R root:root /usr/share/zoneinfo
          /usr/bin/sudo /bin/chmod -R go-w /usr/share/zoneinfo
          /usr/bin/sudo /bin/chown root:root /opt/hostedtoolcache
          /usr/bin/sudo /bin/chmod go-w /opt/hostedtoolcache
          /usr/bin/sudo /bin/chown -R root:root /opt/hostedtoolcache/Python
          /usr/bin/sudo /bin/chmod -R go-w /opt/hostedtoolcache/Python
          protected_prefix="$source_prefix"
          python_bin="$source_python"
          python_version_dir="$(dirname "$protected_prefix")"
          for trusted_dir in \
            /opt /usr /usr/share /usr/share/zoneinfo \
            /opt/hostedtoolcache /opt/hostedtoolcache/Python \
            "$python_version_dir" "$protected_prefix" \
            "$protected_prefix/bin" "$protected_prefix/lib"
          do
            test "$(stat -Lc '%u:%g' "$trusted_dir")" = 0:0
            test $((8#$(stat -Lc '%a' "$trusted_dir") & 8#022)) = 0
          done
          test "$(stat -Lc '%u:%g:%h' "$python_bin")" = 0:0:1
          test $((8#$(stat -Lc '%a' "$python_bin") & 8#022)) = 0
          [[ "$("$python_bin" --version)" =~ ^Python\ 3\.11\.[0-9]+$ ]]
          if ! unexpected_python_path="$(find "$protected_prefix" -xdev \
              \( -type f -o -type d \) \
              \( ! -user root -o ! -group root -o -writable \) \
              -print -quit)"; then
            echo "protected Python scan failed" >&2
            exit 1
          fi
          test -z "$unexpected_python_path"
          unexpected_python_link=
          while IFS= read -r -d '' candidate_link; do
            resolved_link="$(readlink -f "$candidate_link")"
            case "$resolved_link" in
              "$protected_prefix"/*) ;;
              *) unexpected_python_link="$candidate_link"; break ;;
            esac
          done < <(find "$protected_prefix" -xdev -type l -print0)
          test -z "$unexpected_python_link"
          echo "WHOSCORED_CI_SETUP_PYTHON=$python_bin" >> "$GITHUB_ENV"
          dirname "$python_bin" >> "$GITHUB_PATH"

      - name: Fetch the exact pull-request merge without credentials
        env:
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_NOSYSTEM: "1"
          GIT_CONFIG_COUNT: "5"
          GIT_CONFIG_KEY_0: core.hooksPath
          GIT_CONFIG_VALUE_0: /dev/null
          GIT_CONFIG_KEY_1: filter.lfs.process
          GIT_CONFIG_VALUE_1: ""
          GIT_CONFIG_KEY_2: filter.lfs.clean
          GIT_CONFIG_VALUE_2: ""
          GIT_CONFIG_KEY_3: filter.lfs.smudge
          GIT_CONFIG_VALUE_3: ""
          GIT_CONFIG_KEY_4: filter.lfs.required
          GIT_CONFIG_VALUE_4: "false"
          WHOSCORED_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          WHOSCORED_CI_MERGE_SHA: ${{ github.sha }}
          WHOSCORED_CI_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          [[ "$WHOSCORED_CI_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WHOSCORED_CI_MERGE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WHOSCORED_CI_PR_NUMBER" =~ ^[0-9]+$ ]]
          export GIT_LFS_SKIP_SMUDGE=1
          /usr/bin/git init .
          /usr/bin/git remote add origin \
            https://github.com/sergeykuznetsov1995/data-platform-football.git
          /usr/bin/git -c protocol.version=2 fetch --no-tags --depth=3 origin \
            "+refs/pull/${WHOSCORED_CI_PR_NUMBER}/merge:refs/remotes/pull/${WHOSCORED_CI_PR_NUMBER}/merge"
          /usr/bin/git checkout --detach \
            "refs/remotes/pull/${WHOSCORED_CI_PR_NUMBER}/merge"
          test "$(/usr/bin/git rev-parse HEAD)" = "$WHOSCORED_CI_MERGE_SHA"
          test "$(/usr/bin/git rev-parse HEAD^2)" = "$WHOSCORED_CI_HEAD_SHA"
          test -z "$(/usr/bin/git config --local --get-regexp \
            '^(include|includeIf|http\..*\.extraheader|core\.hooksPath|filter\.)' \
            || true)"

      - name: Verify the immutable system Buildx binary
        run: |
          buildx_bin=/usr/libexec/docker/cli-plugins/docker-buildx
          test -f "$buildx_bin"
          test "$(stat -Lc '%u:%g:%h' "$buildx_bin")" = 0:0:1
          test $((8#$(stat -Lc '%a' "$buildx_bin") & 8#022)) = 0
          for trusted_dir in \
            /usr /usr/libexec /usr/libexec/docker \
            /usr/libexec/docker/cli-plugins
          do
            test "$(stat -Lc '%u:%g' "$trusted_dir")" = 0:0
            test $((8#$(stat -Lc '%a' "$trusted_dir") & 8#022)) = 0
          done
          echo \
            "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_bin" \
            | sha256sum --check --strict
          test "$("$buildx_bin" version)" = \
            "github.com/docker/buildx v0.35.0 a319e5b15052cf6557ceb666eb8ff6e32380b782"
          test ! -e "$HOME/.docker/cli-plugins/docker-buildx"

      - name: Start pinned loopback OCI registry
        run: |
          docker run --detach --restart always \
            --name whoscored-ci-registry \
            --publish 127.0.0.1:5000:5000 \
            registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373

      - name: Create an isolated immutable builder before repository code runs
        run: |
          export PATH=/usr/bin:/bin
          buildx_bin=/usr/libexec/docker/cli-plugins/docker-buildx
          test -f "$buildx_bin"
          test "$(/usr/bin/stat -Lc '%u:%g:%h' "$buildx_bin")" = 0:0:1
          exec 9< "$buildx_bin"
          buildx_exec=/proc/self/fd/9
          echo \
            "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_exec" \
            | /usr/bin/sha256sum --check --strict
          test "$("$buildx_exec" version)" = \
            "github.com/docker/buildx v0.35.0 a319e5b15052cf6557ceb666eb8ff6e32380b782"
          test ! -e "$HOME/.docker/cli-plugins/docker-buildx"
          [[ "$GITHUB_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[0-9]+$ ]]
          builder_name="whoscored-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker_config="$(/usr/bin/mktemp -d /tmp/whoscored-ci-docker.XXXXXXXX)"
          buildkit_config="$(/usr/bin/mktemp /tmp/whoscored-ci-buildkit.XXXXXXXX)"
          /usr/bin/chmod 0700 "$docker_config"
          /usr/bin/chmod 0600 "$buildkit_config"
          printf '%s\n' \
            '[registry."127.0.0.1:5000"]' \
            '  http = true' \
            '  insecure = true' \
            > "$buildkit_config"
          unset DOCKER_CONTEXT DOCKER_CERT_PATH DOCKER_TLS_VERIFY BUILDX_HOST BUILDX_CONFIG
          export DOCKER_CONFIG="$docker_config"
          export DOCKER_HOST=unix:///var/run/docker.sock
          export BUILDX_CONFIG="$docker_config/buildx"
          builder_container="buildx_buildkit_${builder_name}0"
          ! /usr/bin/docker inspect "$builder_container" >/dev/null 2>&1
          "$buildx_exec" create \
            --name "$builder_name" \
            --driver docker-container \
            --driver-opt image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec \
            --driver-opt network=host \
            --driver-opt provenance-add-gha=false \
            --buildkitd-config "$buildkit_config" \
            --use --bootstrap \
            unix:///var/run/docker.sock
          /usr/bin/rm -f -- "$buildkit_config"
          test "$(/usr/bin/docker inspect --format '{{.Config.Image}}' "$builder_container")" = \
            "moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec"
          test "$(/usr/bin/docker inspect --format '{{.State.Running}}' "$builder_container")" = true
          test "$(/usr/bin/docker inspect --format '{{.HostConfig.NetworkMode}}' "$builder_container")" = host
          /usr/bin/docker exec "$builder_container" \
            test ! -e /etc/buildkit/provenance.d/github_actions_context.json
          "$buildx_exec" inspect --builder "$builder_name" --bootstrap
          {
            echo "DOCKER_CONFIG=$docker_config"
            echo "DOCKER_HOST=unix:///var/run/docker.sock"
            echo "BUILDX_CONFIG=$docker_config/buildx"
            echo "WHOSCORED_CI_BUILDER=$builder_name"
          } >> "$GITHUB_ENV"

      - name: Build immutable Superset and JupyterHub runtimes
        run: |
          export PATH=/usr/bin:/bin
          exec 9< /usr/libexec/docker/cli-plugins/docker-buildx
          buildx_exec=/proc/self/fd/9
          echo "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_exec" \
            | /usr/bin/sha256sum --check --strict
          buildx_build() {
            local attempt
            for attempt in 1 2 3; do
              if "$buildx_exec" build "$@"; then return 0; fi
              test "$attempt" -lt 3 || return 1
              /usr/bin/sleep "$((attempt * 5))"
            done
          }
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --load \
            -t data-platform-superset:ci \
            docker/images/superset
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --load \
            -t data-platform-jupyterhub:ci \
            docker/images/jupyterhub

      - name: Build and smoke the hardened scheduler test image
        run: |
          export PATH=/usr/bin:/bin
          exec 9< /usr/libexec/docker/cli-plugins/docker-buildx
          buildx_exec=/proc/self/fd/9
          echo "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_exec" \
            | /usr/bin/sha256sum --check --strict
          buildx_build() {
            local attempt
            for attempt in 1 2 3; do
              if "$buildx_exec" build "$@"; then return 0; fi
              test "$attempt" -lt 3 || return 1
              /usr/bin/sleep "$((attempt * 5))"
            done
          }
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --target airflow-scheduler-test \
            --load \
            -t data-platform-airflow-scheduler:ci \
            docker/images/airflow
          scheduler_smoke_tmpdir="$(mktemp -d)"
          scheduler_smoke_cidfile="$scheduler_smoke_tmpdir/cid"
          cleanup_scheduler_smoke() {
            if test -s "$scheduler_smoke_cidfile"; then
              docker rm -f "$(cat "$scheduler_smoke_cidfile")" >/dev/null 2>&1 || true
            fi
            rm -rf -- "$scheduler_smoke_tmpdir"
          }
          trap cleanup_scheduler_smoke EXIT
          timeout --kill-after=5s 45s docker run --rm \
            --cidfile "$scheduler_smoke_cidfile" \
            --network none \
            --user 50000:0 \
            --read-only \
            --shm-size 1g \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=256m,uid=50000,gid=0,mode=0700 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint /opt/legacy-scraper-venv/bin/python \
            data-platform-airflow-scheduler:ci -I -c \
            "import os, tempfile; home = tempfile.TemporaryDirectory(prefix='fbref-camoufox-home-', dir='/tmp'); cache = os.path.join(home.name, '.cache'); os.mkdir(cache, 0o700); env = {'FONTCONFIG_FILE': 'fonts.conf', 'FONTCONFIG_PATH': '/opt/fbref-camoufox/fontconfig/windows', 'HOME': home.name, 'XDG_CACHE_HOME': cache}; from camoufox.addons import DefaultAddons; from camoufox.sync_api import Camoufox; cm = Camoufox(headless='virtual', executable_path='/opt/fbref-camoufox/camoufox-bin', ff_version=152, os='windows', i_know_what_im_doing=True, exclude_addons=list(DefaultAddons), env=env); browser = cm.__enter__(); ua, platform = browser.new_page().evaluate('[navigator.userAgent, navigator.platform]'); cm.__exit__(None, None, None); home.cleanup(); assert 'Firefox/152.0' in ua and 'Windows NT 10.0' in ua, ua; assert platform == 'Win32', platform"
          cleanup_scheduler_smoke
          trap - EXIT
          docker run --rm \
            --network none \
            --user 50000:0 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint bash \
            -e PYTHONPATH=/opt/airflow:/opt/airflow/dags \
            -v "$PWD/dags:/opt/airflow/dags:ro" \
            -v "$PWD/scrapers:/opt/airflow/scrapers:ro" \
            -v "$PWD/scripts:/opt/airflow/scripts:ro" \
            -v "$PWD/configs:/opt/airflow/configs:ro" \
            --tmpfs /opt/airflow/logs:rw,noexec,nosuid,nodev,size=16m,uid=50000,gid=0,mode=0770 \
            data-platform-airflow-scheduler:ci -euc '
              test "$(id -u):$(id -g)" = 50000:0
              test "$(awk '\''/^CapEff:/ {print $2}'\'' /proc/self/status)" = 0000000000000000
              test "$(stat -c "%u:%g:%a" /opt/airflow)" = 0:0:755
              test ! -w /opt/airflow
              for planted_module in \
                fbref_parent_shadow.py \
                sitecustomize.py \
                usercustomize.py
              do
                if touch "/opt/airflow/${planted_module}" 2>/dev/null; then
                  echo "UID 50000 planted top-level module: ${planted_module}" >&2
                  exit 1
                fi
                test ! -e "/opt/airflow/${planted_module}"
              done
              test "$(stat -c "%u:%g:%a" /opt/airflow/logs)" = 50000:0:770
              test -w /opt/airflow/logs
              touch /opt/airflow/logs/.scheduler-writable-submount-smoke
              rm /opt/airflow/logs/.scheduler-writable-submount-smoke
              timeout 30 chromium \
                --headless --no-sandbox --disable-setuid-sandbox \
                --disable-gpu --user-data-dir=/tmp/whoscored-chromium-ci \
                --dump-dom "data:text/html,whoscored-zero-cap-smoke" \
                | grep -q whoscored-zero-cap-smoke
              test "$(airflow version)" = 2.11.2
              test ! -e /opt/airflow/airflow.cfg
              test ! -e /opt/airflow/gunicorn.ctl
              airflow_root_ctime="$(stat -c %Z /opt/airflow)"
              sleep 1
              /usr/local/bin/python -c \
                "from airflow.utils.serve_logs import serve_logs; serve_logs(port=18793)" \
                >/tmp/whoscored-serve-logs-smoke.log 2>&1 &
              serve_logs_pid="$!"
              serve_logs_ready=0
              for _ in $(seq 1 20); do
                if kill -0 "$serve_logs_pid" 2>/dev/null && \
                    grep -q "Listening at:" /tmp/whoscored-serve-logs-smoke.log; then
                  serve_logs_ready=1
                  break
                fi
                if ! kill -0 "$serve_logs_pid" 2>/dev/null; then
                  cat /tmp/whoscored-serve-logs-smoke.log >&2
                  exit 1
                fi
                sleep 1
              done
              test "$serve_logs_ready" = 1
              test ! -e /opt/airflow/airflow.cfg
              test ! -e /opt/airflow/gunicorn.ctl
              test "$(stat -c %Z /opt/airflow)" = "$airflow_root_ctime"
              ! grep -q "Control socket listening" \
                /tmp/whoscored-serve-logs-smoke.log
              kill "$serve_logs_pid"
              wait "$serve_logs_pid" || test "$?" -eq 143
              test "$(stat -c %Z /opt/airflow)" = "$airflow_root_ctime"
              /usr/local/bin/python -m pip check
              /opt/legacy-scraper-venv/bin/python -m pip check
              PYTHONWARNINGS=error /usr/local/bin/python -c "import importlib.metadata as m; import requests; assert m.version(\"chardet\") == \"5.2.0\""
              /usr/local/bin/python -c "import importlib.metadata as m; import curl_cffi,tls_client,tls_requests; assert m.version(\"tls-client-python\") == \"1.15.1\"; client=tls_requests.Client(proxy=\"http://127.0.0.1:9\"); client.close()"
              /opt/legacy-scraper-venv/bin/python -c "import importlib.metadata as m; import pathlib; import camoufox,playwright,scrapers,selenium,soccerdata; import scrapers.matchhistory.scraper as matchhistory_scraper; assert pathlib.Path(scrapers.__file__).resolve() == pathlib.Path(\"/opt/airflow/scrapers/__init__.py\"); assert pathlib.Path(matchhistory_scraper.__file__).resolve() == pathlib.Path(\"/opt/airflow/scrapers/matchhistory/scraper.py\"); assert m.version(\"wrapper-tls-requests\") == \"1.2.5\""
              for runner in \
                run_clubelo_scraper.py \
                run_espn_scraper.py \
                run_understat_scraper.py \
                run_sofifa_scraper.py \
                prepare_sofascore_workload.py \
                run_sofascore_scraper.py
              do
                /opt/legacy-scraper-venv/bin/python "/opt/airflow/dags/scripts/${runner}" --help >/dev/null
              done
              /opt/legacy-scraper-venv/bin/python /opt/airflow/dags/scripts/run_fbref_live_waves.py --help >/dev/null
              /opt/legacy-scraper-venv/bin/python /opt/airflow/dags/scripts/run_matchhistory_scraper.py --help >/dev/null
              /usr/local/bin/python -c "from airflow.models import DagBag; bag=DagBag(\"/opt/airflow/dags\", include_examples=False, safe_mode=False); assert not bag.import_errors, bag.import_errors"
            '

      - name: Build production targets and prove the declared gate state
        env:
          GIT_ATTR_NOSYSTEM: "1"
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_NOSYSTEM: "1"
          GIT_EXTERNAL_DIFF: /bin/false
          GIT_NO_REPLACE_OBJECTS: "1"
          GIT_CONFIG_COUNT: "9"
          GIT_CONFIG_KEY_0: core.fsmonitor
          GIT_CONFIG_VALUE_0: "false"
          GIT_CONFIG_KEY_1: core.hooksPath
          GIT_CONFIG_VALUE_1: /dev/null
          GIT_CONFIG_KEY_2: core.attributesFile
          GIT_CONFIG_VALUE_2: /dev/null
          GIT_CONFIG_KEY_3: filter.lfs.process
          GIT_CONFIG_VALUE_3: ""
          GIT_CONFIG_KEY_4: filter.lfs.clean
          GIT_CONFIG_VALUE_4: ""
          GIT_CONFIG_KEY_5: filter.lfs.smudge
          GIT_CONFIG_VALUE_5: ""
          GIT_CONFIG_KEY_6: filter.lfs.required
          GIT_CONFIG_VALUE_6: "false"
          GIT_CONFIG_KEY_7: diff.external
          GIT_CONFIG_VALUE_7: /bin/false
          GIT_CONFIG_KEY_8: core.worktree
          GIT_CONFIG_VALUE_8: ${{ github.workspace }}
        run: |
          export PATH=/usr/bin:/bin
          exec 9< /usr/libexec/docker/cli-plugins/docker-buildx
          buildx_exec=/proc/self/fd/9
          echo "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_exec" \
            | /usr/bin/sha256sum --check --strict
          buildx_build() {
            local attempt
            for attempt in 1 2 3; do
              if "$buildx_exec" build "$@"; then return 0; fi
              test "$attempt" -lt 3 || return 1
              /usr/bin/sleep "$((attempt * 5))"
            done
          }
          umask 077
          install -d -m 0700 /tmp/whoscored-build-metadata
          BUILDX_GIT_CHECK_DIRTY=1 \
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --target airflow-scheduler-payload \
            --platform linux/amd64 \
            --load \
            -t data-platform-airflow-scheduler-payload:provenance-ci \
            docker/images/airflow
          scheduler_repository=127.0.0.1:5000/data-platform-airflow-scheduler
          proxy_repository=127.0.0.1:5000/data-platform-airflow-whoscored-proxy
          scheduler_tag="$scheduler_repository:provenance-ci"
          proxy_tag="$proxy_repository:provenance-ci"
          BUILDX_GIT_CHECK_DIRTY=1 BUILDX_METADATA_PROVENANCE=max \
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --target airflow-scheduler \
            --platform linux/amd64 \
            --provenance=mode=max,version=v1 \
            --metadata-file /tmp/whoscored-build-metadata/airflow-scheduler.json \
            --push \
            --tag "$scheduler_tag" \
            docker/images/airflow
          BUILDX_GIT_CHECK_DIRTY=1 BUILDX_METADATA_PROVENANCE=max \
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --target airflow-whoscored-proxy \
            --platform linux/amd64 \
            --provenance=mode=max,version=v1 \
            --metadata-file /tmp/whoscored-build-metadata/airflow-whoscored-proxy.json \
            --push \
            --tag "$proxy_tag" \
            docker/images/airflow

          scheduler_digest="$(jq -er '."containerimage.digest"' \
            /tmp/whoscored-build-metadata/airflow-scheduler.json)"
          proxy_digest="$(jq -er '."containerimage.digest"' \
            /tmp/whoscored-build-metadata/airflow-whoscored-proxy.json)"
          scheduler="$scheduler_repository@$scheduler_digest"
          proxy="$proxy_repository@$proxy_digest"
          docker pull "$scheduler"
          docker pull "$proxy"
          docker run --rm \
            --network none \
            --user 50000:0 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint bash \
            "$scheduler" -euc '
              test "$(stat -c "%u:%g:%a" /opt/airflow)" = 0:0:755
              test ! -w /opt/airflow
              ! touch /opt/airflow/final_scheduler_parent_shadow.py 2>/dev/null
              test ! -e /opt/airflow/final_scheduler_parent_shadow.py
            '
          {
            echo "WHOSCORED_SCHEDULER_IMAGE=$scheduler"
            echo "WHOSCORED_PROXY_IMAGE=$proxy"
          } >> "$GITHUB_ENV"

          sentinel="$(mktemp -d)"
          trap 'rm -rf "$sentinel"' EXIT
          assert_exit_78_before_sentinel() {
            label="$1"
            shift
            set +e
            docker run --rm -v "$sentinel:/sentinel" "$@"
            status="$?"
            set -e
            test "$status" = 78
            test ! -e "$sentinel/$label"
          }

          assert_success_after_gate() {
            label="$1"
            shift
            docker run --rm -v "$sentinel:/sentinel" "$@"
            test -e "$sentinel/$label"
          }

          provenance_status="$(/usr/bin/python3 -I -S -c \
            'import json; print(json.load(open("docker/images/airflow/whoscored-build-provenance-attestation.json"))["status"])')"
          case "$provenance_status" in
            blocked-v1)
              assert_exit_78_before_sentinel scheduler-normal \
                "$scheduler" bash -c 'touch /sentinel/scheduler-normal'
              for alias in python python3 python3.11; do
                assert_exit_78_before_sentinel "scheduler-$alias" \
                  --entrypoint "$alias" "$scheduler" -S -c \
                  "open('/sentinel/scheduler-$alias','w').close()"
              done
              assert_exit_78_before_sentinel scheduler-bash-python-s \
                --entrypoint bash "$scheduler" -c \
                "python -S -c \"open('/sentinel/scheduler-bash-python-s','w').close()\""
              assert_exit_78_before_sentinel proxy-normal \
                "$proxy" bash -c 'touch /sentinel/proxy-normal'
              assert_exit_78_before_sentinel proxy-python-s \
                --entrypoint python "$proxy" -S -c \
                "open('/sentinel/proxy-python-s','w').close()"
              ;;
            ready-v1)
              assert_success_after_gate scheduler-ready \
                "$scheduler" bash -c 'touch /sentinel/scheduler-ready'
              assert_success_after_gate scheduler-python-ready \
                --entrypoint python "$scheduler" -S -c \
                "open('/sentinel/scheduler-python-ready','w').close()"
              assert_success_after_gate proxy-ready \
                "$proxy" bash -c 'touch /sentinel/proxy-ready'
              ;;
            *) echo "unsupported provenance state: $provenance_status" >&2; exit 78 ;;
          esac

          # The internal raw interpreter is an explicit trusted-host boundary,
          # not a public alias. Even through it, a real mounted WhoScored runner
          # refuses production execution before argparse, imports or I/O.
          set +e
          docker run --rm \
            --entrypoint /usr/local/libexec/whoscored-python-real \
            -v "$PWD/dags:/opt/airflow/dags:ro" \
            -v "$PWD/scrapers:/opt/airflow/scrapers:ro" \
            -v "$PWD/scripts:/opt/airflow/scripts:ro" \
            -v "$sentinel:/sentinel" \
            "$scheduler" -S \
            /opt/airflow/dags/scripts/run_whoscored_scraper.py
          raw_status="$?"
          set -e
          test "$raw_status" -ne 0
          test ! -e "$sentinel/raw-runner"

          # Materializing a venv-local executable before replacing the system
          # aliases preserves the isolated legacy dependency identity.
          docker run --rm \
            --network none \
            --user 50000:0 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --security-opt apparmor=docker-default \
            --security-opt seccomp=builtin \
            --entrypoint /opt/legacy-scraper-venv/bin/python \
            -e PYTHONPATH=/opt/airflow \
            -v "$PWD/scrapers:/opt/airflow/scrapers:ro" \
            "$scheduler" -c \
            "import importlib.metadata as m, pathlib, scrapers, urllib3; import scrapers.matchhistory.scraper as matchhistory_scraper; assert pathlib.Path(scrapers.__file__).resolve() == pathlib.Path('/opt/airflow/scrapers/__init__.py'); assert pathlib.Path(matchhistory_scraper.__file__).resolve() == pathlib.Path('/opt/airflow/scrapers/matchhistory/scraper.py'); assert urllib3.__version__.startswith('1.'); assert m.version('rich') == '14.3.4'"

      - name: Build and smoke the immutable WhoScored FlareSolverr image
        run: |
          export PATH=/usr/bin:/bin
          exec 9< /usr/libexec/docker/cli-plugins/docker-buildx
          buildx_exec=/proc/self/fd/9
          echo "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  $buildx_exec" \
            | /usr/bin/sha256sum --check --strict
          buildx_build() {
            local attempt
            for attempt in 1 2 3; do
              if "$buildx_exec" build "$@"; then return 0; fi
              test "$attempt" -lt 3 || return 1
              /usr/bin/sleep "$((attempt * 5))"
            done
          }
          buildx_build \
            --builder "$WHOSCORED_CI_BUILDER" \
            --file docker/images/flaresolverr-whoscored/Dockerfile \
            --load \
            -t data-platform-flaresolverr-whoscored:ci \
            .
          container="$(docker run -d \
              --read-only \
              --shm-size 1g \
              --security-opt no-new-privileges:true \
              --security-opt apparmor=docker-default \
              --security-opt seccomp=builtin \
              --cap-drop ALL \
              --tmpfs /tmp:rw,exec,nosuid,nodev,size=2g,uid=1000,gid=1000,mode=1770 \
              --tmpfs /config:rw,noexec,nosuid,nodev,size=16m,uid=1000,gid=1000,mode=0700 \
              --tmpfs /app/.config:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700 \
              --tmpfs /app/.local:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700 \
              data-platform-flaresolverr-whoscored:ci)"
          trap 'docker rm -f "$container" >/dev/null 2>&1 || true' EXIT
          test "$(docker inspect --format '{{.Config.User}}' "$container")" = 1000:1000
          test "$(docker inspect --format '{{.AppArmorProfile}}' "$container")" = docker-default
          test "$(docker inspect --format '{{json .HostConfig.SecurityOpt}}' "$container")" = \
            '["no-new-privileges:true","apparmor=docker-default","seccomp=builtin"]'
          test "$(docker inspect --format '{{json .HostConfig.CapAdd}}' "$container")" = null
          test "$(docker exec "$container" awk '/^CapEff:/ {print $2}' /proc/1/status)" = \
            0000000000000000
          ready=0
          for _ in $(seq 1 30); do
            if docker exec "$container" curl -fsS \
              http://127.0.0.1:8191/v1/whoscored/runtime-identity \
              > /tmp/whoscored-flaresolverr-identity.json; then
              ready=1
              break
            fi
            sleep 2
          done
          test "$ready" = 1
          docker exec "$container" curl -fsS \
            -H 'Content-Type: application/json' \
            -d '{"cmd":"sessions.list"}' \
            http://127.0.0.1:8191/v1 \
            > /tmp/whoscored-flaresolverr-v1.json
          /usr/bin/python3 -I -S - <<'PY'
          import json
          import re

          identity = json.load(open("/tmp/whoscored-flaresolverr-identity.json"))
          response = json.load(open("/tmp/whoscored-flaresolverr-v1.json"))
          assert set(identity) == {"status", "version", "extension_sha256"}
          assert identity["status"] == "ok"
          assert identity["version"] == "3.4.6"
          assert re.fullmatch(r"[0-9a-f]{64}", identity["extension_sha256"])
          assert response["version"] == identity["version"]
          assert response["extension_sha256"] == identity["extension_sha256"]
          assert response["sessions"] == []
          PY

