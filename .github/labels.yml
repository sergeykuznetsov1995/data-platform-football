# GitHub labels — single source of truth.
# Apply with: bash scripts/setup_github_labels.sh
#
# Convention: prefix:value (e.g. wave:E3, area:silver, type:bug).
# Every issue MUST have at minimum: 1× type, 1× area, optional 1× wave + 1× source.

labels:
  # ── type:* — what kind of work this is (red/utility palette) ──────────────
  - name: "type:bug"
    color: "d73a4a"
    description: "Bug in pipeline / DAG / scraper / SQL / infra"
  - name: "type:feat"
    color: "a2eeef"
    description: "New feature, table, DAG, or scraper"
  - name: "type:refactor"
    color: "cfd3d7"
    description: "Refactor without behavior change"
  - name: "type:docs"
    color: "0075ca"
    description: "Documentation / CLAUDE.md / memory / READMEs"
  - name: "type:infra"
    color: "5319e7"
    description: "docker / compose / HDFS / Trino / Hive tuning"
  - name: "type:dq"
    color: "fbca04"
    description: "Data-quality incident or new DQ check"

  # ── wave:* — medallion wave (blue palette) ────────────────────────────────
  - name: "wave:E0"
    color: "bfd4f2"
    description: "Baseline / pre-medallion (R0.* tooling)"
  - name: "wave:E1"
    color: "7fb0ff"
    description: "Silver xref_* spine (team/match/referee/manager/player)"
  - name: "wave:E2"
    color: "4a90e2"
    description: "Master dims (venue/referee/manager/standings/competition/season)"
  - name: "wave:E3"
    color: "3a78d8"
    description: "Core facts (fct_event / fct_shot / fct_lineup)"
  - name: "wave:E4"
    color: "2960c0"
    description: "Narrow facts (goal/card/sub/odds/rating)"
  - name: "wave:E5"
    color: "1f4ea0"
    description: "fct_player_unavailable + injury-related"
  - name: "wave:E7"
    color: "003580"
    description: "BI + catalog (Superset, OpenMetadata, marts)"

  # ── area:* — which part of the platform (green palette) ──────────────────
  - name: "area:bronze"
    color: "c2e0c6"
    description: "Bronze ingest tables"
  - name: "area:silver"
    color: "90c695"
    description: "Silver CTAS, xref, DQ"
  - name: "area:gold"
    color: "5fa564"
    description: "Gold dims / facts / marts"
  - name: "area:scraper"
    color: "0e8a16"
    description: "scrapers/* implementation"
  - name: "area:dag"
    color: "1d6f2b"
    description: "Airflow DAGs and runner scripts"
  - name: "area:bi"
    color: "76d7a5"
    description: "Superset dashboards / datasources"
  - name: "area:catalog"
    color: "76d7a5"
    description: "OpenMetadata descriptions / ingestion"
  - name: "area:infra"
    color: "33aa55"
    description: "docker / HDFS / Trino / Hive / network"

  # ── source:* — data source (yellow palette, optional sub-tag) ────────────
  - name: "source:fbref"
    color: "fbca04"
    description: "FBref scraper / data"
  - name: "source:understat"
    color: "fbca04"
    description: "Understat scraper / data"
  - name: "source:whoscored"
    color: "fbca04"
    description: "WhoScored scraper / data"
  - name: "source:fotmob"
    color: "fbca04"
    description: "FotMob scraper / data"
  - name: "source:sofascore"
    color: "fbca04"
    description: "SofaScore scraper / data"
  - name: "source:espn"
    color: "fbca04"
    description: "ESPN scraper / data"
  - name: "source:matchhistory"
    color: "fbca04"
    description: "football-data.co.uk CSV scraper"
  - name: "source:sofifa"
    color: "fbca04"
    description: "SoFIFA scraper / data"
  - name: "source:clubelo"
    color: "fbca04"
    description: "ClubElo scraper / data"

  # ── priority:* — only P0/P1 as labels (P2/P3 live in Project field) ──────
  - name: "priority:p0"
    color: "b60205"
    description: "On fire — prod down or blocker"
  - name: "priority:p1"
    color: "d93f0b"
    description: "High — this week"

  # ── status:* — surface-level state (full status lives in Project field) ──
  - name: "status:blocked"
    color: "000000"
    description: "Waiting on external dep / decision"
  - name: "status:needs-triage"
    color: "ededed"
    description: "New, not yet categorized"
